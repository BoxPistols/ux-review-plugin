<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #18181b;
  --surface: rgba(255,255,255,0.06);
  --border: rgba(255,255,255,0.10);
  --border-hi: rgba(255,255,255,0.18);
  --text: rgba(255,255,255,0.92);
  --text-sub: rgba(255,255,255,0.50);
  --text-dim: rgba(255,255,255,0.28);
  --accent: #818cf8;
  --accent-bg: rgba(129,140,248,0.12);
  --green: #4ade80;
  --red: #f87171;
}

html, body {
  font-family: -apple-system, 'Helvetica Neue', 'Noto Sans JP', sans-serif;
  font-size: 14px; line-height: 1.5;
  background: var(--bg); color: var(--text);
  width: 100%; height: 100%; overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

.layout {
  display: flex; flex-direction: column; height: 100vh;
}

/* ── Header ── */
.header {
  padding: 10px 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.logo { font-size: 14px; font-weight: 600; letter-spacing: -0.01em; }
.logo span { color: var(--accent); }
.icon-btn {
  width: 30px; height: 30px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; cursor: pointer; color: var(--text-sub);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; transition: all 0.12s;
}
.icon-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ── Settings ── */
.settings {
  padding: 10px 16px; border-bottom: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 8px; flex-shrink: 0;
}
.settings.hidden { display: none; }
.s-row { display: flex; gap: 8px; align-items: center; }
.s-label { font-size: 12px; color: var(--text-dim); width: 56px; flex-shrink: 0; }
.s-input {
  flex: 1; background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; padding: 6px 10px; font-size: 13px; color: var(--text);
  outline: none; font-family: monospace; min-width: 0;
}
.s-input:focus { border-color: var(--accent); }
.s-select {
  flex: 1; background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; padding: 6px 10px; font-size: 13px; color: var(--text); outline: none;
}

/* ── Main ── */
.main {
  flex: 1; display: flex; flex-direction: column;
  padding: 14px 16px; gap: 10px; overflow: hidden;
}

.prompt {
  width: 100%; min-height: 72px; max-height: 160px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 12px;
  font-size: 14px; color: var(--text); outline: none;
  resize: none; font-family: inherit; line-height: 1.6;
  transition: border-color 0.12s;
}
.prompt:focus { border-color: var(--accent); }
.prompt::placeholder { color: var(--text-dim); }

.btn-run {
  padding: 10px; background: var(--accent); color: #111;
  border: none; border-radius: 8px; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: opacity 0.12s; flex-shrink: 0;
}
.btn-run:hover { opacity: 0.88; }
.btn-run:disabled { opacity: 0.35; cursor: not-allowed; }

.status {
  font-size: 12px; color: var(--text-sub); text-align: center;
  padding: 6px 0; flex-shrink: 0;
}
.spinner {
  display: inline-block; width: 12px; height: 12px;
  border: 2px solid var(--border); border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.6s linear infinite;
  vertical-align: middle; margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Log ── */
.log {
  flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 6px;
}
.log::-webkit-scrollbar { width: 4px; }
.log::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

.log-item {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 12px; font-size: 13px; line-height: 1.6;
  animation: fadeIn 0.15s ease;
}
.log-item.error { border-color: rgba(248,113,113,0.25); color: var(--red); }
.log-item.ok    { border-color: rgba(74,222,128,0.25); color: var(--green); }
.log-time { font-size: 11px; color: var(--text-dim); margin-bottom: 3px; font-family: monospace; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; } }

.empty {
  flex: 1; display: flex; align-items: center; justify-content: center;
  color: var(--text-dim); font-size: 13px; text-align: center; line-height: 2;
}

.shortcut {
  font-size: 11px; color: var(--text-dim); font-family: monospace;
  text-align: center; flex-shrink: 0;
}

.hidden { display: none !important; }
</style>
</head>
<body>

<div class="layout">

  <div class="header">
    <span class="logo">AI <span>UI</span> Generator</span>
    <button class="icon-btn" id="btnSettings" title="設定">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M5.7 1h2.6l.4 1.6a4.5 4.5 0 011.1.6l1.6-.5 1.3 2.2-1.2 1.1a4.6 4.6 0 010 1.2l1.2 1.1-1.3 2.2-1.6-.5a4.5 4.5 0 01-1.1.6L8.3 13H5.7l-.4-1.6a4.5 4.5 0 01-1.1-.6l-1.6.5-1.3-2.2 1.2-1.1a4.6 4.6 0 010-1.2L1.3 5.7l1.3-2.2 1.6.5a4.5 4.5 0 011.1-.6L5.7 1z" stroke="currentColor" stroke-width="1.2"/>
        <circle cx="7" cy="7" r="2" stroke="currentColor" stroke-width="1.2"/>
      </svg>
    </button>
  </div>

  <div class="settings hidden" id="settings">
    <div class="s-row">
      <span class="s-label">Provider</span>
      <select class="s-select" id="provider">
        <option value="gemini">Gemini 2.0 Flash（無料）</option>
        <option value="openai">GPT-4o-mini</option>
      </select>
    </div>
    <div class="s-row">
      <span class="s-label">API Key</span>
      <input class="s-input" id="apiKey" type="password" placeholder="APIキーを入力..." />
    </div>
  </div>

  <div class="main">
    <textarea class="prompt" id="prompt" placeholder="作りたいUIを自然言語で記述...&#10;例: シンプルなログインフォーム&#10;例: 商品一覧カード 3列グリッド"></textarea>
    <button class="btn-run" id="btnRun">生成 →</button>
    <div class="status hidden" id="status"><span class="spinner"></span>AIがUIを生成中...</div>
    <div class="log" id="log">
      <div class="empty" id="empty">テキストで記述 → Figmaキャンバスに生成<br>⌘+Enter で実行</div>
    </div>
    <div class="shortcut">⌘ + Enter</div>
  </div>

</div>

<script>
// ══════════════════════════════════════════════════════════════
// STATE & DOM
// ══════════════════════════════════════════════════════════════
const $ = id => document.getElementById(id)
const show = el => el.classList.remove('hidden')
const hide = el => el.classList.add('hidden')

// ── 設定 ──
$('btnSettings').addEventListener('click', () => $('settings').classList.toggle('hidden'))

parent.postMessage({ pluginMessage: { type: 'load-settings' } }, '*')

window.onmessage = ({ data }) => {
  const msg = data.pluginMessage
  if (!msg) return

  if (msg.type === 'settings-loaded') {
    if (msg.apiKey) $('apiKey').value = msg.apiKey
    if (msg.provider) $('provider').value = msg.provider
    if (msg.apiKey) hide($('settings'))
  }

  if (msg.type === 'done') {
    hide($('status'))
    $('btnRun').disabled = false
    addLog('ok', '✓ Figmaキャンバスに生成しました')
  }

  if (msg.type === 'error') {
    hide($('status'))
    $('btnRun').disabled = false
    addLog('error', msg.error)
  }
}

$('apiKey').addEventListener('change', saveSettings)
$('provider').addEventListener('change', saveSettings)

function saveSettings() {
  parent.postMessage({ pluginMessage: {
    type: 'save-settings',
    apiKey: $('apiKey').value.trim(),
    provider: $('provider').value,
  }}, '*')
}

// ══════════════════════════════════════════════════════════════
// AI SYSTEM PROMPT
// ══════════════════════════════════════════════════════════════
const SYSTEM_PROMPT = `あなたはUIデザイナーです。ユーザーの自然言語の説明から、Figmaノード構造をJSONで生成してください。

出力形式（JSONのみ。マークダウン記号・前置き・後置き一切不要）:
{
  "name": "フレーム名",
  "width": 数値,
  "height": 数値,
  "background": "#hex",
  "children": [
    {
      "type": "RECT",
      "name": "名前",
      "width": 数値, "height": 数値,
      "x": 数値, "y": 数値,
      "fill": "#hex",
      "cornerRadius": 数値,
      "stroke": "#hex",
      "strokeWidth": 数値
    },
    {
      "type": "TEXT",
      "name": "名前",
      "text": "表示テキスト",
      "fontSize": 数値,
      "fontWeight": "Regular|Medium|SemiBold|Bold",
      "color": "#hex",
      "x": 数値, "y": 数値
    },
    {
      "type": "FRAME",
      "name": "名前",
      "width": 数値, "height": 数値,
      "x": 数値, "y": 数値,
      "fill": "#hex",
      "cornerRadius": 数値,
      "children": [...]
    },
    {
      "type": "ELLIPSE",
      "name": "名前",
      "width": 数値, "height": 数値,
      "x": 数値, "y": 数値,
      "fill": "#hex"
    }
  ]
}

設計原則:
- モダンでクリーンなUI。適切な余白（padding 16-32px）
- フォントサイズ: タイトル 24-32, 本文 14-16, キャプション 12
- 一貫した配色パレット
- 日本語テキストを使用
- 典型的な画面幅: モバイル 390, デスクトップ 1440
- ボタンは高さ 44px以上、角丸 8px
- 入力フィールドは背景色で領域を明示`

// ══════════════════════════════════════════════════════════════
// AI API CALL
// ══════════════════════════════════════════════════════════════
async function callAI(prompt) {
  const provider = $('provider').value
  const apiKey = $('apiKey').value.trim()
  if (!apiKey) throw new Error('APIキーを設定してください（⚙）')

  let content

  if (provider === 'gemini') {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: {
          response_mime_type: 'application/json',
          temperature: 0.7,
        },
      }),
    })
    if (!res.ok) {
      const err = await res.json().catch(() => ({}))
      throw new Error(err.error?.message || `Gemini API エラー [${res.status}]`)
    }
    const data = await res.json()
    content = data.candidates?.[0]?.content?.parts?.[0]?.text
  } else {
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiKey}`,
      },
      body: JSON.stringify({
        model: 'gpt-4o-mini',
        messages: [
          { role: 'system', content: SYSTEM_PROMPT },
          { role: 'user', content: prompt },
        ],
        response_format: { type: 'json_object' },
        temperature: 0.7,
        max_tokens: 4000,
      }),
    })
    if (!res.ok) {
      const err = await res.json().catch(() => ({}))
      throw new Error(err.error?.message || `OpenAI API エラー [${res.status}]`)
    }
    const data = await res.json()
    content = data.choices?.[0]?.message?.content
  }

  if (!content) throw new Error('AIからの応答が空でした')

  try {
    return JSON.parse(content)
  } catch {
    const m = content.match(/```(?:json)?\s*([\s\S]*?)\s*```/)
    if (m) return JSON.parse(m[1])
    throw new Error('JSONの解析に失敗しました')
  }
}

// ══════════════════════════════════════════════════════════════
// GENERATE
// ══════════════════════════════════════════════════════════════
async function generate() {
  const prompt = $('prompt').value.trim()
  if (!prompt) return

  $('btnRun').disabled = true
  show($('status'))
  hide($('empty'))

  try {
    const spec = await callAI(prompt)
    addLog('', `→ ${spec.name || 'UI'} (${spec.width}×${spec.height})`)
    parent.postMessage({ pluginMessage: { type: 'generate', spec } }, '*')
  } catch (e) {
    hide($('status'))
    $('btnRun').disabled = false
    addLog('error', e.message)
  }
}

// ══════════════════════════════════════════════════════════════
// LOG
// ══════════════════════════════════════════════════════════════
function addLog(type, message) {
  const log = $('log')
  const empty = $('empty')
  if (empty) hide(empty)

  const now = new Date().toLocaleTimeString('ja-JP', { hour:'2-digit', minute:'2-digit', second:'2-digit' })
  const div = document.createElement('div')
  div.className = `log-item${type ? ' ' + type : ''}`
  div.innerHTML = `<div class="log-time">${now}</div>${message}`
  log.insertBefore(div, log.firstChild)
}

// ══════════════════════════════════════════════════════════════
// EVENTS
// ══════════════════════════════════════════════════════════════
$('btnRun').addEventListener('click', generate)

document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
    e.preventDefault()
    generate()
  }
})
</script>

</body>
</html>
