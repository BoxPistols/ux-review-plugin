<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0f;
  --bg-elevated: #101018;
  --surface: rgba(255,255,255,0.04);
  --surface-hi: rgba(255,255,255,0.07);
  --surface-glass: rgba(255,255,255,0.03);
  --border: rgba(255,255,255,0.06);
  --border-hi: rgba(255,255,255,0.12);
  --border-accent: rgba(99,132,255,0.25);
  --text: #e8eaed;
  --text-sub: #9da1b5;
  --text-dim: #6b6f82;
  --accent: #6384ff;
  --accent-soft: rgba(99,132,255,0.10);
  --accent-glow: rgba(99,132,255,0.20);
  --green: #34d399;
  --green-soft: rgba(52,211,153,0.10);
  --red: #f87171;
  --red-soft: rgba(248,113,113,0.10);
  --yellow: #fbbf24;
  --yellow-soft: rgba(251,191,36,0.10);
  --font: 'DM Sans', -apple-system, sans-serif;
  --mono: 'JetBrains Mono', 'SF Mono', monospace;
  --ease: cubic-bezier(0.16, 1, 0.3, 1);
}

html, body {
  font-family: var(--font); font-size: 14px; line-height: 1.5;
  background: var(--bg); color: var(--text);
  width: 100%; height: 100%; overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

.layout {
  display: flex; flex-direction: column; height: 100vh;
  background: linear-gradient(180deg, var(--bg) 0%, var(--bg-elevated) 100%);
}

/* ── Header ── */
.header {
  padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  border-bottom: 1px solid var(--border);
  background: rgba(10,10,15,0.8);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
}
.logo { font-size: 14px; font-weight: 700; letter-spacing: -0.02em; display: flex; align-items: center; gap: 6px; }
.logo-mark { width: 18px; height: 18px; border-radius: 5px; background: linear-gradient(135deg, var(--accent) 0%, #a78bfa 100%); display: flex; align-items: center; justify-content: center; }
.logo-mark svg { display: block; }
.logo span { color: var(--accent); }
.hdr-right { display: flex; gap: 4px; }
.icon-btn {
  width: 28px; height: 28px; background: transparent; border: 1px solid transparent;
  border-radius: 6px; cursor: pointer; color: var(--text-dim);
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s var(--ease);
}
.icon-btn:hover { background: var(--surface-hi); color: var(--text-sub); border-color: var(--border); }

/* ── Settings ── */
.settings {
  padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; flex-shrink: 0;
  border-bottom: 1px solid var(--border); background: var(--surface-glass);
  animation: slideDown 0.25s var(--ease);
}
@keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: none; } }
.settings.hidden { display: none; }
.s-row { display: flex; gap: 8px; align-items: center; }
.s-label { font-size: 12px; color: var(--text-dim); width: 48px; flex-shrink: 0; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; }
.s-input, .s-select {
  flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
  padding: 6px 10px; font-size: 12px; color: var(--text); outline: none;
  font-family: var(--mono); min-width: 0; transition: all 0.2s var(--ease);
}
.s-input:focus, .s-select:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft); }
.btn-test {
  padding: 5px 14px; background: transparent; border: 1px solid var(--border);
  border-radius: 6px; font-size: 12px; color: var(--text-dim); cursor: pointer;
  font-family: var(--font); font-weight: 500; transition: all 0.2s var(--ease);
}
.btn-test:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
.btn-test:disabled { opacity: 0.3; }
.test-result { font-size: 12px; font-family: var(--mono); word-break: break-word; max-height: 36px; overflow-y: auto; flex: 1; }
.test-result.ok { color: var(--green); }
.test-result.error { color: var(--red); }

/* ── Tabs ── */
.tabs {
  display: flex; flex-shrink: 0; padding: 0 12px;
  border-bottom: 1px solid var(--border); background: var(--bg);
  position: relative;
}
.tab {
  flex: 1; padding: 10px 4px 8px; text-align: center;
  font-size: 12px; font-weight: 600; letter-spacing: 0.02em;
  color: var(--text-dim); cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.25s var(--ease); user-select: none;
  position: relative;
}
.tab:hover { color: var(--text-sub); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab.active::after {
  content: ''; position: absolute; bottom: -1px; left: 20%; right: 20%;
  height: 2px; background: var(--accent); filter: blur(4px); opacity: 0.6;
}

/* ── Sub tabs ── */
.sub-tabs { display: flex; gap: 0; flex-shrink: 0; padding: 0 16px; border-bottom: 1px solid var(--border); }
.sub-tab {
  padding: 8px 12px; font-size: 12px; font-weight: 500; color: var(--text-dim);
  cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s var(--ease); user-select: none;
}
.sub-tab:hover { color: var(--text-sub); }
.sub-tab.active { color: var(--text); border-bottom-color: var(--text); }

/* ── Tab panels ── */
.tab-panel { display: none; flex: 1; flex-direction: column; overflow: hidden; min-height: 0; }
.tab-panel.active { display: flex; animation: fadeIn 0.2s var(--ease); }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* ── Common ── */
.panel-body {
  flex: 1; overflow-y: auto; padding: 12px 16px;
  display: flex; flex-direction: column; gap: 8px;
}
.panel-body::-webkit-scrollbar { width: 3px; }
.panel-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }
.panel-body::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.12); }

.empty-state {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 10px; color: var(--text-dim); font-size: 12px; text-align: center; line-height: 1.9; padding: 24px;
}
.empty-icon { font-size: 24px; opacity: 0.2; }

.section-title {
  font-size: 12px; color: var(--text-dim); font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase; padding: 6px 0 2px;
}

.prompt, .json-input {
  width: 100%; flex: 1; min-height: 0;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px; color: var(--text); outline: none;
  resize: none; line-height: 1.65; transition: all 0.2s var(--ease);
}
.prompt { font-size: 13px; font-family: var(--font); }
.json-input { font-size: 12px; font-family: var(--mono); }
.prompt:focus, .json-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft); }
.prompt::placeholder, .json-input::placeholder { color: var(--text-dim); }

/* ── Preview ── */
.preview { flex: 1; min-height: 0; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
.preview::-webkit-scrollbar { width: 3px; }
.preview::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }
.pv-header { font-size: 13px; font-weight: 600; color: var(--text); padding: 4px 0; }
.pv-desc { font-size: 12px; color: var(--text-sub); margin-bottom: 4px; }
.pv-section { padding: 12px 0; border-bottom: 1px solid var(--border); }
.pv-section:last-child { border-bottom: none; }
.pv-title { font-size: 12px; color: var(--accent); font-weight: 600; margin-bottom: 8px; letter-spacing: 0.02em; }
.pv-item { font-size: 12px; color: var(--text-sub); line-height: 1.8; display: flex; align-items: center; gap: 6px; }
.pv-color { width: 10px; height: 10px; border-radius: 3px; border: 1px solid rgba(255,255,255,0.08); flex-shrink: 0; }
.pv-variant {
  font-size: 12px; color: var(--text-sub); padding: 4px 0;
  display: flex; align-items: center; gap: 6px; font-family: var(--mono);
  border-bottom: 1px solid rgba(255,255,255,0.03);
}
.pv-variant:last-child { border-bottom: none; }

/* ── Review result ── */
.review-block { padding: 14px 0; border-bottom: 1px solid var(--border); }
.review-block:last-child { border-bottom: none; }
.review-label {
  font-size: 12px; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase; margin-bottom: 10px;
}
.review-label.asis { color: var(--yellow); }
.review-label.tobe { color: var(--green); }
.review-text { font-size: 13px; color: var(--text-sub); line-height: 1.8; }
.review-text p { margin-bottom: 8px; }
.review-text p:last-child { margin-bottom: 0; }
.review-score {
  font-size: 42px; font-family: var(--mono); font-weight: 700; text-align: center;
  padding: 8px 0; letter-spacing: -0.03em;
}
.review-score.high { color: var(--green); }
.review-score.mid { color: var(--yellow); }
.review-score.low { color: var(--red); }

/* Modifications list — clean table-like layout, no border-left accent */
.mod-list { display: flex; flex-direction: column; gap: 0; }
.mod-item {
  font-size: 13px; color: var(--text-sub);
  padding: 10px 4px; border-bottom: 1px solid var(--border);
  line-height: 1.6; cursor: pointer; transition: background 0.15s;
  margin: 0 -4px;
}
.mod-item:hover { background: var(--surface-hi); }
.mod-item:last-child { border-bottom: none; }
.mod-head { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
.mod-target { color: var(--accent); font-family: var(--mono); font-size: 12px; font-weight: 600; }
.mod-action { color: var(--text-dim); font-family: var(--mono); font-size: 12px; }
.mod-value { color: var(--text); font-weight: 600; }
.mod-reason { color: var(--text-dim); font-size: 12px; margin-top: 2px; }

/* ── Review history ── */
.hist-item { padding: 10px 0; border-bottom: 1px solid var(--border); cursor: pointer; transition: opacity 0.15s; }
.hist-item:last-child { border-bottom: none; }
.hist-item:hover { opacity: 0.8; }
.hist-head { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.hist-score { font-size: 18px; font-family: var(--mono); font-weight: 700; min-width: 32px; }
.hist-score.high { color: var(--green); }
.hist-score.mid { color: var(--yellow); }
.hist-score.low { color: var(--red); }
.hist-name { font-size: 13px; font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.hist-date { font-size: 12px; color: var(--text-dim); font-family: var(--mono); }
.hist-summary { font-size: 12px; color: var(--text-sub); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; transition: all 0.2s; }
.hist-item.expanded .hist-summary { -webkit-line-clamp: unset; display: block; }
.hist-tobe { font-size: 12px; color: var(--green); line-height: 1.6; margin-top: 8px; display: none; }
.hist-item.expanded .hist-tobe { display: block; }
.hist-del { background: none; border: none; color: var(--text-dim); font-size: 14px; cursor: pointer; padding: 2px 6px; line-height: 1; }
.hist-del:hover { color: var(--red); }

/* ── Collection list ── */
.coll-card {
  padding: 10px 0; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.coll-card:last-child { border-bottom: none; }
.coll-name { font-size: 13px; font-weight: 600; }
.coll-meta { font-size: 12px; color: var(--text-dim); font-family: var(--mono); }

/* ── Log ── */
.log { max-height: 68px; overflow-y: auto; display: flex; flex-direction: column; gap: 3px; flex-shrink: 0; }
.log:empty { display: none; }
.log-item {
  padding: 5px 0; font-size: 12px; line-height: 1.5; font-family: var(--mono);
  border-bottom: 1px solid var(--border);
  animation: fadeIn 0.2s var(--ease);
}
.log-item:last-child { border-bottom: none; }
.log-item.error { color: var(--red); }
.log-item.ok { color: var(--green); }

/* ── Selection bar ── */
.sel-bar {
  padding: 8px 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
  background: var(--surface-glass);
}
.sel-dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim);
  transition: all 0.3s var(--ease); flex-shrink: 0;
}
.sel-dot.on { background: var(--green); box-shadow: 0 0 8px rgba(52,211,153,0.4); }
.sel-name { font-size: 12px; font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sel-meta { font-size: 12px; color: var(--text-dim); font-family: var(--mono); }

/* ── Bottom bar ── */
.bottom-bar {
  padding: 10px 16px 14px; flex-shrink: 0;
  display: flex; flex-direction: column; gap: 8px;
  border-top: 1px solid var(--border);
  background: rgba(10,10,15,0.8);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
}
.status { font-size: 12px; color: var(--text-sub); text-align: center; font-family: var(--mono); }
.spinner {
  display: inline-block; width: 12px; height: 12px;
  border: 1.5px solid var(--border-hi); border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.7s linear infinite;
  vertical-align: middle; margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.btn-row { display: flex; gap: 6px; }
.btn {
  flex: 1; padding: 9px 12px; border: none; border-radius: 8px;
  font-size: 12px; font-weight: 600; cursor: pointer;
  font-family: var(--font); letter-spacing: 0.01em;
  transition: all 0.2s var(--ease); position: relative; overflow: hidden;
}
.btn:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-primary {
  background: linear-gradient(135deg, var(--accent) 0%, #8b7aff 100%);
  color: #fff; box-shadow: 0 2px 12px var(--accent-glow);
}
.btn-primary:hover:not(:disabled) { box-shadow: 0 4px 20px var(--accent-glow); transform: translateY(-1px); }
.btn-primary:active:not(:disabled) { transform: translateY(0); }
.btn-secondary {
  background: var(--surface); color: var(--text-sub);
  border: 1px solid var(--border);
}
.btn-secondary:hover:not(:disabled) { border-color: var(--border-hi); color: var(--text); background: var(--surface-hi); }
.btn-danger {
  background: var(--red-soft); color: var(--red);
  border: 1px solid rgba(248,113,113,0.15);
}
.btn-danger:hover:not(:disabled) { border-color: rgba(248,113,113,0.3); background: rgba(248,113,113,0.15); }

/* ── Resize ── */
.resize-grip {
  position: fixed; bottom: 0; right: 0; width: 16px; height: 16px;
  cursor: nwse-resize; z-index: 200; opacity: 0.2; transition: opacity 0.15s;
  display: flex; align-items: flex-end; justify-content: flex-end; padding: 3px;
}
.resize-grip:hover { opacity: 0.6; }
.hidden { display: none !important; }
</style>
</head>
<body>

<div class="layout">
  <!-- Header -->
  <div class="header">
    <span class="logo">
      <span class="logo-mark"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 8L5 2L8 8" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
      UX Review<span>.</span>AI
    </span>
    <div class="hdr-right">
      <button class="icon-btn" id="btnExpand" title="拡大/縮小">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 5V1h4M9 1h4v4M13 9v4H9M5 13H1V9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button class="icon-btn" id="btnSettings" title="設定">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5.7 1h2.6l.4 1.6a4.5 4.5 0 011.1.6l1.6-.5 1.3 2.2-1.2 1.1a4.6 4.6 0 010 1.2l1.2 1.1-1.3 2.2-1.6-.5a4.5 4.5 0 01-1.1.6L8.3 13H5.7l-.4-1.6a4.5 4.5 0 01-1.1-.6l-1.6.5-1.3-2.2 1.2-1.1a4.6 4.6 0 010-1.2L1.3 5.7l1.3-2.2 1.6.5a4.5 4.5 0 011.1-.6L5.7 1z" stroke="currentColor" stroke-width="1.2"/><circle cx="7" cy="7" r="2" stroke="currentColor" stroke-width="1.2"/></svg>
      </button>
    </div>
  </div>

  <!-- Settings -->
  <div class="settings hidden" id="settings">
    <div class="s-row">
      <span class="s-label">Model</span>
      <select class="s-select" id="modelSelect">
        <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
        <option value="gpt-5.4-nano">gpt-5.4-nano</option>
        <option value="gpt-5.4-mini">gpt-5.4-mini</option>
      </select>
    </div>
    <div class="s-row">
      <span class="s-label">API Key</span>
      <input class="s-input" id="apiKey" type="password" placeholder="APIキーを入力..." />
    </div>
    <div class="s-row">
      <button class="btn-test" id="btnTest">テスト</button>
      <span class="test-result hidden" id="testResult"></span>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" data-panel="review">Review</div>
    <div class="tab" data-panel="generate">Generate</div>
    <div class="tab" data-panel="tokens">Tokens</div>
    <div class="tab" data-panel="manage">Manage</div>
  </div>

  <!-- ═══ REVIEW TAB ═══ -->
  <div class="tab-panel active" id="panel-review">
    <div class="sel-bar">
      <div class="sel-dot" id="selDot"></div>
      <span class="sel-name" id="selName">フレームを選択してください</span>
      <span class="sel-meta" id="selMeta"></span>
    </div>
    <div class="panel-body">
      <div class="empty-state" id="reviewEmpty">
        <div class="empty-icon">✦</div>
        <div>フレームを選択して Review & Improve</div>
      </div>
      <div class="hidden" id="reviewPreview"></div>
      <div id="reviewHistorySection" class="hidden">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0 4px">
          <span class="section-title" style="padding:0">レビュー履歴</span>
          <button style="background:none;border:none;color:var(--text-dim);font-size:12px;cursor:pointer;font-family:var(--font)" id="btnClearHistory">全消去</button>
        </div>
        <div id="reviewHistoryList"></div>
      </div>
      <div class="log" id="reviewLog"></div>
    </div>
  </div>

  <!-- ═══ GENERATE TAB ═══ -->
  <div class="tab-panel" id="panel-generate">
    <div class="sub-tabs">
      <span class="sub-tab active" data-gen="prompt">自然言語</span>
      <span class="sub-tab" data-gen="code">Code</span>
      <span class="sub-tab" data-gen="history">履歴</span>
    </div>
    <div class="panel-body" style="padding-bottom:0">
      <!-- 自然言語モード -->
      <textarea class="prompt" id="prompt" placeholder="作りたいUIを自然言語で記述...&#10;&#10;例: ボタンのバリアントセット（Primary/Secondary × S/M/L）&#10;例: カード一覧画面&#10;例: SaaS向けデザイントークン"></textarea>
      <!-- Codeモード -->
      <textarea class="json-input hidden" id="codeInput" placeholder="React / HTML / Tailwind コードを貼り付け...&#10;&#10;例:&#10;<div className=&quot;p-6 bg-white rounded-xl&quot;>&#10;  <h1 className=&quot;text-2xl font-bold&quot;>カード一覧</h1>&#10;  <button className=&quot;bg-blue-600 text-white px-6 py-3 rounded-lg&quot;>&#10;    新規作成&#10;  </button>&#10;</div>"></textarea>
      <!-- 履歴モード -->
      <div class="hidden" id="genHistoryArea" style="flex:1;overflow-y:auto"></div>
      <!-- 共通 -->
      <div class="preview hidden" id="genPreview"></div>
      <div class="log" id="genLog"></div>
    </div>
  </div>

  <!-- ═══ TOKENS TAB ═══ -->
  <div class="tab-panel" id="panel-tokens">
    <div class="panel-body" style="padding-bottom:0">
      <div class="section-title">W3C Design Tokens JSON</div>
      <textarea class="json-input" id="tokenJson" placeholder='{ "color": { "primary": { "$type": "color", "$value": "#2563EB" } }, "spacing": { "sm": { "$type": "number", "$value": 8 } } }'></textarea>
      <div class="log" id="tokenLog"></div>
    </div>
  </div>

  <!-- ═══ MANAGE TAB ═══ -->
  <div class="tab-panel" id="panel-manage">
    <div class="panel-body">
      <div class="section-title">Variable Collections</div>
      <div id="collectionsList">
        <div class="empty-state" style="padding:16px"><div>読み込み中...</div></div>
      </div>
      <div class="section-title" style="margin-top:8px">操作</div>
      <div class="btn-row">
        <button class="btn btn-secondary" id="btnRefresh" style="font-weight:400;font-size:12px">更新</button>
        <button class="btn btn-danger" id="btnClearPlugin" style="font-weight:400;font-size:12px">プラグイン作成分を削除</button>
        <button class="btn btn-danger" id="btnClearAll" style="font-weight:400;font-size:12px;opacity:0.6">全削除</button>
      </div>
    </div>
  </div>

  <!-- Bottom bar -->
  <div class="bottom-bar">
    <!-- Review actions -->

<script>
// ══════════════════════════════════════════════════════════════
var $ = function(id) { return document.getElementById(id) }
function show(el) { if (el) el.classList.remove('hidden') }
function hide(el) { if (el) el.classList.add('hidden') }
function isGemini(m) { return m.indexOf('gemini') === 0 }
function esc(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }

var currentTab = 'review'
var currentSpec = null

// ══════════════════════════════════════════════════════════════
// タブ切替
// ══════════════════════════════════════════════════════════════
function switchTab(name) {
  currentTab = name
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.toggle('active', t.getAttribute('data-panel') === name) })
  document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.toggle('active', p.id === 'panel-' + name) })
  updateBottomBar()
  if (name === 'manage') parent.postMessage({ pluginMessage: { type: 'list-collections' } }, '*')
}
document.querySelectorAll('.tab').forEach(function(t) {
  t.addEventListener('click', function() { switchTab(t.getAttribute('data-panel')) })
})

var currentReview = null
var selectedNodes = []
var selectedComponentSet = null
var reviewLoading = false
var genLoading = false

function updateBottomBar() {
  // 全非表示
  hide($('statusReview')); hide($('actReview')); hide($('actReviewConfirm'))
  hide($('statusGen')); hide($('actGenInput')); hide($('actGenPreview'))
  hide($('statusTokens')); hide($('actTokens'))

  if (currentTab === 'review') {
    if (reviewLoading) { show($('statusReview')) }
    else if (selectedNodes.length) { show($('actReview')) }
  }
  // Generate
  if (currentTab === 'generate') {
    if (genLoading) { show($('statusGen')) }
    else if (currentSpec) { show($('actGenPreview')) }
    else if (genMode !== 'history') { show($('actGenInput')) }
  }
  // Tokens
  if (currentTab === 'tokens') { show($('actTokens')) }
}

// ══════════════════════════════════════════════════════════════
// 設定
// ══════════════════════════════════════════════════════════════
parent.postMessage({ pluginMessage: { type: 'load-settings' } }, '*')
$('btnSettings').addEventListener('click', function() { $('settings').classList.toggle('hidden') })
$('apiKey').addEventListener('change', saveSettings)
$('modelSelect').addEventListener('change', saveSettings)
function saveSettings() {
  parent.postMessage({ pluginMessage: { type: 'save-settings', apiKey: $('apiKey').value.trim(), model: $('modelSelect').value } }, '*')
}

// 接続テスト
$('btnTest').addEventListener('click', function() {
  var apiKey = $('apiKey').value.trim(), model = $('modelSelect').value, result = $('testResult')
  if (!apiKey) { result.className = 'test-result error'; result.textContent = '✗ APIキー未入力'; show(result); return }
  $('btnTest').disabled = true; result.className = 'test-result'; result.textContent = '...'; show(result)
  var p
  if (isGemini(model)) {
    p = fetch('https://generativelanguage.googleapis.com/v1beta/models/' + model + ':generateContent?key=' + apiKey, {
      method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ contents:[{parts:[{text:'Hi'}]}], generationConfig:{max_output_tokens:5} })
    })
  } else {
    p = fetch('https://api.openai.com/v1/chat/completions', {
      method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey}, body: JSON.stringify({model:model,messages:[{role:'user',content:'Hi'}],max_completion_tokens:5})
    })
  }
  p.then(function(r) { if (r.ok) { result.className='test-result ok'; result.textContent='✓ '+model+' OK'; saveSettings() } else { return r.json().then(function(e) { result.className='test-result error'; result.textContent='✗ '+((e.error&&e.error.message)||'HTTP '+r.status) }).catch(function() { result.className='test-result error'; result.textContent='✗ HTTP '+r.status }) } }).catch(function(e) { result.className='test-result error'; result.textContent='✗ '+e.message }).then(function() { $('btnTest').disabled=false })
})

// ══════════════════════════════════════════════════════════════
// メッセージ受信
// ══════════════════════════════════════════════════════════════
window.onmessage = function(event) {
  var msg = event.data.pluginMessage; if (!msg) return

  if (msg.type === 'settings-loaded') {
    if (msg.apiKey) $('apiKey').value = msg.apiKey
    if (msg.model) $('modelSelect').value = msg.model
    if (msg.apiKey) hide($('settings'))
    updateBottomBar()
    // 履歴読み込み
    parent.postMessage({ pluginMessage: { type: 'load-review-history' } }, '*')
  }
  if (msg.type === 'review-history') {
    renderReviewHistory(msg.history || [])
  }

  // Selection
  if (msg.type === 'selection-changed') {
    selectedNodes = msg.nodes
    selectedComponentSet = msg.componentSetInfo || null
    $('selDot').classList.add('on')
    var n = msg.nodes[0]
    if (selectedComponentSet) {
      $('selName').textContent = '◆ ' + selectedComponentSet.name + ' (' + selectedComponentSet.variantCount + ' variants)'
    } else {
      $('selName').textContent = msg.isMulti ? msg.nodes.length + 'フレームを選択中' : n.name
    }
    $('selMeta').textContent = n.width ? n.width + '×' + n.height : ''
    updateBottomBar()
  }
  if (msg.type === 'selection-cleared') {
    selectedNodes = []
    selectedComponentSet = null
    $('selDot').classList.remove('on')
    $('selName').textContent = 'フレームを選択してください'
    $('selMeta').textContent = ''
    updateBottomBar()
  }

  // Review result
  if (msg.type === 'review-applied') {
    reviewLoading = false; updateBottomBar()
    addLog('reviewLog', 'ok', '✓ To-Be生成完了 (' + msg.applied + '件適用)')
    if (msg.undoCount > 0) show($('actUndo'))
  }
  if (msg.type === 'tobe-done') {
    reviewLoading = false; updateBottomBar()
    addLog('reviewLog', 'ok', '✓ To-Be UIをキャンバスに生成しました')
    if (msg.undoCount > 0) show($('actUndo'))
  }
  if (msg.type === 'review-error') {
    reviewLoading = false; currentReview = null; updateBottomBar()
    addLog('reviewLog', 'error', msg.error)
  }

  // Generate
  if (msg.type === 'done') {
    genLoading = false; $('btnRun').disabled = false; currentSpec = null; updateBottomBar()
    addLog('genLog', 'ok', '✓ ' + (msg.summary || '生成完了'))
    if (msg.undoCount > 0) show($('actUndo'))
  }
  if (msg.type === 'error') {
    genLoading = false; $('btnRun').disabled = false; currentSpec = null; updateBottomBar()
    addLog('genLog', 'error', msg.error)
  }

  // Generate history
  if (msg.type === 'gen-history') { renderGenHistory(msg.history || []) }

  // Tokens
  if (msg.type === 'import-done') {
    hide($('statusTokens'))
    addLog('tokenLog', 'ok', '✓ ' + msg.collections + ' collections, ' + msg.variables + ' variables')
    if (msg.undoCount > 0) show($('actUndo'))
    parent.postMessage({ pluginMessage: { type: 'list-collections' } }, '*')
  }
  if (msg.type === 'import-error') {
    hide($('statusTokens'))
    addLog('tokenLog', 'error', msg.error)
  }

  // Manage
  if (msg.type === 'collections-list') { renderCollections(msg.collections) }
  if (msg.type === 'clear-done') {
    addLog('genLog', 'ok', '✓ ' + msg.count + '件削除')
    parent.postMessage({ pluginMessage: { type: 'list-collections' } }, '*')
  }

  // Undo
  if (msg.type === 'undo-done') {
    if (msg.undoCount > 0) show($('actUndo')); else hide($('actUndo'))
    if (currentTab === 'manage') parent.postMessage({ pluginMessage: { type: 'list-collections' } }, '*')
  }
}

// AI API呼び出し

function callAI(prompt) {
  var model = $('modelSelect').value, apiKey = $('apiKey').value.trim()
  if (!apiKey) return Promise.reject(new Error('APIキーを設定してください'))
  var p
  if (isGemini(model)) {
    p = fetch('https://generativelanguage.googleapis.com/v1beta/models/'+model+':generateContent?key='+apiKey, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ system_instruction:{parts:[{text:SYSTEM_PROMPT}]}, contents:[{parts:[{text:prompt}]}], generationConfig:{response_mime_type:'application/json',temperature:0.7} })
    }).then(function(r) { if(!r.ok) { if(r.status===429) throw new Error('レート制限に達しました。設定からOpenAIモデルに切り替えるか、しばらく待ってください'); return r.json().then(function(e){throw new Error((e.error&&e.error.message)||'Gemini error '+r.status)}) } return r.json() })
     .then(function(d) { return d.candidates[0].content.parts[0].text })
  } else {
    p = fetch('https://api.openai.com/v1/chat/completions', {
      method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
      body:JSON.stringify({ model:model, messages:[{role:'system',content:SYSTEM_PROMPT},{role:'user',content:prompt}], response_format:{type:'json_object'}, max_completion_tokens:8000 })
    }).then(function(r) { if(!r.ok) return r.json().then(function(e){throw new Error((e.error&&e.error.message)||'OpenAI error')}); return r.json() })
     .then(function(d) { return d.choices[0].message.content })
  }
  return p.then(function(c) { if(!c) throw new Error('空の応答'); try{return JSON.parse(c)}catch(e){ var m=c.match(/```(?:json)?\s*([\s\S]*?)\s*```/); if(m)return JSON.parse(m[1]); throw new Error('JSON解析失敗') } })
}

// ══════════════════════════════════════════════════════════════
// Review: ノード→テキスト変換
// ══════════════════════════════════════════════════════════════
function nodeToText(n, depth) {
  if (depth > 4) return ''
  var ind = ''; for (var x = 0; x < depth; x++) ind += '  '
  var s = ind + '[' + n.type + '] ' + n.name
  if (n.componentName) s += ' (Component: ' + n.componentName + ')'
  if (n.width) s += ' ' + n.width + 'x' + n.height + 'px'
  s += '\n'
  if (n.texts && n.texts.length) {
    for (var i = 0; i < Math.min(n.texts.length, 5); i++) s += ind + '  "' + n.texts[i] + '"\n'
  }
  if (n.children) { for (var i = 0; i < Math.min(n.children.length, 20); i++) s += nodeToText(n.children[i], depth + 1) }
  return s
}

function doReviewImprove() {
  if (!selectedNodes.length) return
  hide($('reviewEmpty'))

    text += nodeToText(n, 0) + '\n'
  }

  var model = $('modelSelect').value, apiKey = $('apiKey').value.trim()
  if (!apiKey) { reviewLoading = false; updateBottomBar(); $('btnReview').disabled = false; addLog('reviewLog','error','APIキーを設定してください'); return }

  if (isGemini(model)) {

      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ system_instruction:{parts:[{text:REVIEW_PROMPT}]}, contents:[{parts:[{text:text}]}], generationConfig:{response_mime_type:'application/json',temperature:0.3} })
    }).then(function(r) { if(!r.ok) { if(r.status===429) throw new Error('レート制限に達しました。設定からOpenAIモデルに切り替えるか、しばらく待ってください'); return r.json().then(function(e){throw new Error((e.error&&e.error.message)||'Gemini error '+r.status)}) } return r.json() })
     .then(function(d) { return d.candidates[0].content.parts[0].text })
  } else {
    p = fetch('https://api.openai.com/v1/chat/completions', {
      method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
      body:JSON.stringify({ model:model, messages:[{role:'system',content:REVIEW_PROMPT},{role:'user',content:text}], response_format:{type:'json_object'}, max_completion_tokens:8000 })
    }).then(function(r) { if(!r.ok) return r.json().then(function(e){throw new Error((e.error&&e.error.message)||'OpenAI error')}); return r.json() })
     .then(function(d) { return d.choices[0].message.content })
  }

  p.then(function(c) {
    var result = JSON.parse(c)
    currentReview = result
    renderReviewPreview(result)
    reviewLoading = false; $('btnReview').disabled = false; updateBottomBar()

    // 履歴に自動保存
    var frameName = selectedNodes.length ? selectedNodes[0].name : 'Unknown'
    parent.postMessage({ pluginMessage: { type: 'save-review', entry: {
      id: String(Date.now()),
      timestamp: Date.now(),
      frameName: frameName,
      score: result.score,
      asIs: result.asIs,
      toBe: result.toBe,
    }}}, '*')
  }).catch(function(e) {
    reviewLoading = false; updateBottomBar(); $('btnReview').disabled = false
    addLog('reviewLog', 'error', e.message)
  })
}

// 文章を句点で分割し段落化
function textToParagraphs(text) {
  if (!text) return ''
  // 句点「。」で分割して段落に
  var sentences = text.split(/(?<=。)/)
  var paragraphs = []
  var current = ''
  for (var i = 0; i < sentences.length; i++) {
    current += sentences[i]
    // 2文ごと、または最後の文で段落を切る
    if ((i + 1) % 2 === 0 || i === sentences.length - 1) {
      if (current.trim()) paragraphs.push('<p>' + esc(current.trim()) + '</p>')
      current = ''
    }
  }
  return paragraphs.join('')
}

function renderDetailItem(d) {
  var sevColor = d.severity === 'critical' ? 'var(--red)' : d.severity === 'good' ? 'var(--green)' : 'var(--yellow)'
  var h = '<div class="mod-item" data-target="' + (d.target || '') + '">'
  h += '<div class="mod-head">'
  if (d.target) h += '<span class="mod-target">' + d.target + '</span>'
  h += '<span class="mod-action">' + (d.category || '') + '</span>'
  h += '</div>'
  h += '<div style="margin-top:4px">' + esc(d.message || '') + '</div>'
  h += '</div>'
  return h
}

function renderReviewPreview(r) {
  var scoreClass = r.score >= 75 ? 'high' : r.score >= 50 ? 'mid' : 'low'
  var h = '<div class="review-score ' + scoreClass + '">' + r.score + '<span style="font-size:14px;color:var(--text-dim)"> / 100</span></div>'

  h += '<div class="review-block"><div class="review-label asis">現状分析</div><div class="review-text">' + textToParagraphs(r.asIs) + '</div></div>'
  h += '<div class="review-block"><div class="review-label tobe">改善提案</div><div class="review-text">' + textToParagraphs(r.toBe) + '</div></div>'

  // セベリティ別にグルーピング
  if (r.details && r.details.length) {
    var groups = { critical: [], warning: [], good: [] }
    for (var i = 0; i < r.details.length; i++) {
      var sev = r.details[i].severity || 'warning'
      if (!groups[sev]) groups[sev] = []
      groups[sev].push(r.details[i])
    }

    var sevOrder = [
      { key: 'critical', label: 'CRITICAL', color: 'var(--red)' },
      { key: 'warning', label: 'WARNING', color: 'var(--yellow)' },
      { key: 'good', label: 'GOOD', color: 'var(--green)' },
    ]

    for (var s = 0; s < sevOrder.length; s++) {
      var items = groups[sevOrder[s].key]
      if (!items || !items.length) continue
      h += '<div style="margin-top:8px"><span style="font-size:12px;font-weight:700;color:' + sevOrder[s].color + '">' + sevOrder[s].label + '</span>'
      h += '<span style="font-size:12px;color:var(--text-dim);margin-left:6px">' + items.length + '件</span></div>'
      h += '<div class="mod-list">'
      for (var j = 0; j < items.length; j++) h += renderDetailItem(items[j])
      h += '</div>'
    }
  }

  $('reviewPreview').innerHTML = h
  show($('reviewPreview'))
}

// Generate: プレビュー描画
// ══════════════════════════════════════════════════════════════
function renderPreview(spec) {
  var h = '<div class="pv-header"><strong>' + (spec.name||'Design System') + '</strong></div>'
  if (spec.description) h += '<div class="pv-desc">' + spec.description + '</div>'
  if (spec.variables && spec.variables.length) {
    for (var i=0; i<spec.variables.length; i++) {
      var col=spec.variables[i]; h+='<div class="pv-section"><div class="pv-title">📦 '+col.collection+' ('+col.variables.length+')</div>'
      for (var j=0;j<Math.min(col.variables.length,8);j++) { var v=col.variables[j]; h+=v.type==='COLOR'?'<div class="pv-item"><span class="pv-color" style="background:'+v.value+'"></span>'+v.name+'</div>':'<div class="pv-item">'+v.name+': '+v.value+'</div>' }
      if (col.variables.length>8) h+='<div class="pv-item" style="color:var(--text-dim)">...他 '+(col.variables.length-8)+'件</div>'
      h+='</div>'
    }
  }
  if (spec.components && spec.components.length) {
    for (var i=0;i<spec.components.length;i++) {
      var comp=spec.components[i]; h+='<div class="pv-section"><div class="pv-title">🧩 '+comp.name+' ('+comp.variants.length+' variants)</div>'
      for (var j=0;j<Math.min(comp.variants.length,6);j++) { var v=comp.variants[j]; var ps=Object.keys(v.props).map(function(k){return k+'='+v.props[k]}).join(', '); var dot=(v.fill&&v.fill!=='transparent')?'<span class="pv-color" style="background:'+v.fill+'"></span>':''; h+='<div class="pv-variant">'+dot+ps+'</div>' }
      if (comp.variants.length>6) h+='<div class="pv-variant" style="color:var(--text-dim)">...他 '+(comp.variants.length-6)+'件</div>'
      h+='</div>'
    }
  }
  if (spec.frames && spec.frames.length) {
    for (var i=0;i<spec.frames.length;i++) { var fr=spec.frames[i]; var cc=(fr.children&&fr.children.length)||0; h+='<div class="pv-section"><div class="pv-title">📱 '+(fr.name||'Frame')+' ('+(fr.width||'?')+'×'+(fr.height||'?')+')</div><div class="pv-item">'+cc+' children, '+(fr.layoutMode||'absolute')+'</div></div>' }
  }
  $('genPreview').innerHTML = h
}

var genHistoryData = []

function renderGenHistory(history) {

    h += '<div style="display:flex;gap:8px;margin-top:8px">'

    if (hasSpec) h += '<button class="btn btn-primary" style="flex:0;padding:4px 12px;font-size:12px" data-gen-regen="' + i + '">再生成</button>'
    h += '</div>'

  }
  el.innerHTML = h
}

$('genHistoryArea').addEventListener('click', function(ev) {
  // 削除
  var delBtn = ev.target.closest('[data-gen-del]')
  if (delBtn) {
    ev.stopPropagation()
    parent.postMessage({ pluginMessage: { type: 'delete-gen-history', id: delBtn.getAttribute('data-gen-del') } }, '*')
    return
  }
  // 入力を復元
  var reuseBtn = ev.target.closest('[data-gen-reuse]')
  if (reuseBtn) {
    var idx = parseInt(reuseBtn.getAttribute('data-gen-reuse'))
    var entry = genHistoryData[idx]
    if (!entry) return
    // モード切替 + 入力復元
    var targetMode = entry.mode === 'code' ? 'code' : 'prompt'
    document.querySelector('.sub-tab[data-gen="' + targetMode + '"]').click()
    if (targetMode === 'code') { $('codeInput').value = entry.input || '' }
    else { $('prompt').value = entry.input || '' }
    return
  }
  // 再生成（保存された spec をそのまま使用）
  var regenBtn = ev.target.closest('[data-gen-regen]')
  if (regenBtn) {
    var idx2 = parseInt(regenBtn.getAttribute('data-gen-regen'))
    var entry2 = genHistoryData[idx2]
    if (!entry2 || !entry2.spec) return
    currentSpec = entry2.spec
    // プレビューモードに切替
    document.querySelector('.sub-tab[data-gen="prompt"]').click()
    renderPreview(currentSpec)
    hide($('prompt')); show($('genPreview')); updateBottomBar()
    return
  }
})

'あなたはReact/HTML/TailwindのコードをFigmaノード構造に変換するコンバーターです。',
'入力されたコードを解析し、Figma上で再現可能なJSON構造を出力してください。',
'',
'出力形式（JSONのみ）:',

'',
'変換ルール:',
'- className の Tailwind を Figma プロパティに変換:',
'  p-4→padding:16  px-6→paddingX:24  py-3→paddingY:12',
'  gap-4→itemSpacing:16  rounded-xl→cornerRadius:12  rounded-lg→cornerRadius:8',
'  bg-white→fill:#FFFFFF  bg-blue-600→fill:#2563EB  bg-gray-100→fill:#F1F5F9',
'  text-white→color:#FFFFFF  text-gray-900→color:#0F172A  text-gray-500→color:#64748B',
'  text-2xl→fontSize:24  text-xl→fontSize:20  text-lg→fontSize:18  text-sm→fontSize:14  text-xs→fontSize:12',
'  font-bold→fontWeight:Bold  font-semibold→fontWeight:SemiBold  font-medium→fontWeight:Medium',
'  flex→layoutMode:HORIZONTAL  flex-col→layoutMode:VERTICAL',
'  w-full→fillWidth:true  space-y-4→itemSpacing:16',
'  border→stroke:#E2E8F0,strokeWidth:1  shadow→（無視）',
'- <div>→FRAME  <span>/<p>/<h1-h6>→TEXT  <button>→FRAME(ボタン)  <input>→FRAME(入力欄)',
'- <img>/<svg>/<Icon>→ELLIPSE(プレースホルダー)',
'- 全コンテナにlayoutMode必須。fill未指定のコンテナは透明（fillキー省略）',
'- テキストは日本語に翻訳しない。元のまま維持',
'- fill=#000000 禁止。ルートは fill:#FFFFFF',
].join('\n')

// ══════════════════════════════════════════════════════════════
// Generate: アクション
// ══════════════════════════════════════════════════════════════
function doGenerate() {
  var input, promptText
  if (genMode === 'code') {
    input = $('codeInput').value.trim()
    if (!input) return
    promptText = CODE_TO_FIGMA_PROMPT
  } else {
    input = $('prompt').value.trim()
    if (!input) return
    promptText = null
  }

  // ComponentSet 選択中なら既存構造を文脈に追加
  if (selectedComponentSet && genMode === 'prompt') {
    var csCtx = '\n\n【既存ComponentSet: ' + selectedComponentSet.name + '】\n'
    csCtx += '現在のバリアント:\n'
    for (var vi = 0; vi < selectedComponentSet.variants.length; vi++) {
      var v = selectedComponentSet.variants[vi]
      csCtx += '- ' + v.name + (v.fill ? ' (fill:' + v.fill + ')' : '') + '\n'
    }
    csCtx += '\nユーザーの指示に従い、既存のスタイル（色・サイズ・padding・cornerRadius）を踏襲した新しいバリアントを components として出力してください。'
    input = input + csCtx
  }

  $('btnRun').disabled = true; genLoading = true
  $('statusGenText').textContent = selectedComponentSet ? '既存セットに追加中...' : (genMode === 'code' ? 'コードを変換中...' : 'AIが構造を生成中...')
  updateBottomBar()

  var p
  if (promptText) {
    p = callAIWithPrompt(promptText, input)
  } else {
    p = callAI(input)
  }

  p.then(function(spec) {
    currentSpec = spec
    renderPreview(spec)
    hide($('prompt')); hide($('codeInput')); show($('genPreview'))
    genLoading = false; updateBottomBar()
  }).catch(function(e) {
    genLoading = false; updateBottomBar(); $('btnRun').disabled = false
    addLog('genLog', 'error', e.message)
  })
}

function doConfirm() {
  if (!currentSpec) return
  genLoading = true; $('statusGenText').textContent = 'Figmaに反映中...'; updateBottomBar()

  // 履歴に保存（入力テキスト全文 + spec）
  var fullInput = genMode === 'code' ? $('codeInput').value.trim() : $('prompt').value.trim()
  parent.postMessage({ pluginMessage: { type: 'save-gen-history', entry: {
    id: String(Date.now()),
    timestamp: Date.now(),
    mode: genMode,
    input: fullInput,
    name: currentSpec.name || 'Generated',
    spec: JSON.stringify(currentSpec).length < 50000 ? currentSpec : null,
  }}}, '*')

  // ComponentSet 選択中 + components がある場合は既存セットに追加
  if (selectedComponentSet && currentSpec.components && currentSpec.components.length) {
    var allVariants = []
    for (var ci = 0; ci < currentSpec.components.length; ci++) {
      allVariants = allVariants.concat(currentSpec.components[ci].variants)
    }
    parent.postMessage({ pluginMessage: { type: 'add-variants', componentSetId: selectedComponentSet.id, variants: allVariants } }, '*')
  } else {
    parent.postMessage({ pluginMessage: { type: 'generate', spec: currentSpec } }, '*')
  }

  currentSpec = null
  if (genMode === 'code') { show($('codeInput')) } else { show($('prompt')) }
  hide($('genPreview')); updateBottomBar()
}

function doCancel() {
  currentSpec = null; hide($('genPreview'))
  if (genMode === 'code') { show($('codeInput')) } else { show($('prompt')) }
  updateBottomBar()
}

// ══════════════════════════════════════════════════════════════
// 共通: ログ
// ══════════════════════════════════════════════════════════════
function addLog(logId, type, message) {
  var log = $(logId); if (!log) return
  var now = new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',second:'2-digit'})
  var div = document.createElement('div')
  div.className = 'log-item' + (type ? ' ' + type : '')
  div.innerHTML = '<span style="font-size:12px;color:var(--text-dim);font-family:monospace">'+now+'</span> '+message
  log.insertBefore(div, log.firstChild)
  while (log.children.length > 5) log.removeChild(log.lastChild)
}

var isExpanded = false
function postResize(w, h) {
  parent.postMessage({ pluginMessage: { type: 'resize', width: Math.round(w), height: Math.round(h) } }, '*')
}
$('btnExpand').addEventListener('click', function() {
  isExpanded = !isExpanded

})
;(function() {
  var g = $('resizeGrip'), drag = false, sx, sy, sw, sh
  g.addEventListener('mousedown', function(e) { drag = true; sx = e.clientX; sy = e.clientY; sw = window.innerWidth; sh = window.innerHeight; e.preventDefault() })
  window.addEventListener('mousemove', function(e) { if (!drag) return; postResize(Math.max(380, sw + e.clientX - sx), Math.max(400, sh + e.clientY - sy)) })
  window.addEventListener('mouseup', function() { drag = false })
})()
