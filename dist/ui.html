<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0f;
  --bg-elevated: #101018;
  --surface: rgba(255,255,255,0.04);
  --surface-hi: rgba(255,255,255,0.07);
  --surface-glass: rgba(255,255,255,0.03);
  --border: rgba(255,255,255,0.06);
  --border-hi: rgba(255,255,255,0.12);
  --border-accent: rgba(99,132,255,0.25);
  --text: #e8eaed;
  --text-sub: #9da1b5;
  --text-dim: #6b6f82;
  --accent: #6384ff;
  --accent-soft: rgba(99,132,255,0.10);
  --accent-glow: rgba(99,132,255,0.20);
  --green: #34d399;
  --green-soft: rgba(52,211,153,0.10);
  --red: #f87171;
  --red-soft: rgba(248,113,113,0.10);
  --yellow: #fbbf24;
  --yellow-soft: rgba(251,191,36,0.10);
  --font: 'Noto Sans JP', -apple-system, sans-serif;
  --mono: 'JetBrains Mono', 'SF Mono', monospace;
  --ease: cubic-bezier(0.16, 1, 0.3, 1);
}

:root[data-theme="light"] {
  --bg: #f8f9fb;
  --bg-elevated: #ffffff;
  --surface: rgba(0,0,0,0.04);
  --surface-hi: rgba(0,0,0,0.07);
  --surface-glass: rgba(0,0,0,0.02);
  --border: rgba(0,0,0,0.09);
  --border-hi: rgba(0,0,0,0.16);
  --border-accent: rgba(37,99,235,0.25);
  --text: #0f172a;
  --text-sub: #475569;
  --text-dim: #94a3b8;
  --accent: #2563eb;
  --accent-soft: rgba(37,99,235,0.08);
  --accent-glow: rgba(37,99,235,0.15);
  --green: #16a34a;
  --green-soft: rgba(22,163,74,0.08);
  --red: #dc2626;
  --red-soft: rgba(220,38,38,0.08);
  --yellow: #d97706;
  --yellow-soft: rgba(217,119,6,0.08);
}
:root[data-theme="light"] .layout { background: var(--bg); }
:root[data-theme="light"] .btn-primary { color: #fff; }
:root[data-theme="light"] .review-score { text-shadow: none; }

html, body {
  font-family: var(--font); font-size: 14px; line-height: 1.5;
  background: var(--bg); color: var(--text);
  width: 100%; height: 100%; overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

.layout {
  display: flex; flex-direction: column; height: 100vh;
  background: var(--bg);
}

/* ── Header ── */
.header {
  padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
}
.logo { font-size: 14px; font-weight: 700; letter-spacing: -0.02em; display: flex; align-items: center; gap: 6px; }
.logo-mark { width: 18px; height: 18px; border-radius: 5px; background: linear-gradient(135deg, var(--accent) 0%, #a78bfa 100%); display: flex; align-items: center; justify-content: center; }
.logo-mark svg { display: block; }
.logo span { color: var(--accent); }
.hdr-right { display: flex; gap: 4px; }
.icon-btn {
  width: 28px; height: 28px; background: transparent; border: 1px solid transparent;
  border-radius: 6px; cursor: pointer; color: var(--text-dim);
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s var(--ease);
}
.icon-btn:hover { background: var(--surface-hi); color: var(--text-sub); border-color: var(--border); }

/* ── Settings ── */
.settings {
  padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; flex-shrink: 0;
  border-bottom: 1px solid var(--border); background: var(--bg);
}
@keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: none; } }
.settings.hidden { display: none; }
.s-row { display: flex; gap: 8px; align-items: center; }
.s-label { font-size: 12px; color: var(--text-dim); width: 48px; flex-shrink: 0; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; }
.s-input, .s-select {
  flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
  padding: 6px 10px; font-size: 12px; color: var(--text); outline: none;
  font-family: var(--mono); min-width: 0; transition: all 0.2s var(--ease);
}
.s-input:focus, .s-select:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft); }
.btn-test {
  padding: 5px 14px; background: transparent; border: 1px solid var(--border);
  border-radius: 6px; font-size: 12px; color: var(--text-dim); cursor: pointer;
  font-family: var(--font); font-weight: 500; transition: all 0.2s var(--ease);
}
.btn-test:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
.btn-test:disabled { opacity: 0.3; }
.test-result { font-size: 12px; font-family: var(--mono); word-break: break-word; max-height: 36px; overflow-y: auto; flex: 1; }
.test-result.ok { color: var(--green); }
.test-result.error { color: var(--red); }

/* ── Tabs ── */
/* ── Main panel ── */
.main-panel { display: flex; flex: 1; flex-direction: column; overflow: hidden; min-height: 0; }

/* ── Common ── */
.panel-body {
  flex: 1; overflow-y: auto; padding: 12px 16px;
  display: flex; flex-direction: column; gap: 8px;
  contain: layout style;
  -webkit-overflow-scrolling: touch;
}
.panel-body::-webkit-scrollbar { width: 3px; }
.panel-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }
.panel-body::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.12); }

.empty-state {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 10px; color: var(--text-dim); font-size: 12px; text-align: center; line-height: 1.9; padding: 24px;
}
.empty-icon { font-size: 24px; opacity: 0.2; }

.section-title {
  font-size: 12px; color: var(--text-dim); font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase; padding: 6px 0 2px;
}

.prompt, .json-input {
  width: 100%; flex: 1; min-height: 0;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px; color: var(--text); outline: none;
  resize: none; line-height: 1.65; transition: all 0.2s var(--ease);
}
.prompt { font-size: 13px; font-family: var(--font); }
.json-input { font-size: 12px; font-family: var(--mono); }
.prompt:focus, .json-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft); }
.prompt::placeholder, .json-input::placeholder { color: var(--text-dim); }

/* ── Preview ── */
.preview { flex: 1; min-height: 0; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
.preview::-webkit-scrollbar { width: 3px; }
.preview::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }
.pv-header { font-size: 13px; font-weight: 600; color: var(--text); padding: 4px 0; }
.pv-desc { font-size: 12px; color: var(--text-sub); margin-bottom: 4px; }
.pv-section { padding: 12px 0; border-bottom: 1px solid var(--border); }
.pv-section:last-child { border-bottom: none; }
.pv-title { font-size: 12px; color: var(--accent); font-weight: 600; margin-bottom: 8px; letter-spacing: 0.02em; }
.pv-item { font-size: 12px; color: var(--text-sub); line-height: 1.8; display: flex; align-items: center; gap: 6px; }
.pv-color { width: 10px; height: 10px; border-radius: 3px; border: 1px solid rgba(255,255,255,0.08); flex-shrink: 0; }
.pv-variant {
  font-size: 12px; color: var(--text-sub); padding: 4px 0;
  display: flex; align-items: center; gap: 6px; font-family: var(--mono);
  border-bottom: 1px solid rgba(255,255,255,0.03);
}
.pv-variant:last-child { border-bottom: none; }

/* ── Review result ── */
.review-block { padding: 14px 0; border-bottom: 1px solid var(--border); }
.review-block:last-child { border-bottom: none; }
.review-label {
  font-size: 12px; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase; margin-bottom: 10px;
}
.review-label.asis { color: var(--yellow); }
.review-label.tobe { color: var(--green); }
.review-text { font-size: 13px; color: var(--text-sub); line-height: 1.9; letter-spacing: 0.02em; }
.review-text p { margin-bottom: 12px; }
.review-text p:last-child { margin-bottom: 0; }
.review-score {
  font-size: 42px; font-family: var(--mono); font-weight: 700; text-align: center;
  padding: 8px 0; letter-spacing: -0.03em;
}
.review-score.high { color: var(--green); }
.review-score.mid { color: var(--yellow); }
.review-score.low { color: var(--red); }

/* Modifications list — clean table-like layout, no border-left accent */
.mod-list { display: flex; flex-direction: column; gap: 0; }
.mod-item {
  font-size: 13px; color: var(--text-sub);
  padding: 12px 8px; border-bottom: 1px solid var(--border);
  line-height: 1.85; letter-spacing: 0.02em; cursor: pointer; transition: background 0.15s;
  margin: 0 -8px;
}
.mod-item:hover { background: var(--surface-hi); }
.mod-item:last-child { border-bottom: none; }
.mod-head { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
.mod-target { color: var(--accent); font-family: var(--mono); font-size: 12px; font-weight: 600; }
.mod-action { color: var(--text-dim); font-family: var(--mono); font-size: 12px; }
.mod-value { color: var(--text); font-weight: 600; }
.mod-reason { color: var(--text-dim); font-size: 12px; margin-top: 2px; }

/* ── Review mode chips ── */
.review-modes { display: flex; gap: 4px; padding: 6px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; flex-wrap: wrap; }
.r-chip {
  padding: 4px 12px; font-size: 12px; border: 1px solid var(--border); border-radius: 16px;
  color: var(--text-dim); cursor: pointer; user-select: none; transition: all 0.15s;
}
.r-chip:hover { border-color: var(--border-hi); color: var(--text-sub); }
.r-chip.active { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }

/* ── Chat ── */
.chat-section { border-top: 1px solid var(--border); padding-top: 12px; margin-top: 8px; }
.chat-messages { max-height: 240px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
.chat-messages::-webkit-scrollbar { width: 3px; }
.chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }
.chat-msg { font-size: 13px; line-height: 1.85; padding: 10px 14px; border-radius: 12px; max-width: 88%; letter-spacing: 0.02em; }
.chat-msg.user { background: var(--accent-soft); color: var(--text); align-self: flex-end; border-bottom-right-radius: 4px; }
.chat-msg.ai { background: var(--surface); color: var(--text-sub); align-self: flex-start; border: 1px solid var(--border); border-bottom-left-radius: 4px; }
.chat-input-row { display: flex; gap: 8px; margin-top: 8px; align-items: flex-end; }
.chat-input {
  flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  padding: 8px 12px; font-size: 13px; color: var(--text); outline: none; font-family: var(--font);
  resize: vertical; min-height: 40px; max-height: 120px; line-height: 1.6;
}
.chat-input:focus { border-color: var(--accent); }
.chat-input::placeholder { color: var(--text-dim); }
.chat-hint { font-size: 10px; color: var(--text-dim); margin-top: 4px; }
.chat-send {
  padding: 8px 16px; background: var(--accent); color: #fff; border: none; border-radius: 8px;
  font-size: 13px; font-weight: 500; cursor: pointer; font-family: var(--font); white-space: nowrap;
  min-height: 40px;
}
.chat-send:hover { opacity: 0.88; }

/* ── Review context ── */
.review-context { padding: 0 0 8px; display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }
.review-context summary {
  font-size: 12px; color: var(--text-sub); cursor: pointer; user-select: none; padding: 4px 0;
}
.review-context summary:hover { color: var(--text); }
.review-context-body { display: flex; flex-direction: column; gap: 6px; padding-top: 4px; }
.ctx-label { font-size: 11px; color: var(--text-dim); font-weight: 500; }
.ctx-textarea {
  width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
  padding: 6px 10px; font-size: 12px; color: var(--text); outline: none; font-family: var(--font);
  resize: vertical; min-height: 36px; max-height: 80px; line-height: 1.5;
}
.ctx-textarea:focus { border-color: var(--accent); }
.ctx-textarea::placeholder { color: var(--text-dim); }

/* ── Image paste preview ── */
.img-preview-wrap { position: relative; display: inline-block; margin-top: 4px; }
.img-preview { max-width: 100%; max-height: 120px; border-radius: 6px; border: 1px solid var(--border); }
.img-remove {
  position: absolute; top: -6px; right: -6px; width: 20px; height: 20px;
  background: var(--red); color: #fff; border: none; border-radius: 50%;
  font-size: 12px; line-height: 20px; text-align: center; cursor: pointer;
}
.paste-hint { font-size: 10px; color: var(--text-dim); margin-top: 2px; }

/* ── Review actions ── */
.review-actions { display: flex; gap: 8px; flex-shrink: 0; padding: 4px 0; }

/* ── Copy button (per section) ── */
.copy-btn {
  background: none; border: 1px solid var(--border); border-radius: 4px;
  color: var(--text-dim); cursor: pointer; padding: 2px 6px; font-size: 12px;
  font-family: var(--font); transition: all 0.15s; flex-shrink: 0; line-height: 1;
}
.copy-btn:hover { border-color: var(--accent); color: var(--accent); }
.copy-btn.copied { border-color: var(--green); color: var(--green); }
.block-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }

/* ── Review history ── */
.hist-item { padding: 10px 0; border-bottom: 1px solid var(--border); cursor: pointer; transition: opacity 0.15s; }
.hist-item:last-child { border-bottom: none; }
.hist-item:hover { opacity: 0.8; }
.hist-head { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.hist-score { font-size: 18px; font-family: var(--mono); font-weight: 700; min-width: 32px; }
.hist-score.high { color: var(--green); }
.hist-score.mid { color: var(--yellow); }
.hist-score.low { color: var(--red); }
.hist-name { font-size: 13px; font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.hist-date { font-size: 12px; color: var(--text-dim); font-family: var(--mono); }
.hist-summary { font-size: 12px; color: var(--text-sub); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; transition: all 0.2s; }
.hist-item.expanded .hist-summary { -webkit-line-clamp: unset; display: block; }
.hist-tobe { font-size: 12px; color: var(--green); line-height: 1.6; margin-top: 8px; display: none; }
.hist-item.expanded .hist-tobe { display: block; }
.hist-del { background: none; border: none; color: var(--text-dim); font-size: 14px; cursor: pointer; padding: 2px 6px; line-height: 1; }
.hist-del:hover { color: var(--red); }

/* ── Collection list ── */
.coll-card {
  padding: 10px 0; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.coll-card:last-child { border-bottom: none; }
.coll-name { font-size: 13px; font-weight: 600; }
.coll-meta { font-size: 12px; color: var(--text-dim); font-family: var(--mono); }

/* ── Log ── */
.log { max-height: 68px; overflow-y: auto; display: flex; flex-direction: column; gap: 3px; flex-shrink: 0; }
.log:empty { display: none; }
.log-item {
  padding: 5px 0; font-size: 12px; line-height: 1.5; font-family: var(--mono);
  border-bottom: 1px solid var(--border);
  animation: fadeIn 0.2s var(--ease);
}
.log-item:last-child { border-bottom: none; }
.log-item.error { color: var(--red); }
.log-item.ok { color: var(--green); }

/* ── Selection bar ── */
.sel-bar {
  padding: 8px 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
  background: var(--surface);
}
.sel-dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim);
  transition: all 0.3s var(--ease); flex-shrink: 0;
}
.sel-dot.on { background: var(--green); box-shadow: 0 0 8px rgba(52,211,153,0.4); }
.sel-name { font-size: 12px; font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sel-meta { font-size: 12px; color: var(--text-dim); font-family: var(--mono); }

/* ── Bottom bar ── */
.bottom-bar {
  padding: 10px 16px 14px; flex-shrink: 0;
  display: flex; flex-direction: column; gap: 8px;
  border-top: 1px solid var(--border);
  background: var(--bg);
}
.status { font-size: 12px; color: var(--text-sub); text-align: center; font-family: var(--mono); }
.spinner {
  display: inline-block; width: 12px; height: 12px;
  border: 1.5px solid var(--border-hi); border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.7s linear infinite;
  vertical-align: middle; margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.btn-row { display: flex; gap: 6px; }
.btn {
  flex: 1; padding: 9px 12px; border: none; border-radius: 8px;
  font-size: 12px; font-weight: 600; cursor: pointer;
  font-family: var(--font); letter-spacing: 0.01em;
  transition: all 0.2s var(--ease); position: relative; overflow: hidden;
}
.btn:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-primary {
  background: linear-gradient(135deg, var(--accent) 0%, #8b7aff 100%);
  color: #fff; box-shadow: 0 2px 12px var(--accent-glow);
}
.btn-primary:hover:not(:disabled) { box-shadow: 0 4px 20px var(--accent-glow); transform: translateY(-1px); }
.btn-primary:active:not(:disabled) { transform: translateY(0); }
.btn-secondary {
  background: var(--surface); color: var(--text-sub);
  border: 1px solid var(--border);
}
.btn-secondary:hover:not(:disabled) { border-color: var(--border-hi); color: var(--text); background: var(--surface-hi); }
.btn-danger {
  background: var(--red-soft); color: var(--red);
  border: 1px solid rgba(248,113,113,0.15);
}
.btn-danger:hover:not(:disabled) { border-color: rgba(248,113,113,0.3); background: rgba(248,113,113,0.15); }

/* ── Resize grips ── */
.resize-edge {
  position: fixed; z-index: 200; opacity: 0;
}
.resize-edge:hover { opacity: 1; background: var(--accent); }
.resize-edge.left   { top: 8px; left: 0; width: 5px; height: calc(100% - 16px); cursor: ew-resize; }
.resize-edge.right  { top: 8px; right: 0; width: 5px; height: calc(100% - 16px); cursor: ew-resize; }
.resize-edge.top    { top: 0; left: 8px; width: calc(100% - 16px); height: 5px; cursor: ns-resize; }
.resize-edge.bottom { bottom: 0; left: 8px; width: calc(100% - 16px); height: 5px; cursor: ns-resize; }
.resize-corner {
  position: fixed; width: 12px; height: 12px; z-index: 201; opacity: 0;
}
.resize-corner:hover { opacity: 1; background: var(--accent); border-radius: 2px; }
.resize-corner.tl { top: 0; left: 0; cursor: nwse-resize; }
.resize-corner.tr { top: 0; right: 0; cursor: nesw-resize; }
.resize-corner.bl { bottom: 0; left: 0; cursor: nesw-resize; }
.resize-corner.br { bottom: 0; right: 0; cursor: nwse-resize; }

.hidden { display: none !important; }
</style>
</head>
<body>

<div class="resize-edge left" id="resizeL"></div>
<div class="resize-edge right" id="resizeR"></div>
<div class="resize-edge top" id="resizeT"></div>
<div class="resize-edge bottom" id="resizeB"></div>
<div class="resize-corner tl" id="resizeTL"></div>
<div class="resize-corner tr" id="resizeTR"></div>
<div class="resize-corner bl" id="resizeBL"></div>
<div class="resize-corner br" id="resizeBR"></div>
<div class="layout">
  <!-- Header -->
  <div class="header">
    <span class="logo">
      <span class="logo-mark"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 8L5 2L8 8" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
      UX Review<span>.</span>AI
    </span>
    <div class="hdr-right">
      <button class="icon-btn" id="btnTheme" title="ライト/ダーク切替">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" id="iconTheme"><circle cx="7" cy="7" r="3" stroke="currentColor" stroke-width="1.3"/><path d="M7 1v1.5M7 11.5V13M1 7h1.5M11.5 7H13M3 3l1.1 1.1M9.9 9.9L11 11M11 3l-1.1 1.1M4.1 9.9L3 11" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      </button>
      <button class="icon-btn" id="btnExpand" title="拡大/縮小">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 5V1h4M9 1h4v4M13 9v4H9M5 13H1V9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button class="icon-btn" id="btnSettings" title="設定">

<script>

var $ = function(id) { return document.getElementById(id) }

var currentTab = 'review'

$('btnTest').addEventListener('click', function() {

  $('btnTest').disabled = true; result.className = 'test-result'; result.textContent = '...'; show(result)
  var p
  if (isGemini(model)) {
    p = fetch('https://generativelanguage.googleapis.com/v1beta/models/' + model + ':generateContent?key=' + apiKey, {
      method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ contents:[{parts:[{text:'Hi'}]}], generationConfig:{max_output_tokens:5} })

})

// メッセージ受信

window.onmessage = function(event) {
  var msg = event.data.pluginMessage; if (!msg) return

  if (msg.type === 'settings-loaded') {
    if (msg.apiKey) $('apiKey').value = msg.apiKey
    if (msg.model) $('modelSelect').value = msg.model
    if (msg.locale) userLocale = msg.locale
    if (msg.apiKey) hide($('settings'))
    updateBottomBar()
    parent.postMessage({ pluginMessage: { type: 'load-review-history' } }, '*')
  }
  if (msg.type === 'review-history') {
    renderReviewHistory(msg.history || [])
  }

  // Selection
  if (msg.type === 'selection-changed') {
    selectedNodes = msg.nodes
    selectedComponentSet = msg.componentSetInfo || null
    $('selDot').classList.add('on')
    var n = msg.nodes[0]
    if (selectedComponentSet) {
      $('selName').textContent = '◆ ' + selectedComponentSet.name + ' (' + selectedComponentSet.variantCount + ' variants)'
    } else {
      if (msg.isMulti) {
        var names = msg.nodes.slice(0, 3).map(function(nd) { return nd.name })
        $('selName').textContent = names.join(' / ') + (msg.nodes.length > 3 ? ' +' + (msg.nodes.length - 3) : '')
      } else {
        $('selName').textContent = n.name
      }
    }
    $('selMeta').textContent = msg.isMulti ? msg.nodes.length + '件選択' : (n.width ? n.width + '×' + n.height : '')
    updateBottomBar()
  }
  if (msg.type === 'selection-cleared') {
    selectedNodes = []
    selectedComponentSet = null
    $('selDot').classList.remove('on')
    $('selName').textContent = 'フレームを選択してください'
    $('selMeta').textContent = ''
    updateBottomBar()
  }

  // Review result
  if (msg.type === 'review-applied') {
    reviewLoading = false; updateBottomBar()
    addLog('reviewLog', 'ok', '✓ To-Be生成完了 (' + msg.applied + '件適用)')
    if (msg.undoCount > 0) show($('actUndo'))
  }
  if (msg.type === 'tobe-done') {
    reviewLoading = false; updateBottomBar()
    addLog('reviewLog', 'ok', '✓ To-Be UIをキャンバスに生成しました')
    if (msg.undoCount > 0) show($('actUndo'))
  }
  if (msg.type === 'review-error') {
    reviewLoading = false; currentReview = null; updateBottomBar()
    addLog('reviewLog', 'error', msg.error)
  }

  // Undo
  if (msg.type === 'undo-done') {
    if (msg.undoCount > 0) show($('actUndo')); else hide($('actUndo'))
  }

  // Static Checks → AI レビューへ続行
  if (msg.type === 'static-check-results') {
    pendingStaticFindings = msg.findings || []
    proceedWithAIReview(pendingStaticFindings)
  }
}

// ══════════════════════════════════════════════════════════════
// Review: ノード→テキスト変換
// ══════════════════════════════════════════════════════════════
function nodeToText(n, depth) {
  if (depth > 4) return ''
  var ind = ''; for (var x = 0; x < depth; x++) ind += '  '
  var s = ind + '[' + n.type + '] ' + n.name
  if (n.componentName) s += ' (Component: ' + n.componentName + ')'
  if (n.width) s += ' ' + n.width + 'x' + n.height + 'px'
  // レイアウト情報
  if (n.layout) s += ' [layout:' + n.layout + (n.gap != null ? ' gap:' + n.gap : '') + ']'
  if (n.hidden) s += ' [hidden]'
  if (n.opacity != null && n.opacity < 1) s += ' [opacity:' + n.opacity + ']'
  if (n.fill) s += ' [fill:' + n.fill + ']'
  if (n.clickable) s += ' [clickable]'
  if (n.connector) s += ' [connector-line]'
  // 子要素サマリー
  if (n.children && n.children.length > 0) s += ' [children:' + n.children.length + ']'
  s += '\n'
  // パターンヒント
  if (n.hints && n.hints.length) {
    for (var h = 0; h < n.hints.length; h++) s += ind + '  ⚑ ' + n.hints[h] + '\n'
  }
  if (n.texts && n.texts.length) {
    for (var i = 0; i < Math.min(n.texts.length, 5); i++) s += ind + '  "' + n.texts[i] + '"\n'
  }
  if (n.children) { for (var i = 0; i < Math.min(n.children.length, 20); i++) s += nodeToText(n.children[i], depth + 1) }
  return s
}

function setupImagePaste(textareaId, previewId, setter) {
  var el = $(textareaId)
  if (!el) return
  el.addEventListener('paste', function(e) {
    var items = (e.clipboardData || {}).items || []
    for (var i = 0; i < items.length; i++) {
      if (items[i].type.indexOf('image') !== -1) {
        e.preventDefault()
        var file = items[i].getAsFile()
        var reader = new FileReader()
        reader.onload = function(ev) {
          var dataUrl = ev.target.result
          var parts = dataUrl.split(',')
          var mime = parts[0].match(/:(.*?);/)[1]
          var b64 = parts[1]
          setter({ base64: b64, mime: mime })
          var wrap = $(previewId)
          wrap.innerHTML = '<div class="img-preview-wrap"><img class="img-preview" src="' + dataUrl + '"/><button class="img-remove" id="rm_' + previewId + '">×</button></div>'
          wrap.querySelector('.img-remove').addEventListener('click', function() { setter(null); wrap.innerHTML = '' })
        }
        reader.readAsDataURL(file)
        return
      }
    }
  })
}

  var apiKey = $('apiKey').value.trim()
  if (!apiKey) { reviewLoading = false; updateBottomBar(); $('btnReview').disabled = false; addLog('reviewLog','error','APIキーを設定してください'); return }

  // 全モードで静的チェックを実行
  $('statusReviewText').textContent = '構造チェック中...'; updateBottomBar()
  parent.postMessage({ pluginMessage: { type: 'run-static-checks' } }, '*')
}

function proceedWithAIReview(staticFindings) {
  $('statusReviewText').textContent = 'AIがデザインを分析中...'

  var text = pendingReviewText
  // 静的チェック結果があれば AI プロンプトのコンテキストに追加
  if (staticFindings.length) {
    text += '\n\n## 静的チェック結果（自動検出済み。重複指摘は不要、より高度な分析に集中してください）\n'
    for (var s = 0; s < staticFindings.length; s++) {
      var f = staticFindings[s]
      text += '- [' + f.category + '] "' + f.target + '": ' + f.message + '\n'
    }
  }

  var model = $('modelSelect').value, apiKey = $('apiKey').value.trim()

  var langSuffix = (userLocale.indexOf('ja') === 0)
    ? '\n\n出力言語: 日本語'
    : '\n\nOutput language: English. All messages, categories and suggestions must be in English.'
  var reviewContext = collectReviewContext()
  var fullPrompt = REVIEW_PROMPT + reviewContext + (REVIEW_MODE_PROMPTS[reviewMode] || '') + langSuffix

  // マルチモーダル対応: 画像があれば添付
  var img = ctxImage
  var p
  if (isGemini(model)) {
    var contentParts = [{text: text}]
    if (img) contentParts.push({inline_data: {mime_type: img.mime, data: img.base64}})
    p = fetch('https://generativelanguage.googleapis.com/v1beta/models/'+model+':generateContent?key='+apiKey, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ system_instruction:{parts:[{text:fullPrompt}]}, contents:[{parts:contentParts}], generationConfig:{response_mime_type:'application/json',temperature:0.7} })
    }).then(function(r) { if(!r.ok) { if(r.status===429) throw new Error('レート制限。OpenAIに切り替えてください'); return r.json().then(function(e){throw new Error((e.error&&e.error.message)||'Gemini error '+r.status)}) } return r.json() })
     .then(function(d) { return d.candidates[0].content.parts[0].text })
  } else {
    var userContent = img
      ? [{type:'text',text:text},{type:'image_url',image_url:{url:'data:'+img.mime+';base64,'+img.base64}}]
      : text
    p = fetch('https://api.openai.com/v1/chat/completions', {
      method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
      body:JSON.stringify({ model:model, messages:[{role:'system',content:fullPrompt},{role:'user',content:userContent}], response_format:{type:'json_object'}, max_completion_tokens:8000 })
    }).then(function(r) { if(!r.ok) return r.json().then(function(e){throw new Error((e.error&&e.error.message)||'OpenAI error')}); return r.json() })
     .then(function(d) { return d.choices[0].message.content })
  }

  p.then(function(c) {
    var result = JSON.parse(c)
    // 静的チェック結果を details の先頭にマージ
    var aiDetails = (result.details || []).map(function(d) { d.source = 'ai'; return d })
    var specDetails = (pendingStaticFindings || []).map(function(d) { d.source = 'static'; return d })
    result.details = specDetails.concat(aiDetails)
    currentReview = result
    renderReviewPreview(result)
    reviewLoading = false; $('btnReview').disabled = false; updateBottomBar()
    initChat()
    // SpecBridge API で仕様根拠を非同期追加
    enrichWithSpecs(result.details)

    // 履歴に自動保存
    var frameName = selectedNodes.length ? selectedNodes[0].name : 'Unknown'
    parent.postMessage({ pluginMessage: { type: 'save-review', entry: {
      id: String(Date.now()),
      timestamp: Date.now(),
      frameName: frameName,
      score: result.score,
      asIs: result.asIs,
      toBe: result.toBe,
    }}}, '*')
  }).catch(function(e) {
    reviewLoading = false; updateBottomBar(); $('btnReview').disabled = false
    addLog('reviewLog', 'error', e.message)
  })
}

// 文章を句点で分割し段落化
function textToParagraphs(text) {
  if (!text) return ''
  var formatted = esc(text)
  // セクションキーワードで改行+強調
  var keywords = ['問題[：:]', 'アクション[：:]', '参考[：:]', 'なぜ問題か[：:]', 'どう直すか[：:]', '直さないと[：:]', '根拠[：:]', '判断基準[：:]']
  for (var ki = 0; ki < keywords.length; ki++) {
    formatted = formatted.replace(new RegExp('(' + keywords[ki] + ')', 'g'), '</p><p><strong>$1</strong>')
  }
  // URL をリンク化
  formatted = formatted.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" style="color:var(--accent);word-break:break-all">$1</a>')
  // 改行で段落分け
  var parts = formatted.split(/\n+/)
  var paragraphs = []
  for (var i = 0; i < parts.length; i++) {
    if (parts[i].trim()) paragraphs.push('<p>' + parts[i].trim() + '</p>')
  }
  return paragraphs.join('')
}

// SpecBridge API: レビュー結果に仕様根拠を非同期追加
function enrichWithSpecs(details) {
  if (!details || !details.length) return
  details.forEach(function(d, idx) {
    if (d.severity !== 'critical' && d.severity !== 'warning') return
    if (d.source === 'static') return
    // クエリ: category + target + message の1行目
    var q = (d.category || '') + ' ' + (d.target || '') + ' ' + ((d.message || '').split('\n')[0] || '').slice(0, 100)
    var ctrl = new AbortController()
    var timer = setTimeout(function() { ctrl.abort() }, 2000)
    fetch('https://a11y-spec-bridge.vercel.app/api/spec-search', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query: q.trim(), k: 2 }),
      signal: ctrl.signal
    }).then(function(r) { clearTimeout(timer); return r.ok ? r.json() : null })
    .then(function(data) {
      if (!data || !data.results) return
      var refs = data.results.filter(function(r) { return r.score >= 0.6 })
      if (!refs.length) return
      // 該当の mod-item に根拠リンクを追加
      var items = document.querySelectorAll('.mod-item')
      if (items[idx]) {
        var refDiv = document.createElement('div')
        refDiv.style.cssText = 'margin-top:6px;font-size:11px;color:var(--text-dim)'
        refDiv.innerHTML = refs.map(function(r) {
          return '<a href="' + esc(r.url) + '" target="_blank" style="color:var(--accent);margin-right:8px">' + esc(r.source + ': ' + r.title) + '</a>'
        }).join('')
        items[idx].appendChild(refDiv)
      }
    }).catch(function() { /* API失敗時はスキップ */ })
  })
}

function renderDetailItem(d, idx) {
  var sourceTag = d.source === 'static' ? '[SPEC] ' : ''
  var text = sourceTag + '[' + (d.severity || '').toUpperCase() + '] ' + (d.category || '') + '\n'
  if (d.target) text += '対象: ' + d.target + '\n'
  text += (d.message || '')

  var h = '<div class="mod-item" data-target="' + esc(d.target || '') + '">'
  h += '<div class="mod-head">'
  if (d.source === 'static') h += '<span style="font-size:10px;padding:1px 5px;border-radius:3px;background:var(--accent-soft);color:var(--accent);font-weight:600;margin-right:4px;letter-spacing:0.03em">SPEC</span>'
  if (d.target) h += '<span class="mod-target">' + esc(d.target) + '</span>'
  h += '<span class="mod-action">' + esc(d.category || '') + '</span>'
  h += '<button class="copy-btn" data-copy-text="' + esc(text).replace(/\n/g, '&#10;') + '">Copy</button>'
  h += '</div>'
  h += '<div style="margin-top:4px">' + esc(d.message || '') + '</div>'
  h += '</div>'
  return h
}

function renderReviewPreview(r) {
  var scoreClass = r.score >= 75 ? 'high' : r.score >= 50 ? 'mid' : 'low'
  var h = '<div class="review-score ' + scoreClass + '">' + r.score + '<span style="font-size:14px;color:var(--text-dim)"> / 100</span></div>'

  // 識別パターン
  if (r.pattern) {
    h += '<div style="text-align:center;margin:-4px 0 8px;font-size:12px;color:var(--accent);font-weight:500">' + esc(r.pattern) + '</div>'
  }

  // 現状分析
  h += '<div class="review-block">'
  h += '<div class="block-header"><span class="review-label asis">現状分析</span><button class="copy-btn" data-copy-section="asIs">Copy</button></div>'
  h += '<div class="review-text">' + textToParagraphs(r.asIs) + '</div></div>'

  // 改善提案
  h += '<div class="review-block">'
  h += '<div class="block-header"><span class="review-label tobe">改善提案</span><button class="copy-btn" data-copy-section="toBe">Copy</button></div>'
  h += '<div class="review-text">' + textToParagraphs(r.toBe) + '</div></div>'

  // セベリティ別にグルーピング
  if (r.details && r.details.length) {
    var groups = { critical: [], warning: [], good: [] }
    for (var i = 0; i < r.details.length; i++) {
      var sev = r.details[i].severity || 'warning'
      if (!groups[sev]) groups[sev] = []
      groups[sev].push(r.details[i])
    }

    var sevOrder = [
      { key: 'critical', label: 'CRITICAL', color: 'var(--red)' },
      { key: 'warning', label: 'WARNING', color: 'var(--yellow)' },
      { key: 'good', label: 'GOOD', color: 'var(--green)' },
    ]

    for (var s = 0; s < sevOrder.length; s++) {
      var items = groups[sevOrder[s].key]
      if (!items || !items.length) continue
      h += '<div style="margin-top:8px"><span style="font-size:12px;font-weight:700;color:' + sevOrder[s].color + '">' + sevOrder[s].label + '</span>'
      h += '<span style="font-size:12px;color:var(--text-dim);margin-left:6px">' + items.length + '件</span></div>'
      h += '<div class="mod-list">'
      for (var j = 0; j < items.length; j++) h += renderDetailItem(items[j], j)
      h += '</div>'
    }
  }

  $('reviewPreview').innerHTML = h
  show($('reviewPreview'))
  show($('reviewActions'))
}

// 個別コピー（イベントデリゲーション）
$('reviewPreview').addEventListener('click', function(ev) {
  var copyBtn = ev.target.closest('.copy-btn')
  if (!copyBtn) return
  ev.stopPropagation()

  var text = ''
  // セクション単位コピー
  var section = copyBtn.getAttribute('data-copy-section')
  if (section && currentReview) {
    text = currentReview[section] || ''
  }
  // 個別指摘コピー
  var copyText = copyBtn.getAttribute('data-copy-text')
  if (copyText) {
    text = copyText.replace(/&#10;/g, '\n')
  }

  if (!text) return
  navigator.clipboard.writeText(text).then(function() {
    copyBtn.textContent = '✓'; copyBtn.classList.add('copied')
    setTimeout(function() { copyBtn.textContent = 'Copy'; copyBtn.classList.remove('copied') }, 1200)
  }).catch(function() {
    var ta = document.createElement('textarea')
    ta.value = text; ta.style.cssText = 'position:fixed;top:-9999px'
    document.body.appendChild(ta); ta.select(); document.execCommand('copy')
    document.body.removeChild(ta)
    copyBtn.textContent = '✓'; copyBtn.classList.add('copied')
    setTimeout(function() { copyBtn.textContent = 'Copy'; copyBtn.classList.remove('copied') }, 1200)
  })
})

var chatHistory = []

function initChat() {
  if (!currentReview) return
  var reviewSummary = 'スコア: ' + currentReview.score + '/100'
  if (currentReview.pattern) reviewSummary += '\nパターン: ' + currentReview.pattern
  reviewSummary += '\n現状分析: ' + (currentReview.asIs || '')
  reviewSummary += '\n改善提案: ' + (currentReview.toBe || '')
  reviewSummary += '\n指摘:\n' + ((currentReview.details || []).map(function(d) { return '[' + d.severity + '] ' + d.category + ': ' + d.message }).join('\n'))

  chatHistory = [
    { role: 'system', content: [
      'あなたはUI/UXデザインの専門家です。デザイナーからの質問に日本語で答えてください。',
      '',
      '【回答ルール】',
      '- 質問の大きさに応じて回答量を調整すること',
      '- 簡単な質問（はい/いいえ、1点の確認）→ 1-3文で簡潔に',
      '- 具体的な改善依頼 → 5-8文で具体案を提示',
      '- 「Figma上でどこをどう変えるか」を具体的に書く',
      '- 長文の箇条書きを安易に使わない',
      '',
      '【前のレビュー結果（この会話の文脈）】',
      reviewSummary,
    ].join('\n') }
  ]
  $('chatMessages').innerHTML = ''
  show($('chatSection'))
}

function sendChat() {
  var text = $('chatInput').value.trim()
  if (!text && !chatImage) return
  $('chatInput').value = ''
  var img = chatImage
  chatImage = null; $('chatImgPreview').innerHTML = ''

  // 選択中ノードの情報を自動付加（全体レビュー後に部分を選択した場合の文脈）
  var contextPrefix = ''
  if (selectedNodes.length) {
    var sel = selectedNodes[0]
    contextPrefix = '[現在選択中: ' + sel.name + ' (' + sel.width + 'x' + sel.height + 'px)]\n'
  }

  // ユーザーメッセージ表示
  var userDiv = document.createElement('div')
  userDiv.className = 'chat-msg user'
  if (img) userDiv.innerHTML = '<img src="data:' + img.mime + ';base64,' + img.base64 + '" style="max-width:100%;max-height:100px;border-radius:4px;margin-bottom:4px;display:block">' + esc(text || '')
  else userDiv.textContent = text
  $('chatMessages').appendChild(userDiv)

  // チャット履歴にマルチモーダル対応で追加
  var fullText = contextPrefix + (text || '')
  if (img) {
    chatHistory.push({ role: 'user', content: fullText || '画像を確認してください', _img: img })
  } else {
    chatHistory.push({ role: 'user', content: fullText })
  }

  // AI呼び出し
  var model = $('modelSelect').value, apiKey = $('apiKey').value.trim()
  if (!apiKey) return

  var p
  if (isGemini(model)) {
    var geminiContents = []
    for (var i = 0; i < chatHistory.length; i++) {
      var ch = chatHistory[i]
      if (ch.role === 'system') continue
      var parts = [{ text: ch.content || '' }]
      if (ch._img) parts.push({ inline_data: { mime_type: ch._img.mime, data: ch._img.base64 } })
      geminiContents.push({ role: ch.role === 'assistant' ? 'model' : 'user', parts: parts })
    }
    p = fetch('https://generativelanguage.googleapis.com/v1beta/models/' + model + ':generateContent?key=' + apiKey, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ system_instruction: { parts: [{ text: chatHistory[0].content }] }, contents: geminiContents })
    }).then(function(r) { if (!r.ok) throw new Error('API error'); return r.json() })
      .then(function(d) { return d.candidates[0].content.parts[0].text })
  } else {
    var oaiMessages = []
    for (var j = 0; j < chatHistory.length; j++) {
      var m = chatHistory[j]
      if (m._img) {
        oaiMessages.push({ role: 'user', content: [
          { type: 'text', text: m.content || '画像を確認してください' },
          { type: 'image_url', image_url: { url: 'data:' + m._img.mime + ';base64,' + m._img.base64 } }
        ]})
      } else {
        oaiMessages.push({ role: m.role, content: m.content })
      }
    }
    p = fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
      body: JSON.stringify({ model: model, messages: oaiMessages, max_completion_tokens: text.length < 30 ? 500 : 1500 })
    }).then(function(r) { if (!r.ok) throw new Error('API error'); return r.json() })
      .then(function(d) { return d.choices[0].message.content })
  }

  p.then(function(reply) {
    chatHistory.push({ role: 'assistant', content: reply })
    var aiDiv = document.createElement('div')
    aiDiv.className = 'chat-msg ai'
    aiDiv.innerHTML = esc(reply).replace(/\n/g, '<br>')
    $('chatMessages').appendChild(aiDiv)
    $('chatMessages').scrollTop = $('chatMessages').scrollHeight
  }).catch(function(e) {
    addLog('reviewLog', 'error', 'チャットエラー: ' + e.message)
  })
}

$('btnChat').addEventListener('click', sendChat)

  // IME変換中（isComposing）は無視。Cmd+Enter or Ctrl+Enter で送信
  if (e.key === 'Enter' && !e.isComposing && (e.metaKey || e.ctrlKey)) { e.preventDefault(); sendChat() }
})

function copyToClipboard(text, btn, label) {
  var ta = document.createElement('textarea')
  ta.value = text
  ta.style.cssText = 'position:fixed;top:0;left:0;width:1px;height:1px;opacity:0.01'
  document.body.appendChild(ta)
  ta.focus(); ta.select()
  try { document.execCommand('copy') } catch(e) {}
  document.body.removeChild(ta)
  // clipboard API も試行（成功すれば上書き）
  try { navigator.clipboard.writeText(text) } catch(e) {}
  if (btn) {
    var orig = btn.textContent
    btn.textContent = '✓ Copied'
    setTimeout(function() { btn.textContent = label || orig }, 1500)
  }
}

$('btnCopyReview').addEventListener('click', function() {
  var md = reviewToMarkdown()
  if (!md) return
  copyToClipboard(md, $('btnCopyReview'), '全文コピー')
})

$('btnDlReview').addEventListener('click', function() {
  var md = reviewToMarkdown()
  if (!md) return
  var blob = new Blob([md], { type: 'text/markdown' })
  var url = URL.createObjectURL(blob)
  var a = document.createElement('a')
  a.href = url
  a.download = 'ux-review-' + new Date().toISOString().slice(0,10) + '.md'
  a.click()
  URL.revokeObjectURL(url)
})

// 四辺+四隅ドラッグリサイズ
;(function() {
  var mode = null, sx, sy, sw, sh
  function startDrag(m) { return function(e) { mode = m; sx = e.clientX; sy = e.clientY; sw = window.innerWidth; sh = window.innerHeight; e.preventDefault() } }
  $('resizeL').addEventListener('mousedown', startDrag('l'))
  $('resizeR').addEventListener('mousedown', startDrag('r'))
  $('resizeT').addEventListener('mousedown', startDrag('t'))
  $('resizeB').addEventListener('mousedown', startDrag('b'))
  $('resizeTL').addEventListener('mousedown', startDrag('tl'))
  $('resizeTR').addEventListener('mousedown', startDrag('tr'))
  $('resizeBL').addEventListener('mousedown', startDrag('bl'))
  $('resizeBR').addEventListener('mousedown', startDrag('br'))
  window.addEventListener('mousemove', function(e) {
    if (!mode) return
    var dx = e.clientX - sx, dy = e.clientY - sy
    var w = sw, h = sh
    if (mode === 'r')  { w = sw + dx }
    if (mode === 'l')  { w = sw - dx }
    if (mode === 't')  { h = sh - dy }
    if (mode === 'b')  { h = sh + dy }
    if (mode === 'br') { w = sw + dx; h = sh + dy }
    if (mode === 'bl') { w = sw - dx; h = sh + dy }
    if (mode === 'tr') { w = sw + dx; h = sh - dy }
    if (mode === 'tl') { w = sw - dx; h = sh - dy }
    postResize(Math.max(380, w), Math.max(400, h))
  })
  window.addEventListener('mouseup', function() { mode = null })
})()

// 初期表示
updateBottomBar()
