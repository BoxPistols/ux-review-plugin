<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0f;
  --bg-elevated: #101018;
  --surface: rgba(255,255,255,0.04);
  --surface-hi: rgba(255,255,255,0.07);
  --surface-glass: rgba(255,255,255,0.03);
  --border: rgba(255,255,255,0.06);
  --border-hi: rgba(255,255,255,0.12);
  --border-accent: rgba(99,132,255,0.25);
  --text: #e8eaed;
  --text-sub: #9da1b5;
  --text-dim: #6b6f82;
  --accent: #6384ff;
  --accent-soft: rgba(99,132,255,0.10);
  --accent-glow: rgba(99,132,255,0.20);
  --green: #34d399;
  --green-soft: rgba(52,211,153,0.10);
  --red: #f87171;
  --red-soft: rgba(248,113,113,0.10);
  --yellow: #fbbf24;
  --yellow-soft: rgba(251,191,36,0.10);
  --font: 'Noto Sans JP', -apple-system, sans-serif;
  --mono: 'JetBrains Mono', 'SF Mono', monospace;
  --ease: cubic-bezier(0.16, 1, 0.3, 1);
}

:root[data-theme="light"] {
  --bg: #f8f9fb;
  --bg-elevated: #ffffff;
  --surface: rgba(0,0,0,0.04);
  --surface-hi: rgba(0,0,0,0.07);
  --surface-glass: rgba(0,0,0,0.02);
  --border: rgba(0,0,0,0.09);
  --border-hi: rgba(0,0,0,0.16);
  --border-accent: rgba(37,99,235,0.25);
  --text: #0f172a;
  --text-sub: #475569;
  --text-dim: #94a3b8;
  --accent: #2563eb;
  --accent-soft: rgba(37,99,235,0.08);
  --accent-glow: rgba(37,99,235,0.15);
  --green: #16a34a;
  --green-soft: rgba(22,163,74,0.08);
  --red: #dc2626;
  --red-soft: rgba(220,38,38,0.08);
  --yellow: #d97706;
  --yellow-soft: rgba(217,119,6,0.08);
}
:root[data-theme="light"] .layout { background: var(--bg); }
:root[data-theme="light"] .btn-primary { color: #fff; }
:root[data-theme="light"] .review-score { text-shadow: none; }

html, body {
  font-family: var(--font); font-size: 14px; line-height: 1.5;
  background: var(--bg); color: var(--text);
  width: 100%; height: 100%; overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

.layout {
  display: flex; flex-direction: column; height: 100vh;
  background: var(--bg);
}

/* ── Header ── */
.header {
  padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
}
.logo { font-size: 14px; font-weight: 700; letter-spacing: -0.02em; display: flex; align-items: center; gap: 6px; }
.logo-mark { width: 18px; height: 18px; border-radius: 5px; background: linear-gradient(135deg, var(--accent) 0%, #a78bfa 100%); display: flex; align-items: center; justify-content: center; }
.logo-mark svg { display: block; }
.logo span { color: var(--accent); }
.hdr-right { display: flex; gap: 4px; }
.icon-btn {
  width: 28px; height: 28px; background: transparent; border: 1px solid transparent;
  border-radius: 6px; cursor: pointer; color: var(--text-dim);
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s var(--ease), color 0.2s var(--ease), border-color 0.2s var(--ease);
}
.icon-btn:hover { background: var(--surface-hi); color: var(--text-sub); border-color: var(--border); }

/* ── Settings ── */
.settings {
  padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; flex-shrink: 0;
  border-bottom: 1px solid var(--border); background: var(--bg);
}
@keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: none; } }
.settings.hidden { display: none; }
.s-row { display: flex; gap: 8px; align-items: center; }
.s-label { font-size: 12px; color: var(--text-dim); width: 48px; flex-shrink: 0; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; }
.s-input, .s-select {
  flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
  padding: 6px 10px; font-size: 12px; color: var(--text); outline: none;
  font-family: var(--mono); min-width: 0; transition: border-color 0.2s var(--ease);
}
.s-input:focus, .s-select:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft); }
.btn-test {
  padding: 5px 14px; background: transparent; border: 1px solid var(--border);
  border-radius: 6px; font-size: 12px; color: var(--text-dim); cursor: pointer;
  font-family: var(--font); font-weight: 500; transition: border-color 0.2s var(--ease), color 0.2s var(--ease), background 0.2s var(--ease);
}
.btn-test:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
.btn-test:disabled { opacity: 0.3; }
.test-result { font-size: 12px; font-family: var(--mono); word-break: break-word; max-height: 36px; overflow-y: auto; flex: 1; }
.test-result.ok { color: var(--green); }
.test-result.error { color: var(--red); }

/* ── Tabs ── */
/* ── Main panel ── */
.main-panel { display: flex; flex: 1; flex-direction: column; overflow: hidden; min-height: 0; }

/* ── Common ── */
.panel-body {
  flex: 1; overflow-y: auto; padding: 12px 16px;
  display: flex; flex-direction: column; gap: 8px;
  contain: layout style paint;
  will-change: scroll-position;
}
.panel-body::-webkit-scrollbar { width: 3px; }
.panel-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }
.panel-body::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.12); }

.empty-state {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 10px; color: var(--text-dim); font-size: 12px; text-align: center; line-height: 1.9; padding: 24px;
}
.empty-icon { font-size: 24px; opacity: 0.2; }

.section-title {
  font-size: 12px; color: var(--text-dim); font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase; padding: 6px 0 2px;
}

.prompt, .json-input {
  width: 100%; flex: 1; min-height: 0;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px; color: var(--text); outline: none;
  resize: none; line-height: 1.65; transition: border-color 0.2s var(--ease);
}
.prompt { font-size: 13px; font-family: var(--font); }
.json-input { font-size: 12px; font-family: var(--mono); }
.prompt:focus, .json-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft); }
.prompt::placeholder, .json-input::placeholder { color: var(--text-dim); }

/* ── Preview ── */
.preview { flex: 1; min-height: 0; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
.preview::-webkit-scrollbar { width: 3px; }
.preview::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }
.pv-header { font-size: 13px; font-weight: 600; color: var(--text); padding: 4px 0; }
.pv-desc { font-size: 12px; color: var(--text-sub); margin-bottom: 4px; }
.pv-section { padding: 12px 0; border-bottom: 1px solid var(--border); }
.pv-section:last-child { border-bottom: none; }
.pv-title { font-size: 12px; color: var(--accent); font-weight: 600; margin-bottom: 8px; letter-spacing: 0.02em; }
.pv-item { font-size: 12px; color: var(--text-sub); line-height: 1.8; display: flex; align-items: center; gap: 6px; }
.pv-color { width: 10px; height: 10px; border-radius: 3px; border: 1px solid rgba(255,255,255,0.08); flex-shrink: 0; }
.pv-variant {
  font-size: 12px; color: var(--text-sub); padding: 4px 0;
  display: flex; align-items: center; gap: 6px; font-family: var(--mono);
  border-bottom: 1px solid rgba(255,255,255,0.03);
}
.pv-variant:last-child { border-bottom: none; }

/* ── Review result ── */
.review-block { padding: 14px 0; border-bottom: 1px solid var(--border); }
.review-block:last-child { border-bottom: none; }
.review-label {
  font-size: 12px; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase; margin-bottom: 10px;
}
.review-label.asis { color: var(--yellow); }
.review-label.tobe { color: var(--green); }
.review-text { font-size: 13px; color: var(--text-sub); line-height: 1.9; letter-spacing: 0.02em; }
.review-text p { margin-bottom: 12px; }
.review-text p:last-child { margin-bottom: 0; }
.review-score {
  font-size: 42px; font-family: var(--mono); font-weight: 700; text-align: center;
  padding: 8px 0; letter-spacing: -0.03em;
}
.review-score.high { color: var(--green); }
.review-score.mid { color: var(--yellow); }
.review-score.low { color: var(--red); }

/* Modifications list — clean table-like layout, no border-left accent */
.mod-list { display: flex; flex-direction: column; gap: 0; }
.mod-item {
  font-size: 13px; color: var(--text);
  padding: 14px 10px; border-bottom: 1px solid var(--border);
  line-height: 1.8; letter-spacing: 0.02em; cursor: pointer;
  margin: 0 -8px; contain: layout style;
}
.mod-item:hover { background: var(--surface-hi); }
.mod-item:active { background: var(--accent-soft); }
@keyframes flash { 0% { background: var(--accent-soft); } 100% { background: transparent; } }
.mod-item.flashed { animation: flash 0.6s var(--ease); }
.mod-item:last-child { border-bottom: none; }
.mod-head { display: flex; align-items: baseline; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
.mod-target { color: var(--accent); font-family: var(--mono); font-size: 11px; font-weight: 600; cursor: pointer; }
.mod-target:hover { text-decoration: underline; }
.mod-locate {
  display: inline-block; width: 12px; height: 12px; vertical-align: middle;
  margin-left: 2px; opacity: 0.4; transition: opacity 0.15s;
}
.mod-item:hover .mod-locate { opacity: 1; }
.mod-action { color: var(--text-dim); font-family: var(--mono); font-size: 11px; }
.mod-body { color: var(--text-sub); font-size: 13px; line-height: 1.9; }
.mod-value { color: var(--text); font-weight: 600; }
.mod-reason { color: var(--text-dim); font-size: 12px; margin-top: 2px; }

/* ── Review mode chips ── */
.review-modes { display: flex; gap: 4px; padding: 6px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; flex-wrap: wrap; }
.r-chip {
  padding: 4px 12px; font-size: 12px; border: 1px solid var(--border); border-radius: 16px;
  color: var(--text-dim); cursor: pointer; user-select: none; transition: border-color 0.15s, color 0.15s, background-color 0.15s;
}
.r-chip:hover { border-color: var(--border-hi); color: var(--text-sub); }
.r-chip.active { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }

/* ── Chat ── */
.chat-wrapper {
  display: flex; flex-direction: column; flex-shrink: 0;
  border-top: 1px solid var(--border); max-height: 50vh;
}
.chat-resize-handle {
  height: 8px; cursor: ns-resize; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; background: var(--bg);
}
.chat-resize-grip {
  width: 32px; height: 3px; border-radius: 2px; background: var(--border-hi);
  transition: background-color 0.15s;
}
.chat-resize-handle:hover .chat-resize-grip { background: var(--accent); }
.chat-section-inner { display: flex; flex-direction: column; flex: 1; min-height: 0; padding: 0 16px 8px; }
.chat-header {
  display: flex; align-items: center; padding: 4px 0 8px; flex-shrink: 0;
}
.chat-expand-btn {
  width: 24px; height: 24px; background: transparent; border: 1px solid var(--border);
  border-radius: 4px; cursor: pointer; color: var(--text-dim);
  display: flex; align-items: center; justify-content: center;
  transition: border-color 0.15s, color 0.15s;
}
.chat-expand-btn:hover { border-color: var(--accent); color: var(--accent); }
.chat-messages {
  flex: 1; min-height: 60px; overflow-y: auto;
  display: flex; flex-direction: column; gap: 8px;
}
.chat-messages::-webkit-scrollbar { width: 3px; }
.chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }
.chat-msg { font-size: 13px; line-height: 1.85; padding: 10px 14px; border-radius: 12px; max-width: 92%; letter-spacing: 0.02em; }
.chat-msg.user { background: var(--accent-soft); color: var(--text); align-self: flex-end; border-bottom-right-radius: 4px; }
.chat-msg.ai { background: var(--surface); color: var(--text-sub); align-self: flex-start; border: 1px solid var(--border); border-bottom-left-radius: 4px; }
.chat-input-row { display: flex; gap: 8px; margin-top: 8px; align-items: flex-end; flex-shrink: 0; }
.chat-input {
  flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  padding: 8px 12px; font-size: 13px; color: var(--text); outline: none; font-family: var(--font);
  resize: none; min-height: 40px; max-height: 80px; line-height: 1.6;
}
.chat-input:focus { border-color: var(--accent); }
.chat-input::placeholder { color: var(--text-dim); }
.chat-hint { font-size: 10px; color: var(--text-dim); margin-top: 4px; flex-shrink: 0; }
.chat-send {
  padding: 8px 16px; background: var(--accent); color: #fff; border: none; border-radius: 8px;
  font-size: 13px; font-weight: 500; cursor: pointer; font-family: var(--font); white-space: nowrap;
  min-height: 40px;
}
.chat-send:hover { opacity: 0.88; }

/* ── Chat overlay ── */
.chat-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 100;
  background: var(--bg); display: flex; flex-direction: column;
}
.chat-overlay-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.chat-overlay-close {
  background: none; border: 1px solid var(--border); border-radius: 4px;
  color: var(--text-dim); cursor: pointer; width: 28px; height: 28px;
  font-size: 16px; display: flex; align-items: center; justify-content: center;
  transition: border-color 0.15s, color 0.15s;
}
.chat-overlay-close:hover { border-color: var(--red); color: var(--red); }
.chat-overlay-messages {
  flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px;
}
.chat-overlay-messages::-webkit-scrollbar { width: 3px; }
.chat-overlay-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }
.chat-overlay-messages .chat-msg { max-width: 95%; font-size: 14px; line-height: 2; }
.chat-overlay-input-row {
  display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid var(--border); flex-shrink: 0;
}

/* ── Review context ── */
.review-context { padding: 0 0 8px; display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }
.review-context summary {
  font-size: 12px; color: var(--text-sub); cursor: pointer; user-select: none; padding: 4px 0;
}
.review-context summary:hover { color: var(--text); }
.review-context-body { display: flex; flex-direction: column; gap: 6px; padding-top: 4px; }
.ctx-label { font-size: 11px; color: var(--text-dim); font-weight: 500; }
.ctx-textarea {
  width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
  padding: 6px 10px; font-size: 12px; color: var(--text); outline: none; font-family: var(--font);
  resize: vertical; min-height: 36px; max-height: 80px; line-height: 1.5;
}
.ctx-textarea:focus { border-color: var(--accent); }
.ctx-textarea::placeholder { color: var(--text-dim); }

/* ── Image paste preview ── */
.img-preview-wrap { position: relative; display: inline-block; margin-top: 4px; }
.img-preview { max-width: 100%; max-height: 120px; border-radius: 6px; border: 1px solid var(--border); }
.img-remove {
  position: absolute; top: -6px; right: -6px; width: 20px; height: 20px;
  background: var(--red); color: #fff; border: none; border-radius: 50%;
  font-size: 12px; line-height: 20px; text-align: center; cursor: pointer;
}
.paste-hint { font-size: 10px; color: var(--text-dim); margin-top: 2px; }

/* ── Review actions ── */
.review-actions { display: flex; gap: 8px; flex-shrink: 0; padding: 4px 0; }

/* ── Copy button (per section) ── */
.copy-btn {
  background: none; border: 1px solid var(--border); border-radius: 4px;
  color: var(--text-dim); cursor: pointer; padding: 2px 6px; font-size: 12px;
  font-family: var(--font); transition: border-color 0.15s, color 0.15s; flex-shrink: 0; line-height: 1;
}
.copy-btn:hover { border-color: var(--accent); color: var(--accent); }
.copy-btn.copied { border-color: var(--green); color: var(--green); }
.block-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }

/* ── Review history ── */
.hist-item { padding: 10px 0; border-bottom: 1px solid var(--border); cursor: pointer; transition: opacity 0.15s; }
.hist-item:last-child { border-bottom: none; }
.hist-item:hover { opacity: 0.8; }
.hist-head { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.hist-score { font-size: 18px; font-family: var(--mono); font-weight: 700; min-width: 32px; }
.hist-score.high { color: var(--green); }
.hist-score.mid { color: var(--yellow); }
.hist-score.low { color: var(--red); }
.hist-name { font-size: 13px; font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.hist-date { font-size: 12px; color: var(--text-dim); font-family: var(--mono); }
.hist-summary { font-size: 12px; color: var(--text-sub); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.hist-item.expanded .hist-summary { -webkit-line-clamp: unset; display: block; }
.hist-tobe { font-size: 12px; color: var(--green); line-height: 1.6; margin-top: 8px; display: none; }
.hist-item.expanded .hist-tobe { display: block; }
.hist-del { background: none; border: none; color: var(--text-dim); font-size: 14px; cursor: pointer; padding: 2px 6px; line-height: 1; }
.hist-del:hover { color: var(--red); }

/* ── Header tabs ── */
.header-tabs { display: flex; gap: 0; margin-left: 16px; flex: 1; }
.header-tab {
  padding: 8px 14px; font-size: 12px; font-weight: 600;
  color: var(--text-dim); cursor: pointer; position: relative; transition: color 0.15s;
}
.header-tab:hover { color: var(--text-sub); }
.header-tab.active { color: var(--text); }
.header-tab.active::after {
  content: ''; position: absolute; bottom: -1px; left: 8px; right: 8px;
  height: 2px; background: var(--accent); border-radius: 1px;
}
.header-tab .tab-badge {
  font-size: 10px; background: var(--accent-soft); color: var(--accent);
  padding: 0 5px; border-radius: 8px; margin-left: 4px; font-weight: 700;
}

/* ── Log panel ── */
.log-entry { padding: 12px 16px; border-bottom: 1px solid var(--border); }
.log-entry:last-child { border-bottom: none; }
.log-entry.pinned { background: var(--accent-soft); }
.log-entry-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.log-pin {
  background: none; border: none; cursor: pointer; font-size: 13px;
  color: var(--text-dim); padding: 2px; line-height: 1; transition: color 0.15s; flex-shrink: 0;
}
.log-pin:hover, .log-pin.pinned { color: var(--yellow); }
.log-expand {
  background: none; border: none; cursor: pointer; color: var(--text-dim);
  font-size: 11px; padding: 2px 6px; transition: color 0.15s; font-family: var(--font);
}
.log-expand:hover { color: var(--text); }
.log-editable {
  cursor: text; padding: 2px 4px; border-radius: 4px; transition: background 0.15s;
}
.log-editable:hover { background: var(--surface-hi); }
.log-editing {
  width: 100%; background: var(--surface); border: 1px solid var(--accent);
  border-radius: 4px; padding: 6px 8px; font-size: 12px; color: var(--text);
  outline: none; font-family: var(--font); line-height: 1.6; resize: vertical; min-height: 48px;
}
.log-memo {
  margin-top: 8px; padding: 6px 8px; background: var(--accent-soft);
  border-radius: 6px; font-size: 11px; color: var(--accent); line-height: 1.5;
}
.log-memo-input {
  width: 100%; background: var(--surface); border: 1px solid var(--border);
  border-radius: 4px; padding: 4px 8px; font-size: 11px; color: var(--text);
  outline: none; font-family: var(--font); margin-top: 6px;
}
.log-memo-input:focus { border-color: var(--accent); }
.log-memo-input::placeholder { color: var(--text-dim); }
.log-detail-item {
  padding: 8px 10px; border-bottom: 1px solid var(--border); position: relative;
  font-size: 12px; line-height: 1.7; color: var(--text-sub);
}
.log-detail-item:last-child { border-bottom: none; }
.log-detail-remove {
  position: absolute; top: 6px; right: 4px;
  background: none; border: none; color: var(--text-dim); cursor: pointer;
  font-size: 12px; padding: 2px 4px; line-height: 1;
}
.log-detail-remove:hover { color: var(--red); }
.log-actions { display: flex; gap: 6px; margin-top: 8px; align-items: center; }
.log-btn {
  background: none; border: 1px solid var(--border); border-radius: 4px;
  color: var(--text-dim); cursor: pointer; padding: 3px 8px; font-size: 11px;
  font-family: var(--font); transition: border-color 0.15s, color 0.15s;
}
.log-btn:hover { border-color: var(--accent); color: var(--accent); }
.log-btn.danger:hover { border-color: var(--red); color: var(--red); }
.log-details-section { margin-top: 8px; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
.log-details-toggle {
  background: none; border: none; cursor: pointer; color: var(--text-dim);
  font-size: 11px; padding: 4px 0; font-family: var(--font); transition: color 0.15s;
}
.log-details-toggle:hover { color: var(--text); }

/* ── Collection list ── */
.coll-card {
  padding: 10px 0; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.coll-card:last-child { border-bottom: none; }
.coll-name { font-size: 13px; font-weight: 600; }
.coll-meta { font-size: 12px; color: var(--text-dim); font-family: var(--mono); }

/* ── Log ── */
.log { max-height: 68px; overflow-y: auto; display: flex; flex-direction: column; gap: 3px; flex-shrink: 0; }
.log:empty { display: none; }
.log-item {
  padding: 5px 0; font-size: 12px; line-height: 1.5; font-family: var(--mono);
  border-bottom: 1px solid var(--border);
  animation: fadeIn 0.2s var(--ease);
}
.log-item:last-child { border-bottom: none; }
.log-item.error { color: var(--red); }
.log-item.ok { color: var(--green); }

/* ── Selection bar ── */
.sel-bar {
  padding: 8px 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
  background: var(--surface);
}
.sel-dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim);
  transition: background-color 0.3s var(--ease), box-shadow 0.3s var(--ease); flex-shrink: 0;
}
.sel-dot.on { background: var(--green); box-shadow: 0 0 8px rgba(52,211,153,0.4); }
.sel-name { font-size: 12px; font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sel-meta { font-size: 12px; color: var(--text-dim); font-family: var(--mono); }

/* ── Bottom bar ── */
.bottom-bar {
  padding: 10px 16px 14px; flex-shrink: 0;
  display: flex; flex-direction: column; gap: 8px;
  border-top: 1px solid var(--border);
  background: var(--bg);
}
.status { font-size: 12px; color: var(--text-sub); text-align: center; font-family: var(--mono); }
.spinner {
  display: inline-block; width: 12px; height: 12px;
  border: 1.5px solid var(--border-hi); border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.7s linear infinite;
  vertical-align: middle; margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.btn-row { display: flex; gap: 6px; }
.btn {
  flex: 1; padding: 9px 12px; border: none; border-radius: 8px;
  font-size: 12px; font-weight: 600; cursor: pointer;
  font-family: var(--font); letter-spacing: 0.01em;
  transition: box-shadow 0.2s var(--ease), transform 0.2s var(--ease), border-color 0.2s var(--ease), background-color 0.2s var(--ease); position: relative; overflow: hidden;
}
.btn:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-primary {
  background: linear-gradient(135deg, var(--accent) 0%, #8b7aff 100%);
  color: #fff; box-shadow: 0 2px 12px var(--accent-glow);
}
.btn-primary:hover:not(:disabled) { box-shadow: 0 4px 20px var(--accent-glow); transform: translateY(-1px); }
.btn-primary:active:not(:disabled) { transform: translateY(0); }
.btn-secondary {
  background: var(--surface); color: var(--text-sub);
  border: 1px solid var(--border);
}
.btn-secondary:hover:not(:disabled) { border-color: var(--border-hi); color: var(--text); background: var(--surface-hi); }
.btn-danger {
  background: var(--red-soft); color: var(--red);
  border: 1px solid rgba(248,113,113,0.15);
}
.btn-danger:hover:not(:disabled) { border-color: rgba(248,113,113,0.3); background: rgba(248,113,113,0.15); }

/* ── Resize grips ── */
.resize-edge {
  position: fixed; z-index: 200; opacity: 0;
}
.resize-edge:hover { opacity: 1; background: var(--accent); }
.resize-edge.left   { top: 8px; left: 0; width: 5px; height: calc(100% - 16px); cursor: ew-resize; }
.resize-edge.right  { top: 8px; right: 0; width: 5px; height: calc(100% - 16px); cursor: ew-resize; }
.resize-edge.top    { top: 0; left: 8px; width: calc(100% - 16px); height: 5px; cursor: ns-resize; }
.resize-edge.bottom { bottom: 0; left: 8px; width: calc(100% - 16px); height: 5px; cursor: ns-resize; }
.resize-corner {
  position: fixed; width: 12px; height: 12px; z-index: 201; opacity: 0;
}
.resize-corner:hover { opacity: 1; background: var(--accent); border-radius: 2px; }
.resize-corner.tl { top: 0; left: 0; cursor: nwse-resize; }
.resize-corner.tr { top: 0; right: 0; cursor: nesw-resize; }
.resize-corner.bl { bottom: 0; left: 0; cursor: nesw-resize; }
.resize-corner.br { bottom: 0; right: 0; cursor: nwse-resize; }

.hidden { display: none !important; }
</style>
</head>
<body>

<div class="resize-edge left" id="resizeL"></div>
<div class="resize-edge right" id="resizeR"></div>

<div class="layout">
  <!-- Header -->

    <div class="header-tabs">

<script>
// ══════════════════════════════════════════════════════════════
var $ = function(id) { return document.getElementById(id) }
function show(el) { if (el) el.classList.remove('hidden') }
function hide(el) { if (el) el.classList.add('hidden') }
function isGemini(m) { return m.indexOf('gemini') === 0 }
function esc(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }

var currentTab = 'review'
var currentReview = null
var selectedNodes = []
var selectedComponentSet = null
var reviewLoading = false
var userLocale = 'ja'
var reviewMode = 'ia'
var logHistory = []

// タブ切替
document.querySelectorAll('.header-tab').forEach(function(tab) {
  tab.addEventListener('click', function() {
    currentTab = tab.getAttribute('data-tab')
    document.querySelectorAll('.header-tab').forEach(function(t) { t.classList.toggle('active', t === tab) })
    if (currentTab === 'review') {
      show($('panel-review')); hide($('panel-log'))
    } else {
      hide($('panel-review')); show($('panel-log'))
    }
    updateBottomBar()
  })
})

// レビュー観点チップ
document.querySelectorAll('.r-chip').forEach(function(c) {
  c.addEventListener('click', function() {
    reviewMode = c.getAttribute('data-mode')
    document.querySelectorAll('.r-chip').forEach(function(x) { x.classList.toggle('active', x.getAttribute('data-mode') === reviewMode) })
  })
})

function updateBottomBar() {
  hide($('statusReview')); hide($('actReview'))
  if (currentTab === 'review') {
    if (reviewLoading) { show($('statusReview')) }
    else if (selectedNodes.length) { show($('actReview')) }
  }
}

function updateLogBadge() {
  var badge = $('logBadge')
  if (logHistory.length) {
    badge.textContent = logHistory.length
    show(badge)
  } else {
    hide(badge)
  }
}

// ══════════════════════════════════════════════════════════════
// 設定
// ══════════════════════════════════════════════════════════════
parent.postMessage({ pluginMessage: { type: 'load-settings' } }, '*')
$('btnSettings').addEventListener('click', function() { $('settings').classList.toggle('hidden') })
$('apiKey').addEventListener('change', saveSettings)
$('modelSelect').addEventListener('change', saveSettings)
function saveSettings() {
  parent.postMessage({ pluginMessage: { type: 'save-settings', apiKey: $('apiKey').value.trim(), model: $('modelSelect').value } }, '*')
}

// 接続テスト
$('btnTest').addEventListener('click', function() {
  var apiKey = $('apiKey').value.trim(), model = $('modelSelect').value, result = $('testResult')
  if (!apiKey) { result.className = 'test-result error'; result.textContent = '✗ APIキー未入力'; show(result); return }
  $('btnTest').disabled = true; result.className = 'test-result'; result.textContent = '...'; show(result)
  var p
  if (isGemini(model)) {
    p = fetch('https://generativelanguage.googleapis.com/v1beta/models/' + model + ':generateContent?key=' + apiKey, {
      method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ contents:[{parts:[{text:'Hi'}]}], generationConfig:{max_output_tokens:5} })
    })
  } else {
    p = fetch('https://api.openai.com/v1/chat/completions', {
      method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey}, body: JSON.stringify({model:model,messages:[{role:'user',content:'Hi'}],max_completion_tokens:5})
    })
  }
  p.then(function(r) { if (r.ok) { result.className='test-result ok'; result.textContent='✓ '+model+' OK'; saveSettings() } else { return r.json().then(function(e) { result.className='test-result error'; result.textContent='✗ '+((e.error&&e.error.message)||'HTTP '+r.status) }).catch(function() { result.className='test-result error'; result.textContent='✗ HTTP '+r.status }) } }).catch(function(e) { result.className='test-result error'; result.textContent='✗ '+e.message }).then(function() { $('btnTest').disabled=false })
})

// ══════════════════════════════════════════════════════════════
// メッセージ受信
// ══════════════════════════════════════════════════════════════
window.onmessage = function(event) {
  var msg = event.data.pluginMessage; if (!msg) return

  if (msg.type === 'settings-loaded') {
    if (msg.apiKey) $('apiKey').value = msg.apiKey
    if (msg.model) $('modelSelect').value = msg.model
    if (msg.locale) userLocale = msg.locale
    if (msg.apiKey) hide($('settings'))
    updateBottomBar()
    parent.postMessage({ pluginMessage: { type: 'load-review-history' } }, '*')
  }
  if (msg.type === 'review-history') {
    logHistory = msg.history || []
    renderLogPanel(logHistory)
    updateLogBadge()
  }

  // Selection
  if (msg.type === 'selection-changed') {
    selectedNodes = msg.nodes
    selectedComponentSet = msg.componentSetInfo || null
    $('selDot').classList.add('on')
    var n = msg.nodes[0]
    if (selectedComponentSet) {
      $('selName').textContent = '◆ ' + selectedComponentSet.name + ' (' + selectedComponentSet.variantCount + ' variants)'
    } else {
      if (msg.isMulti) {
        var names = msg.nodes.slice(0, 3).map(function(nd) { return nd.name })
        $('selName').textContent = names.join(' / ') + (msg.nodes.length > 3 ? ' +' + (msg.nodes.length - 3) : '')
      } else {
        $('selName').textContent = n.name
      }
    }
    $('selMeta').textContent = msg.isMulti ? msg.nodes.length + '件選択' : (n.width ? n.width + '×' + n.height : '')
    updateBottomBar()
  }
  if (msg.type === 'selection-cleared') {
    selectedNodes = []
    selectedComponentSet = null
    $('selDot').classList.remove('on')
    $('selName').textContent = 'フレームを選択してください'
    $('selMeta').textContent = ''
    updateBottomBar()
  }

  // Review result
  if (msg.type === 'review-applied') {
    reviewLoading = false; updateBottomBar()
    addLog('reviewLog', 'ok', '✓ To-Be生成完了 (' + msg.applied + '件適用)')
    if (msg.undoCount > 0) show($('actUndo'))
  }
  if (msg.type === 'tobe-done') {
    reviewLoading = false; updateBottomBar()
    addLog('reviewLog', 'ok', '✓ To-Be UIをキャンバスに生成しました')
    if (msg.undoCount > 0) show($('actUndo'))
  }
  if (msg.type === 'review-error') {
    reviewLoading = false; currentReview = null; updateBottomBar()
    addLog('reviewLog', 'error', msg.error)
  }

  // Undo
  if (msg.type === 'undo-done') {
    if (msg.undoCount > 0) show($('actUndo')); else hide($('actUndo'))
  }

  // Static Checks → AI レビューへ続行
  if (msg.type === 'static-check-results') {
    pendingStaticFindings = msg.findings || []
    proceedWithAIReview(pendingStaticFindings)
  }
}

// ══════════════════════════════════════════════════════════════
// システムプロンプト（Material Design 3準拠）

// ══════════════════════════════════════════════════════════════
// Review: ノード→テキスト変換
// ══════════════════════════════════════════════════════════════
function nodeToText(n, depth) {
  if (depth > 4) return ''
  var ind = ''; for (var x = 0; x < depth; x++) ind += '  '
  var s = ind + '[' + n.type + '] ' + n.name
  if (n.componentName) s += ' (Component: ' + n.componentName + ')'
  if (n.width) s += ' ' + n.width + 'x' + n.height + 'px'
  // レイアウト情報
  if (n.layout) s += ' [layout:' + n.layout + (n.gap != null ? ' gap:' + n.gap : '') + ']'
  if (n.hidden) s += ' [hidden]'
  if (n.opacity != null && n.opacity < 1) s += ' [opacity:' + n.opacity + ']'
  if (n.fill) s += ' [fill:' + n.fill + ']'
  if (n.clickable) s += ' [clickable]'
  if (n.connector) s += ' [connector-line]'
  // 子要素サマリー
  if (n.children && n.children.length > 0) s += ' [children:' + n.children.length + ']'
  s += '\n'
  // パターンヒント
  if (n.hints && n.hints.length) {
    for (var h = 0; h < n.hints.length; h++) s += ind + '  ⚑ ' + n.hints[h] + '\n'
  }
  if (n.texts && n.texts.length) {
    for (var i = 0; i < Math.min(n.texts.length, 5); i++) s += ind + '  "' + n.texts[i] + '"\n'
  }
  if (n.children) { for (var i = 0; i < Math.min(n.children.length, 20); i++) s += nodeToText(n.children[i], depth + 1) }
  return s
}

var REVIEW_PROMPT = [
'あなたはUI/UXデザインの専門家です。',
'以下のFigmaフレーム構造を分析し、日本語でレビューしてください。',
'',
'━━━ 前提 ━━━',

function setupImagePaste(textareaId, previewId, setter) {
  var el = $(textareaId)
  if (!el) return
  el.addEventListener('paste', function(e) {
    var items = (e.clipboardData || {}).items || []
    for (var i = 0; i < items.length; i++) {
      if (items[i].type.indexOf('image') !== -1) {
        e.preventDefault()
        var file = items[i].getAsFile()
        var reader = new FileReader()
        reader.onload = function(ev) {
          var dataUrl = ev.target.result
          var parts = dataUrl.split(',')
          var mime = parts[0].match(/:(.*?);/)[1]
          var b64 = parts[1]
          setter({ base64: b64, mime: mime })
          var wrap = $(previewId)
          wrap.innerHTML = '<div class="img-preview-wrap"><img class="img-preview" src="' + dataUrl + '"/><button class="img-remove" id="rm_' + previewId + '">×</button></div>'
          wrap.querySelector('.img-remove').addEventListener('click', function() { setter(null); wrap.innerHTML = '' })
        }
        reader.readAsDataURL(file)
        return
      }
    }
  })
}

setupImagePaste('ctxNote', 'ctxImgPreview', function(v) { ctxImage = v })
setupImagePaste('chatInput', 'chatImgPreview', function(v) { chatImage = v })

function collectReviewContext() {
  var ctx = []
  var note = ($('ctxNote') && $('ctxNote').value) ? $('ctxNote').value.trim() : ''
  if (note) {
    ctx.push('ユーザーストーリー: ' + note)
  } else {
    ctx.push('ユーザーストーリー: 未記入。ノード構造・テキスト・画像からユーザーの目的を推測し、推測した目的を asIs の冒頭に明記してください。')
  }
  return '\n\n━━━ レビュー依頼の前提条件 ━━━\n' + ctx.join('\n')
}

function doReviewImprove() {
  if (!selectedNodes.length) return
  hide($('reviewEmpty'))
  reviewLoading = true; $('btnReview').disabled = true

  pendingReviewText = ''
  if (selectedNodes.length > 1) {
    pendingReviewText += '【複数フレーム選択: ' + selectedNodes.length + '件。フレーム間の関係性も分析してください】\n\n'
  }
  for (var i = 0; i < selectedNodes.length; i++) {
    var n = selectedNodes[i]
    pendingReviewText += '## フレーム ' + (i + 1) + '/' + selectedNodes.length + ': ' + n.name + ' (' + n.width + 'x' + n.height + 'px)\n'
    pendingReviewText += nodeToText(n, 0) + '\n'
  }

  var apiKey = $('apiKey').value.trim()
  if (!apiKey) { reviewLoading = false; updateBottomBar(); $('btnReview').disabled = false; addLog('reviewLog','error','APIキーを設定してください'); return }

  // 全モードで静的チェックを実行
  $('statusReviewText').textContent = '構造チェック中...'; updateBottomBar()
  parent.postMessage({ pluginMessage: { type: 'run-static-checks' } }, '*')
}

function proceedWithAIReview(staticFindings) {
  $('statusReviewText').textContent = 'AIがデザインを分析中...'

  var text = pendingReviewText
  // 情報設計モードでは静的チェック（UI詳細）を注入しない
  if (staticFindings.length && reviewMode !== 'ia') {
    text += '\n\n## 静的チェック結果（自動検出済み。重複指摘は不要、より高度な分析に集中してください）\n'
    for (var s = 0; s < staticFindings.length; s++) {
      var f = staticFindings[s]
      text += '- [' + f.category + '] "' + f.target + '": ' + f.message + '\n'
    }
  }

  var model = $('modelSelect').value, apiKey = $('apiKey').value.trim()

  var langSuffix = (userLocale.indexOf('ja') === 0)
    ? '\n\n出力言語: 日本語'
    : '\n\nOutput language: English. All messages, categories and suggestions must be in English.'
  var reviewContext = collectReviewContext()
  var fullPrompt = REVIEW_PROMPT + reviewContext + (REVIEW_MODE_PROMPTS[reviewMode] || '') + langSuffix

  // マルチモーダル対応: 画像があれば添付
  var img = ctxImage
  var p
  if (isGemini(model)) {
    var contentParts = [{text: text}]
    if (img) contentParts.push({inline_data: {mime_type: img.mime, data: img.base64}})
    p = fetch('https://generativelanguage.googleapis.com/v1beta/models/'+model+':generateContent?key='+apiKey, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ system_instruction:{parts:[{text:fullPrompt}]}, contents:[{parts:contentParts}], generationConfig:{response_mime_type:'application/json',temperature:0.7} })
    }).then(function(r) { if(!r.ok) { if(r.status===429) throw new Error('レート制限。OpenAIに切り替えてください'); return r.json().then(function(e){throw new Error((e.error&&e.error.message)||'Gemini error '+r.status)}) } return r.json() })
     .then(function(d) { return d.candidates[0].content.parts[0].text })
  } else {
    var userContent = img
      ? [{type:'text',text:text},{type:'image_url',image_url:{url:'data:'+img.mime+';base64,'+img.base64}}]
      : text
    p = fetch('https://api.openai.com/v1/chat/completions', {
      method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
      body:JSON.stringify({ model:model, messages:[{role:'system',content:fullPrompt},{role:'user',content:userContent}], response_format:{type:'json_object'}, max_completion_tokens:8000 })
    }).then(function(r) { if(!r.ok) return r.json().then(function(e){throw new Error((e.error&&e.error.message)||'OpenAI error')}); return r.json() })
     .then(function(d) { return d.choices[0].message.content })
  }

  p.then(function(c) {
    var result = JSON.parse(c)
    // 静的チェック結果を details の先頭にマージ（情報設計モードでは除外）
    var aiDetails = (result.details || []).map(function(d) { d.source = 'ai'; return d })
    if (reviewMode !== 'ia') {
      var specDetails = (pendingStaticFindings || []).map(function(d) { d.source = 'static'; return d })
      result.details = specDetails.concat(aiDetails)
    } else {
      result.details = aiDetails
    }
    currentReview = result
    renderReviewPreview(result)
    reviewLoading = false; $('btnReview').disabled = false; updateBottomBar()
    initChat()
    // SpecBridge API で関連仕様を非同期追加
    enrichWithSpecs(result.details)

    // 履歴に自動保存
    var frameName = selectedNodes.length ? selectedNodes[0].name : 'Unknown'
    parent.postMessage({ pluginMessage: { type: 'save-review', entry: {
      id: String(Date.now()),
      timestamp: Date.now(),
      frameName: frameName,
      score: result.score,
      pattern: result.pattern || '',
      asIs: result.asIs,
      toBe: result.toBe,
      details: (result.details || []).map(function(d) {
        return { category: d.category, severity: d.severity, message: d.message, target: d.target, source: d.source }
      }),
      memo: '',
      pinned: false,
      editedAt: null,
    }}}, '*')
  }).catch(function(e) {
    reviewLoading = false; updateBottomBar(); $('btnReview').disabled = false
    addLog('reviewLog', 'error', e.message)
  })
}

// 文章を句点で分割し段落化
function textToParagraphs(text) {
  if (!text) return ''
  var formatted = esc(text)
  // セクションキーワードで改行+強調
  var keywords = ['問題[：:]', 'アクション[：:]', '参考[：:]', 'なぜ問題か[：:]', 'どう直すか[：:]', '直さないと[：:]', '根拠[：:]', '判断基準[：:]']
  for (var ki = 0; ki < keywords.length; ki++) {
    formatted = formatted.replace(new RegExp('(' + keywords[ki] + ')', 'g'), '</p><p><strong>$1</strong>')
  }
  // URL をリンク化
  formatted = formatted.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" style="color:var(--accent);word-break:break-all">$1</a>')
  // 改行で段落分け
  var parts = formatted.split(/\n+/)
  var paragraphs = []
  for (var i = 0; i < parts.length; i++) {
    if (parts[i].trim()) paragraphs.push('<p>' + parts[i].trim() + '</p>')
  }
  return paragraphs.join('')
}

// SpecBridge API: レビュー結果に関連仕様 + Curated Snippets を非同期追加
function enrichWithSpecs(details) {
  if (!details || !details.length) return
  var modItems = document.querySelectorAll('.mod-item')
  var pendingUpdates = []
  var remaining = 0

  details.forEach(function(d, idx) {
    if (d.severity !== 'critical' && d.severity !== 'warning') return
    if (d.source === 'static') return
    remaining++
    var q = (d.category || '') + ' ' + (d.target || '') + ' ' + ((d.message || '').split('\n')[0] || '').slice(0, 100)
    var ctrl = new AbortController()
    var timer = setTimeout(function() { ctrl.abort() }, 3000)
    fetch('https://a11y-spec-bridge.vercel.app/api/spec-search', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query: q.trim(), k: 3, mode: reviewMode }),
      signal: ctrl.signal
    }).then(function(r) { clearTimeout(timer); return r.ok ? r.json() : null })
    .then(function(data) {
      if (data && data.results) {
        var refs = data.results.filter(function(r) { return r.score >= 0.55 })
        if (refs.length) pendingUpdates.push({ idx: idx, refs: refs })
      }
    }).catch(function() {})
    .then(function() {
      remaining--
      if (remaining <= 0) {
        requestAnimationFrame(function() {
          for (var u = 0; u < pendingUpdates.length; u++) {
            var upd = pendingUpdates[u]
            if (!modItems[upd.idx]) continue
            var refHtml = ''
            for (var ri = 0; ri < upd.refs.length; ri++) {
              var ref = upd.refs[ri]
              if (ref.source === 'CURATED') {
                // Curated Snippet: question を問いかけとして表示
                var qText = ref.question || ref.title || ''
                var tText = ref.text || ''
                refHtml += '<div style="margin-top:8px;padding:8px 10px;background:var(--accent-soft);border-radius:6px;font-size:12px;line-height:1.7">'
                refHtml += '<div style="color:var(--accent);font-weight:600;margin-bottom:2px">' + esc(qText) + '</div>'
                if (tText) refHtml += '<div style="color:var(--text-sub)">' + esc(tText).slice(0, 200) + '</div>'
                refHtml += '</div>'
              } else {
                // 仕様リンク（WCAG/ARIA/MDN等）
                if (ref.url) {
                  refHtml += '<div style="margin-top:4px;font-size:11px">'
                  refHtml += '<a href="' + esc(ref.url) + '" target="_blank" style="color:var(--accent);margin-right:8px">' + esc((ref.source || '') + ': ' + (ref.title || '')) + '</a>'
                  refHtml += '</div>'
                }
              }
            }
            if (refHtml) {
              var container = document.createElement('div')
              container.style.cssText = 'margin-top:6px'
              container.innerHTML = refHtml
              modItems[upd.idx].appendChild(container)
            }
          }
        })
      }
    })
  })
}

function renderDetailItem(d, idx) {
  var sourceTag = d.source === 'static' ? '[SPEC] ' : ''
  var text = sourceTag + '[' + (d.severity || '').toUpperCase() + '] ' + (d.category || '') + '\n'
  if (d.target) text += '対象: ' + d.target + '\n'
  text += (d.message || '')

  var h = '<div class="mod-item" data-target="' + esc(d.target || '') + '">'
  h += '<div class="mod-head">'
  if (d.source === 'static') h += '<span style="font-size:10px;padding:1px 5px;border-radius:3px;background:var(--accent-soft);color:var(--accent);font-weight:600;margin-right:4px;letter-spacing:0.03em">SPEC</span>'
  if (d.target) h += '<span class="mod-target">' + esc(d.target) + '<svg class="mod-locate" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M8 1v3M8 12v3M1 8h3M12 8h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></span>'
  h += '<span class="mod-action">' + esc(d.category || '') + '</span>'
  h += '<button class="copy-btn" data-copy-text="' + esc(text).replace(/\n/g, '&#10;') + '">Copy</button>'
  h += '</div>'
  h += '<div class="mod-body">' + formatMessage(d.message || '') + '</div>'
  h += '</div>'
  return h
}

function formatMessage(msg) {
  var html = esc(msg)
  // セクションキーワードを強調+改行
  html = html.replace(/(問題[：:])/g, '<br><strong style="color:var(--red)">$1</strong> ')
  html = html.replace(/(アクション[：:])/g, '<br><strong style="color:var(--green)">$1</strong> ')
  html = html.replace(/(参考[：:]|根拠[：:])/g, '<br><strong style="color:var(--text-dim)">$1</strong> ')
  // URL をリンク化
  html = html.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" style="color:var(--accent);word-break:break-all;font-size:11px">$1</a>')
  // \n を改行に
  html = html.replace(/\\n\\n|\\n/g, '<br>')
  html = html.replace(/\n/g, '<br>')
  return html
}

function renderReviewPreview(r) {
  var scoreClass = r.score >= 75 ? 'high' : r.score >= 50 ? 'mid' : 'low'
  var h = '<div class="review-score ' + scoreClass + '">' + r.score + '<span style="font-size:14px;color:var(--text-dim)"> / 100</span></div>'

  // 識別パターン
  if (r.pattern) {
    h += '<div style="text-align:center;margin:-4px 0 8px;font-size:12px;color:var(--accent);font-weight:500">' + esc(r.pattern) + '</div>'
  }

  // 現状分析
  h += '<div class="review-block">'
  h += '<div class="block-header"><span class="review-label asis">現状分析</span><button class="copy-btn" data-copy-section="asIs">Copy</button></div>'
  h += '<div class="review-text">' + textToParagraphs(r.asIs) + '</div></div>'

  // 改善提案
  h += '<div class="review-block">'
  h += '<div class="block-header"><span class="review-label tobe">改善提案</span><button class="copy-btn" data-copy-section="toBe">Copy</button></div>'
  h += '<div class="review-text">' + textToParagraphs(r.toBe) + '</div></div>'

  // セベリティ別にグルーピング
  if (r.details && r.details.length) {
    h += '<div style="font-size:10px;color:var(--text-dim);padding:8px 0 2px;border-top:1px solid var(--border);margin-top:4px">クリックで Figma 上の該当要素にジャンプ</div>'
    var groups = { critical: [], warning: [], good: [] }
    for (var i = 0; i < r.details.length; i++) {
      var sev = r.details[i].severity || 'warning'
      if (!groups[sev]) groups[sev] = []
      groups[sev].push(r.details[i])
    }

    var sevOrder = [
      { key: 'critical', label: 'CRITICAL', color: 'var(--red)' },
      { key: 'warning', label: 'WARNING', color: 'var(--yellow)' },
      { key: 'good', label: 'GOOD', color: 'var(--green)' },
    ]

    for (var s = 0; s < sevOrder.length; s++) {
      var items = groups[sevOrder[s].key]
      if (!items || !items.length) continue
      h += '<div style="margin-top:8px"><span style="font-size:12px;font-weight:700;color:' + sevOrder[s].color + '">' + sevOrder[s].label + '</span>'
      h += '<span style="font-size:12px;color:var(--text-dim);margin-left:6px">' + items.length + '件</span></div>'
      h += '<div class="mod-list">'
      for (var j = 0; j < items.length; j++) h += renderDetailItem(items[j], j)
      h += '</div>'
    }
  }

  $('reviewPreview').innerHTML = h
  show($('reviewPreview'))
  show($('reviewActions'))
}

// 個別コピー（イベントデリゲーション）
$('reviewPreview').addEventListener('click', function(ev) {
  var copyBtn = ev.target.closest('.copy-btn')
  if (!copyBtn) return
  ev.stopPropagation()

  var text = ''
  // セクション単位コピー
  var section = copyBtn.getAttribute('data-copy-section')
  if (section && currentReview) {
    text = currentReview[section] || ''
  }
  // 個別指摘コピー
  var copyText = copyBtn.getAttribute('data-copy-text')
  if (copyText) {
    text = copyText.replace(/&#10;/g, '\n')
  }

  if (!text) return
  navigator.clipboard.writeText(text).then(function() {
    copyBtn.textContent = '✓'; copyBtn.classList.add('copied')
    setTimeout(function() { copyBtn.textContent = 'Copy'; copyBtn.classList.remove('copied') }, 1200)
  }).catch(function() {
    var ta = document.createElement('textarea')
    ta.value = text; ta.style.cssText = 'position:fixed;top:-9999px'
    document.body.appendChild(ta); ta.select(); document.execCommand('copy')
    document.body.removeChild(ta)
    copyBtn.textContent = '✓'; copyBtn.classList.add('copied')
    setTimeout(function() { copyBtn.textContent = 'Copy'; copyBtn.classList.remove('copied') }, 1200)
  })
})

function renderLogPanel(history) {
  if (!history.length) { show($('logEmpty')); $('logList').innerHTML = ''; return }
  hide($('logEmpty'))
  // ピン付きを先頭に、残りは新しい順
  var pinned = history.filter(function(e) { return e.pinned })
  var unpinned = history.filter(function(e) { return !e.pinned })
  var sorted = pinned.concat(unpinned)

  var h = '<div style="display:flex;align-items:center;justify-content:space-between;padding:0 0 8px">'
  h += '<span style="font-size:11px;color:var(--text-dim)">' + history.length + '件のログ</span>'
  h += '<button class="log-btn danger" id="btnClearAllLogs">全消去</button></div>'

  for (var i = 0; i < sorted.length; i++) {
    var e = sorted[i]
    var scoreClass = e.score >= 75 ? 'high' : e.score >= 50 ? 'mid' : 'low'
    var d = new Date(e.timestamp)
    var dateStr = (d.getMonth()+1) + '/' + d.getDate() + ' ' + d.getHours() + ':' + ('0'+d.getMinutes()).slice(-2)
    var editedStr = e.editedAt ? ' (編集済)' : ''

    h += '<div class="log-entry' + (e.pinned ? ' pinned' : '') + '" data-log-id="' + e.id + '">'
    h += '<div class="log-entry-head">'
    h += '<button class="log-pin' + (e.pinned ? ' pinned' : '') + '" data-pin="' + e.id + '" title="ピン留め">' + (e.pinned ? '★' : '☆') + '</button>'
    h += '<span class="hist-score ' + scoreClass + '">' + e.score + '</span>'
    h += '<span class="hist-name" style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + esc(e.frameName) + '</span>'
    h += '<span style="font-size:11px;color:var(--text-dim);font-family:var(--mono)">' + dateStr + editedStr + '</span>'
    h += '<button class="log-expand" data-expand="' + e.id + '">詳細</button>'
    h += '<button class="hist-del" data-del="' + e.id + '" title="削除">×</button>'
    h += '</div>'

    // 現状分析（編集可能）
    h += '<div style="font-size:12px;color:var(--text-sub);line-height:1.7">'
    h += '<span class="log-editable" data-edit-id="' + e.id + '" data-edit-field="asIs">' + esc(e.asIs || '') + '</span>'
    h += '</div>'

    // メモ
    if (e.memo) {
      h += '<div class="log-memo"><span class="log-editable" data-edit-id="' + e.id + '" data-edit-field="memo">' + esc(e.memo) + '</span></div>'
    }

    // 展開セクション（初期非表示）
    h += '<div class="hidden" id="logDetail_' + e.id + '">'

    // 改善提案（編集可能）
    if (e.toBe) {
      h += '<div style="margin-top:8px"><span style="font-size:11px;color:var(--green);font-weight:600">改善提案</span>'
      h += '<div style="font-size:12px;color:var(--text-sub);line-height:1.7;margin-top:2px">'
      h += '<span class="log-editable" data-edit-id="' + e.id + '" data-edit-field="toBe">' + esc(e.toBe) + '</span>'
      h += '</div></div>'
    }

    // 指摘カード（個別削除可能）
    if (e.details && e.details.length) {
      h += '<div class="log-details-section">'
      for (var j = 0; j < e.details.length; j++) {
        var det = e.details[j]
        var sevColor = det.severity === 'critical' ? 'var(--red)' : det.severity === 'good' ? 'var(--green)' : 'var(--yellow)'
        h += '<div class="log-detail-item" data-detail-idx="' + j + '">'
        h += '<span style="font-size:10px;font-weight:700;color:' + sevColor + '">' + (det.severity || '').toUpperCase() + '</span> '
        h += '<span style="font-size:11px;color:var(--text-dim)">' + esc(det.category || '') + '</span>'
        if (det.target) h += ' <span style="font-size:11px;color:var(--accent);font-family:var(--mono)">' + esc(det.target) + '</span>'
        h += '<div style="margin-top:2px"><span class="log-editable" data-edit-id="' + e.id + '" data-edit-field="detail_' + j + '">' + esc((det.message || '').split('\n')[0]) + '</span></div>'
        h += '<button class="log-detail-remove" data-remove-detail="' + e.id + '_' + j + '" title="この指摘を削除">×</button>'
        h += '</div>'
      }
      h += '</div>'
    }

    // アクション
    h += '<div class="log-actions">'
    if (!e.memo) h += '<button class="log-btn" data-add-memo="' + e.id + '">メモ追加</button>'
    h += '<button class="log-btn" data-copy-log="' + e.id + '">コピー</button>'
    h += '</div>'

    h += '</div>' // logDetail end
    h += '</div>' // log-entry end
  }
  $('logList').innerHTML = h
}

// ログパネルのイベントハンドラ（デリゲーション）
$('logBody').addEventListener('click', function(ev) {
  var target = ev.target

  // 全消去
  if (target.id === 'btnClearAllLogs') {
    if (confirm('ピン留めされていないログも含め、全て削除しますか？')) {
      parent.postMessage({ pluginMessage: { type: 'clear-review-history' } }, '*')
    }
    return
  }

  // ピン留め
  var pinBtn = target.closest('[data-pin]')
  if (pinBtn) {
    parent.postMessage({ pluginMessage: { type: 'toggle-pin-review', id: pinBtn.getAttribute('data-pin') } }, '*')
    return
  }

  // 削除
  var delBtn = target.closest('[data-del]')
  if (delBtn) {
    ev.stopPropagation()
    parent.postMessage({ pluginMessage: { type: 'delete-review', id: delBtn.getAttribute('data-del') } }, '*')
    return
  }

  // 詳細展開
  var expandBtn = target.closest('[data-expand]')
  if (expandBtn) {
    var detail = $('logDetail_' + expandBtn.getAttribute('data-expand'))
    if (detail) {
      detail.classList.toggle('hidden')
      expandBtn.textContent = detail.classList.contains('hidden') ? '詳細' : '閉じる'
    }
    return
  }

  // 指摘カード削除
  var removeBtn = target.closest('[data-remove-detail]')
  if (removeBtn) {
    ev.stopPropagation()
    var parts = removeBtn.getAttribute('data-remove-detail').split('_')
    var logId = parts[0], detailIdx = parseInt(parts[1])
    parent.postMessage({ pluginMessage: { type: 'remove-review-detail', id: logId, detailIndex: detailIdx } }, '*')
    return
  }

  // メモ追加
  var memoBtn = target.closest('[data-add-memo]')
  if (memoBtn) {
    var mId = memoBtn.getAttribute('data-add-memo')
    var input = document.createElement('input')
    input.className = 'log-memo-input'
    input.placeholder = 'メモを入力...'
    memoBtn.parentNode.insertBefore(input, memoBtn)
    memoBtn.remove()
    input.focus()
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.isComposing) {
        parent.postMessage({ pluginMessage: { type: 'update-review', id: mId, field: 'memo', value: input.value.trim() } }, '*')
      }
    })
    input.addEventListener('blur', function() {
      if (input.value.trim()) {
        parent.postMessage({ pluginMessage: { type: 'update-review', id: mId, field: 'memo', value: input.value.trim() } }, '*')
      }
    })
    return
  }

  // コピー
  var copyBtn = target.closest('[data-copy-log]')
  if (copyBtn) {
    var cId = copyBtn.getAttribute('data-copy-log')
    var entry = logHistory.find(function(e) { return e.id === cId })
    if (entry) {
      var md = 'Score: ' + entry.score + '/100\n'
      if (entry.pattern) md += 'Pattern: ' + entry.pattern + '\n'
      md += '\n現状分析:\n' + (entry.asIs || '') + '\n'
      if (entry.toBe) md += '\n改善提案:\n' + entry.toBe + '\n'
      if (entry.memo) md += '\nメモ: ' + entry.memo + '\n'
      if (entry.details && entry.details.length) {
        md += '\n指摘:\n'
        entry.details.forEach(function(d) {
          md += '- [' + (d.severity || '').toUpperCase() + '] ' + (d.category || '') + ': ' + (d.message || '') + '\n'
        })
      }
      copyToClipboard(md, copyBtn, 'コピー')
    }
    return
  }

  // インライン編集
  var editable = target.closest('.log-editable')
  if (editable && !editable.querySelector('.log-editing')) {
    var eId = editable.getAttribute('data-edit-id')
    var eField = editable.getAttribute('data-edit-field')
    var currentText = editable.textContent
    var ta = document.createElement('textarea')
    ta.className = 'log-editing'
    ta.value = currentText
    editable.textContent = ''
    editable.appendChild(ta)
    ta.focus()
    ta.style.height = Math.max(48, ta.scrollHeight) + 'px'

    function saveEdit() {
      var newVal = ta.value.trim()
      editable.textContent = newVal || currentText
      if (newVal && newVal !== currentText) {
        parent.postMessage({ pluginMessage: { type: 'update-review', id: eId, field: eField, value: newVal } }, '*')
      }
    }
    ta.addEventListener('blur', saveEdit)
    ta.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && (e.metaKey || e.ctrlKey) && !e.isComposing) { e.preventDefault(); ta.blur() }
      if (e.key === 'Escape') { editable.textContent = currentText }
    })
    return
  }
})

function addLog(logId, type, message) {
  var log = $(logId); if (!log) return
  var now = new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',second:'2-digit'})
  var div = document.createElement('div')
  div.className = 'log-item' + (type ? ' ' + type : '')
  div.innerHTML = '<span style="font-size:12px;color:var(--text-dim);font-family:monospace">'+now+'</span> '+message
  log.insertBefore(div, log.firstChild)
  while (log.children.length > 5) log.removeChild(log.lastChild)
}

// チャット（レビュー結果について対話）
// ══════════════════════════════════════════════════════════════
var chatHistory = []

function initChat() {
  if (!currentReview) return
  var reviewSummary = 'スコア: ' + currentReview.score + '/100'
  if (currentReview.pattern) reviewSummary += '\nパターン: ' + currentReview.pattern
  reviewSummary += '\n現状分析: ' + (currentReview.asIs || '')
  reviewSummary += '\n改善提案: ' + (currentReview.toBe || '')
  reviewSummary += '\n指摘:\n' + ((currentReview.details || []).map(function(d) { return '[' + d.severity + '] ' + d.category + ': ' + d.message }).join('\n'))

  chatHistory = [
    { role: 'system', content: [
      'あなたはUI/UXデザインの専門家です。デザイナーからの質問に日本語で答えてください。',
      '',
      '【回答ルール】',
      '- 質問の大きさに応じて回答量を調整すること',
      '- 簡単な質問（はい/いいえ、1点の確認）→ 1-3文で簡潔に',
      '- 具体的な改善依頼 → 5-8文で具体案を提示',
      '- 「Figma上でどこをどう変えるか」を具体的に書く',
      '- 長文の箇条書きを安易に使わない',
      '',
      '【前のレビュー結果（この会話の文脈）】',
      reviewSummary,
    ].join('\n') }
  ]
  $('chatMessages').innerHTML = ''
  $('chatOverlayMessages').innerHTML = ''
  show($('chatSection'))
}

function sendChat() {
  var text = $('chatInput').value.trim()
  if (!text && !chatImage) return
  $('chatInput').value = ''
  var img = chatImage
  chatImage = null; $('chatImgPreview').innerHTML = ''

  // 選択中ノードの情報を自動付加（全体レビュー後に部分を選択した場合の文脈）
  var contextPrefix = ''
  if (selectedNodes.length) {
    var sel = selectedNodes[0]
    contextPrefix = '[現在選択中: ' + sel.name + ' (' + sel.width + 'x' + sel.height + 'px)]\n'
  }

  // ユーザーメッセージ表示（インライン＋オーバーレイ両方）
  var imgHtml = img ? '<img src="data:' + img.mime + ';base64,' + img.base64 + '" style="max-width:100%;max-height:100px;border-radius:4px;margin-bottom:4px;display:block">' : null
  appendChatMsg('user', text || '', imgHtml)

  // チャット履歴にマルチモーダル対応で追加
  var fullText = contextPrefix + (text || '')
  if (img) {
    chatHistory.push({ role: 'user', content: fullText || '画像を確認してください', _img: img })
  } else {
    chatHistory.push({ role: 'user', content: fullText })
  }

  // AI呼び出し
  var model = $('modelSelect').value, apiKey = $('apiKey').value.trim()
  if (!apiKey) return

  var p
  if (isGemini(model)) {
    var geminiContents = []
    for (var i = 0; i < chatHistory.length; i++) {
      var ch = chatHistory[i]
      if (ch.role === 'system') continue
      var parts = [{ text: ch.content || '' }]
      if (ch._img) parts.push({ inline_data: { mime_type: ch._img.mime, data: ch._img.base64 } })
      geminiContents.push({ role: ch.role === 'assistant' ? 'model' : 'user', parts: parts })
    }
    p = fetch('https://generativelanguage.googleapis.com/v1beta/models/' + model + ':generateContent?key=' + apiKey, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ system_instruction: { parts: [{ text: chatHistory[0].content }] }, contents: geminiContents })
    }).then(function(r) { if (!r.ok) throw new Error('API error'); return r.json() })
      .then(function(d) { return d.candidates[0].content.parts[0].text })
  } else {
    var oaiMessages = []
    for (var j = 0; j < chatHistory.length; j++) {
      var m = chatHistory[j]
      if (m._img) {
        oaiMessages.push({ role: 'user', content: [
          { type: 'text', text: m.content || '画像を確認してください' },
          { type: 'image_url', image_url: { url: 'data:' + m._img.mime + ';base64,' + m._img.base64 } }
        ]})
      } else {
        oaiMessages.push({ role: m.role, content: m.content })
      }
    }
    p = fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
      body: JSON.stringify({ model: model, messages: oaiMessages, max_completion_tokens: text.length < 50 ? 500 : 1500 })
    }).then(function(r) { if (!r.ok) throw new Error('API error'); return r.json() })
      .then(function(d) { return d.choices[0].message.content })
  }

  p.then(function(reply) {
    chatHistory.push({ role: 'assistant', content: reply })
    appendChatMsg('ai', reply)
  }).catch(function(e) {
    addLog('reviewLog', 'error', 'チャットエラー: ' + e.message)
  })
}

// チャットメッセージを両方のビュー（インライン＋オーバーレイ）に追加
function appendChatMsg(role, text, imgHtml) {
  var containers = [$('chatMessages'), $('chatOverlayMessages')]
  for (var ci = 0; ci < containers.length; ci++) {
    var c = containers[ci]
    if (!c) continue
    var div = document.createElement('div')
    div.className = 'chat-msg ' + role
    if (imgHtml) div.innerHTML = imgHtml + esc(text || '')
    else div.innerHTML = esc(text).replace(/\n/g, '<br>')
    c.appendChild(div)
    c.scrollTop = c.scrollHeight
  }
}

$('btnChat').addEventListener('click', sendChat)
$('chatInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.isComposing && (e.metaKey || e.ctrlKey)) { e.preventDefault(); sendChat() }
})

// オーバーレイからの送信
$('btnChatOverlay').addEventListener('click', function() {
  // オーバーレイの入力をインラインに転送して送信
  var text = $('chatOverlayInput').value.trim()
  if (!text) return
  $('chatInput').value = text
  $('chatOverlayInput').value = ''
  sendChat()
})
$('chatOverlayInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.isComposing && (e.metaKey || e.ctrlKey)) {
    e.preventDefault()
    var text = $('chatOverlayInput').value.trim()
    if (!text) return
    $('chatInput').value = text
    $('chatOverlayInput').value = ''
    sendChat()
  }
})

// チャット拡大オーバーレイ
$('btnChatExpand').addEventListener('click', function() {
  // 既存メッセージをオーバーレイにコピー
  $('chatOverlayMessages').innerHTML = $('chatMessages').innerHTML
  show($('chatOverlay'))
  $('chatOverlayMessages').scrollTop = $('chatOverlayMessages').scrollHeight
  $('chatOverlayInput').focus()
})
$('btnChatOverlayClose').addEventListener('click', function() { hide($('chatOverlay')) })

// チャットリサイズハンドル
;(function() {
  var handle = $('chatResizeHandle'), dragging = false, startY, startH
  if (!handle) return
  handle.addEventListener('mousedown', function(e) {
    dragging = true; startY = e.clientY
    var chatEl = $('chatSection')
    startH = chatEl.offsetHeight
    e.preventDefault()
  })
  window.addEventListener('mousemove', function(e) {
    if (!dragging) return
    requestAnimationFrame(function() {
      var dy = startY - e.clientY
      var newH = Math.max(120, Math.min(startH + dy, window.innerHeight * 0.7))
      $('chatSection').style.height = newH + 'px'
    })
  })
  window.addEventListener('mouseup', function() { dragging = false })
})()

// ══════════════════════════════════════════════════════════════
// テーマ切替
// ══════════════════════════════════════════════════════════════
var isDark = true
$('btnTheme').addEventListener('click', function() {
  isDark = !isDark
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light')
})

// ══════════════════════════════════════════════════════════════
// レビュー結果のコピー/ダウンロード
// ══════════════════════════════════════════════════════════════
function reviewToMarkdown() {
  if (!currentReview) return ''
  var md = '# UX Review — Score: ' + currentReview.score + '/100\n\n'
  md += '## 現状分析\n' + (currentReview.asIs || '') + '\n\n'
  md += '## 改善提案\n' + (currentReview.toBe || '') + '\n\n'
  if (currentReview.details && currentReview.details.length) {
    md += '## 指摘\n'
    for (var i = 0; i < currentReview.details.length; i++) {
      var d = currentReview.details[i]
      var srcTag = d.source === 'static' ? '[SPEC] ' : '[AI] '
      md += '### ' + srcTag + (d.severity || '').toUpperCase() + ': ' + (d.category || '') + '\n'
      if (d.target) md += '**対象:** ' + d.target + '\n'
      md += (d.message || '') + '\n\n'
    }
  }
  return md
}

function copyToClipboard(text, btn, label) {
  var ta = document.createElement('textarea')
  ta.value = text
  ta.style.cssText = 'position:fixed;top:0;left:0;width:1px;height:1px;opacity:0.01'
  document.body.appendChild(ta)
  ta.focus(); ta.select()
  try { document.execCommand('copy') } catch(e) {}
  document.body.removeChild(ta)
  // clipboard API も試行（成功すれば上書き）
  try { navigator.clipboard.writeText(text) } catch(e) {}
  if (btn) {
    var orig = btn.textContent
    btn.textContent = '✓ Copied'
    setTimeout(function() { btn.textContent = label || orig }, 1500)
  }
}

$('btnCopyReview').addEventListener('click', function() {
  var md = reviewToMarkdown()
  if (!md) return
  copyToClipboard(md, $('btnCopyReview'), '全文コピー')
})

$('btnDlReview').addEventListener('click', function() {
  var md = reviewToMarkdown()
  if (!md) return
  var blob = new Blob([md], { type: 'text/markdown' })
  var url = URL.createObjectURL(blob)
  var a = document.createElement('a')
  a.href = url
  a.download = 'ux-review-' + new Date().toISOString().slice(0,10) + '.md'
  a.click()
  URL.revokeObjectURL(url)
})

// 四辺+四隅ドラッグリサイズ
;(function() {
  var mode = null, sx, sy, sw, sh
  function startDrag(m) { return function(e) { mode = m; sx = e.clientX; sy = e.clientY; sw = window.innerWidth; sh = window.innerHeight; e.preventDefault() } }
  $('resizeL').addEventListener('mousedown', startDrag('l'))
  $('resizeR').addEventListener('mousedown', startDrag('r'))
  $('resizeT').addEventListener('mousedown', startDrag('t'))
  $('resizeB').addEventListener('mousedown', startDrag('b'))
  $('resizeTL').addEventListener('mousedown', startDrag('tl'))
  $('resizeTR').addEventListener('mousedown', startDrag('tr'))
  $('resizeBL').addEventListener('mousedown', startDrag('bl'))
  $('resizeBR').addEventListener('mousedown', startDrag('br'))
  var rafPending = false
  window.addEventListener('mousemove', function(e) {
    if (!mode || rafPending) return
    rafPending = true
    var ex = e.clientX, ey = e.clientY
    requestAnimationFrame(function() {
      rafPending = false
      var dx = ex - sx, dy = ey - sy
      var w = sw, h = sh
      if (mode === 'r')  { w = sw + dx }
      if (mode === 'l')  { w = sw - dx }
      if (mode === 't')  { h = sh - dy }
      if (mode === 'b')  { h = sh + dy }
      if (mode === 'br') { w = sw + dx; h = sh + dy }
      if (mode === 'bl') { w = sw - dx; h = sh + dy }
      if (mode === 'tr') { w = sw + dx; h = sh - dy }
      if (mode === 'tl') { w = sw - dx; h = sh - dy }
      postResize(Math.max(380, w), Math.max(400, h))
    })
  })
  window.addEventListener('mouseup', function() { mode = null })
})()

// 初期表示
updateBottomBar()
