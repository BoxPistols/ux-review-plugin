<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #18181b; --surface: rgba(255,255,255,0.06); --surface-hi: rgba(255,255,255,0.10);
  --border: rgba(255,255,255,0.10); --border-hi: rgba(255,255,255,0.18);
  --text: rgba(255,255,255,0.92); --text-sub: rgba(255,255,255,0.50); --text-dim: rgba(255,255,255,0.28);
  --accent: #818cf8; --accent-bg: rgba(129,140,248,0.12);
  --green: #4ade80; --red: #f87171; --yellow: #fbbf24;
}
html, body { font-family: -apple-system, 'Helvetica Neue', sans-serif; font-size: 14px; line-height: 1.5; background: var(--bg); color: var(--text); width: 100%; height: 100%; overflow: hidden; -webkit-font-smoothing: antialiased; }
.layout { display: flex; flex-direction: column; height: 100vh; }

/* Header */
.header { padding: 8px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.logo { font-size: 14px; font-weight: 600; }
.logo span { color: var(--accent); }
.hdr-right { display: flex; gap: 6px; }
.icon-btn { width: 28px; height: 28px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; color: var(--text-sub); display: flex; align-items: center; justify-content: center; transition: all 0.12s; }
.icon-btn:hover { border-color: var(--accent); color: var(--accent); }

/* Settings */
.settings { padding: 10px 16px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }
.settings.hidden { display: none; }
.s-row { display: flex; gap: 8px; align-items: center; }
.s-label { font-size: 12px; color: var(--text-dim); width: 50px; flex-shrink: 0; }
.s-input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 5px 10px; font-size: 12px; color: var(--text); outline: none; font-family: monospace; min-width: 0; }
.s-input:focus { border-color: var(--accent); }
.s-select { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 5px 10px; font-size: 12px; color: var(--text); outline: none; }
.btn-test { padding: 4px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; font-size: 11px; color: var(--text-sub); cursor: pointer; font-family: inherit; }
.btn-test:hover { border-color: var(--accent); color: var(--accent); }
.btn-test:disabled { opacity: 0.4; }
.test-result { font-size: 11px; font-family: monospace; word-break: break-word; max-height: 40px; overflow-y: auto; flex: 1; }
.test-result.ok { color: var(--green); }
.test-result.error { color: var(--red); }

/* Tabs */
.tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.tab { flex: 1; padding: 8px 4px; text-align: center; font-size: 12px; color: var(--text-dim); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.12s; user-select: none; }
.tab:hover { color: var(--text-sub); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* Tab panels */
.tab-panel { display: none; flex: 1; flex-direction: column; overflow: hidden; min-height: 0; }
.tab-panel.active { display: flex; }

/* Common elements */
.panel-body { flex: 1; overflow-y: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }
.panel-body::-webkit-scrollbar { width: 4px; }
.panel-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

.empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; color: var(--text-dim); font-size: 13px; text-align: center; line-height: 1.8; padding: 24px; }
.empty-icon { font-size: 28px; opacity: 0.3; }

.section-title { font-size: 11px; color: var(--text-dim); font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; padding: 4px 0; }

.prompt { width: 100%; flex: 1; min-height: 0; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font-size: 14px; color: var(--text); outline: none; resize: none; font-family: inherit; line-height: 1.6; }
.prompt:focus { border-color: var(--accent); }
.prompt::placeholder { color: var(--text-dim); }

.json-input { width: 100%; flex: 1; min-height: 0; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font-size: 12px; color: var(--text); outline: none; resize: none; font-family: monospace; line-height: 1.5; }
.json-input:focus { border-color: var(--accent); }
.json-input::placeholder { color: var(--text-dim); }

/* Preview */
.preview { flex: 1; min-height: 0; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
.preview::-webkit-scrollbar { width: 4px; }
.preview::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }
.pv-header { font-size: 13px; color: var(--text); padding: 4px 0; }
.pv-desc { font-size: 12px; color: var(--text-sub); margin-bottom: 4px; }
.pv-section { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; }
.pv-title { font-size: 12px; color: var(--accent); font-weight: 600; margin-bottom: 6px; }
.pv-item { font-size: 12px; color: var(--text-sub); line-height: 1.8; display: flex; align-items: center; gap: 6px; }
.pv-color { width: 12px; height: 12px; border-radius: 3px; border: 1px solid rgba(255,255,255,0.12); flex-shrink: 0; }
.pv-variant { font-size: 12px; color: var(--text-sub); padding: 2px 8px; background: rgba(255,255,255,0.04); border-radius: 4px; margin: 2px 0; display: flex; align-items: center; gap: 6px; }

/* Review result */
.review-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
.review-label { font-size: 11px; font-weight: 600; letter-spacing: 0.04em; margin-bottom: 6px; }
.review-label.asis { color: var(--yellow); }
.review-label.tobe { color: var(--green); }
.review-text { font-size: 13px; color: var(--text-sub); line-height: 1.7; }
.review-score { font-size: 36px; font-family: monospace; font-weight: 500; text-align: center; padding: 8px 0; }
.review-score.high { color: var(--green); }
.review-score.mid { color: var(--yellow); }
.review-score.low { color: var(--red); }
.mod-item { font-size: 12px; color: var(--text-sub); padding: 6px 10px; background: rgba(255,255,255,0.03); border-radius: 6px; border-left: 3px solid var(--accent); margin: 3px 0; line-height: 1.5; }
.mod-target { color: var(--accent); font-family: monospace; font-size: 11px; }
.mod-reason { color: var(--text-dim); font-size: 11px; margin-top: 2px; }

/* Collection cards */
.coll-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; display: flex; align-items: center; justify-content: space-between; }
.coll-name { font-size: 13px; font-weight: 500; }
.coll-meta { font-size: 11px; color: var(--text-dim); font-family: monospace; }

/* Log */
.log { max-height: 72px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; }
.log:empty { display: none; }
.log-item { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; font-size: 11px; line-height: 1.5; }
.log-item.error { border-color: rgba(248,113,113,0.25); color: var(--red); }
.log-item.ok { border-color: rgba(74,222,128,0.25); color: var(--green); }

/* Selection bar */
.sel-bar { padding: 8px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.sel-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim); transition: all 0.2s; flex-shrink: 0; }
.sel-dot.on { background: var(--green); box-shadow: 0 0 6px var(--green); }
.sel-name { font-size: 13px; font-weight: 500; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sel-meta { font-size: 11px; color: var(--text-dim); font-family: monospace; }

/* Bottom bar */
.bottom-bar { padding: 8px 16px 12px; flex-shrink: 0; display: flex; flex-direction: column; gap: 6px; border-top: 1px solid var(--border); }
.status { font-size: 12px; color: var(--text-sub); text-align: center; }
.spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }
.btn-row { display: flex; gap: 6px; }
.btn { flex: 1; padding: 8px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.12s; font-family: inherit; }
.btn:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-primary { background: var(--accent); color: #111; }
.btn-primary:hover:not(:disabled) { opacity: 0.88; }
.btn-secondary { background: var(--surface); color: var(--text-sub); border: 1px solid var(--border); }
.btn-secondary:hover:not(:disabled) { border-color: var(--border-hi); color: var(--text); }
.btn-danger { background: rgba(248,113,113,0.12); color: var(--red); border: 1px solid rgba(248,113,113,0.2); }
.btn-danger:hover:not(:disabled) { border-color: var(--red); }
.hidden { display: none !important; }
</style>
</head>
<body>

<div class="layout">
  <!-- Header -->
  <div class="header">
    <span class="logo">UX Review<span>.</span>AI</span>
    <div class="hdr-right">
      <button class="icon-btn" id="btnSettings" title="設定">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5.7 1h2.6l.4 1.6a4.5 4.5 0 011.1.6l1.6-.5 1.3 2.2-1.2 1.1a4.6 4.6 0 010 1.2l1.2 1.1-1.3 2.2-1.6-.5a4.5 4.5 0 01-1.1.6L8.3 13H5.7l-.4-1.6a4.5 4.5 0 01-1.1-.6l-1.6.5-1.3-2.2 1.2-1.1a4.6 4.6 0 010-1.2L1.3 5.7l1.3-2.2 1.6.5a4.5 4.5 0 011.1-.6L5.7 1z" stroke="currentColor" stroke-width="1.2"/><circle cx="7" cy="7" r="2" stroke="currentColor" stroke-width="1.2"/></svg>
      </button>
    </div>
  </div>

  <!-- Settings -->
  <div class="settings hidden" id="settings">
    <div class="s-row">
      <span class="s-label">Model</span>
      <select class="s-select" id="modelSelect">
        <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
        <option value="gpt-5.4-nano">gpt-5.4-nano</option>
        <option value="gpt-5.4-mini">gpt-5.4-mini</option>
      </select>
    </div>
    <div class="s-row">
      <span class="s-label">API Key</span>
      <input class="s-input" id="apiKey" type="password" placeholder="APIキーを入力..." />
    </div>
    <div class="s-row">
      <button class="btn-test" id="btnTest">テスト</button>
      <span class="test-result hidden" id="testResult"></span>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" data-panel="review">Review</div>
    <div class="tab" data-panel="generate">Generate</div>
    <div class="tab" data-panel="tokens">Tokens</div>
    <div class="tab" data-panel="manage">Manage</div>
  </div>

  <!-- ═══ REVIEW TAB ═══ -->
  <div class="tab-panel active" id="panel-review">
    <div class="sel-bar">
      <div class="sel-dot" id="selDot"></div>
      <span class="sel-name" id="selName">フレームを選択してください</span>
      <span class="sel-meta" id="selMeta"></span>
    </div>
    <div class="panel-body">
      <div class="empty-state" id="reviewEmpty">
        <div class="empty-icon">✦</div>
        <div>Figmaでフレームを選択して<br>「Review & Improve」を実行</div>
        <div style="font-size:11px;color:var(--text-dim)">AIがAs-Is分析 → To-Beをクローン生成<br>元のデザインは変更されません</div>
      </div>
      <div class="hidden" id="reviewPreview"></div>
      <div class="log" id="reviewLog"></div>
    </div>
  </div>

  <!-- ═══ GENERATE TAB ═══ -->
  <div class="tab-panel" id="panel-generate">
    <div class="panel-body" style="padding-bottom:0">
      <textarea class="prompt" id="prompt" placeholder="作りたいUIを自然言語で記述...&#10;&#10;例: ボタンのバリアントセット（Primary/Secondary × S/M/L）&#10;例: カード一覧画面（作成前/作成後の2状態）&#10;例: SaaS向けデザイントークン"></textarea>
      <div class="preview hidden" id="genPreview"></div>
      <div class="log" id="genLog"></div>
    </div>
  </div>

  <!-- ═══ TOKENS TAB ═══ -->
  <div class="tab-panel" id="panel-tokens">
    <div class="panel-body" style="padding-bottom:0">
      <div class="section-title">W3C Design Tokens JSON</div>
      <textarea class="json-input" id="tokenJson" placeholder='{ "color": { "primary": { "$type": "color", "$value": "#2563EB" } }, "spacing": { "sm": { "$type": "number", "$value": 8 } } }'></textarea>
      <div class="log" id="tokenLog"></div>
    </div>
  </div>

  <!-- ═══ MANAGE TAB ═══ -->
  <div class="tab-panel" id="panel-manage">
    <div class="panel-body">
      <div class="section-title">Variable Collections</div>
      <div id="collectionsList">
        <div class="empty-state" style="padding:16px"><div>読み込み中...</div></div>
      </div>
      <div class="section-title" style="margin-top:8px">操作</div>
      <div class="btn-row">
        <button class="btn btn-secondary" id="btnRefresh" style="font-weight:400;font-size:12px">更新</button>
        <button class="btn btn-danger" id="btnClearAll" style="font-weight:400;font-size:12px">全Collections削除</button>
      </div>
    </div>
  </div>

  <!-- Bottom bar -->
  <div class="bottom-bar">
    <div class="status hidden" id="status"><span class="spinner"></span><span id="statusText">処理中...</span></div>
    <!-- Review actions -->
    <div class="btn-row hidden" id="actReview"><button class="btn btn-primary" id="btnReview">Review & Improve</button></div>
    <div class="btn-row hidden" id="actReviewConfirm">
      <button class="btn btn-secondary" id="btnReviewCancel">キャンセル</button>
      <button class="btn btn-primary" id="btnReviewConfirm2">To-Beを生成</button>
    </div>
    <!-- Generate actions -->
    <div class="btn-row hidden" id="actGenInput"><button class="btn btn-primary" id="btnRun">生成 →</button></div>
    <div class="btn-row hidden" id="actGenPreview">
      <button class="btn btn-secondary" id="btnCancel">キャンセル</button>
      <button class="btn btn-primary" id="btnConfirm">確定して生成</button>
    </div>
    <!-- Tokens actions -->
    <div class="btn-row hidden" id="actTokens"><button class="btn btn-primary" id="btnImport">Import →</button></div>
    <!-- Undo (shared) -->
    <div class="btn-row hidden" id="actUndo">
      <button class="btn btn-secondary" id="btnUndo" style="font-size:12px">↩ 元に戻す</button>
      <button class="btn btn-danger" id="btnUndoAll" style="font-size:12px">全Undo</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════
var $ = function(id) { return document.getElementById(id) }
function show(el) { if (el) el.classList.remove('hidden') }
function hide(el) { if (el) el.classList.add('hidden') }
function isGemini(m) { return m.indexOf('gemini') === 0 }

var currentTab = 'review'
var currentSpec = null

// ══════════════════════════════════════════════════════════════
// タブ切替
// ══════════════════════════════════════════════════════════════
function switchTab(name) {
  currentTab = name
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.toggle('active', t.getAttribute('data-panel') === name) })
  document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.toggle('active', p.id === 'panel-' + name) })
  updateBottomBar()
  if (name === 'manage') parent.postMessage({ pluginMessage: { type: 'list-collections' } }, '*')
}
document.querySelectorAll('.tab').forEach(function(t) {
  t.addEventListener('click', function() { switchTab(t.getAttribute('data-panel')) })
})

var currentReview = null
var selectedNodes = []

function updateBottomBar() {
  hide($('actReview')); hide($('actReviewConfirm')); hide($('actGenInput')); hide($('actGenPreview')); hide($('actTokens'))
  if (currentTab === 'review') {
    if (currentReview) show($('actReviewConfirm')); else if (selectedNodes.length) show($('actReview'))
  }
  if (currentTab === 'generate') {
    if (currentSpec) show($('actGenPreview')); else show($('actGenInput'))
  }
  if (currentTab === 'tokens') show($('actTokens'))
}

// ══════════════════════════════════════════════════════════════
// 設定
// ══════════════════════════════════════════════════════════════
parent.postMessage({ pluginMessage: { type: 'load-settings' } }, '*')
$('btnSettings').addEventListener('click', function() { $('settings').classList.toggle('hidden') })
$('apiKey').addEventListener('change', saveSettings)
$('modelSelect').addEventListener('change', saveSettings)
function saveSettings() {
  parent.postMessage({ pluginMessage: { type: 'save-settings', apiKey: $('apiKey').value.trim(), model: $('modelSelect').value } }, '*')
}

// 接続テスト
$('btnTest').addEventListener('click', function() {
  var apiKey = $('apiKey').value.trim(), model = $('modelSelect').value, result = $('testResult')
  if (!apiKey) { result.className = 'test-result error'; result.textContent = '✗ APIキー未入力'; show(result); return }
  $('btnTest').disabled = true; result.className = 'test-result'; result.textContent = '...'; show(result)
  var p
  if (isGemini(model)) {
    p = fetch('https://generativelanguage.googleapis.com/v1beta/models/' + model + ':generateContent?key=' + apiKey, {
      method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ contents:[{parts:[{text:'Hi'}]}], generationConfig:{max_output_tokens:5} })
    })
  } else {
    p = fetch('https://api.openai.com/v1/chat/completions', {
      method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey}, body: JSON.stringify({model:model,messages:[{role:'user',content:'Hi'}],max_completion_tokens:5})
    })
  }
  p.then(function(r) { if (r.ok) { result.className='test-result ok'; result.textContent='✓ '+model+' OK'; saveSettings() } else { return r.json().then(function(e) { result.className='test-result error'; result.textContent='✗ '+((e.error&&e.error.message)||'HTTP '+r.status) }).catch(function() { result.className='test-result error'; result.textContent='✗ HTTP '+r.status }) } }).catch(function(e) { result.className='test-result error'; result.textContent='✗ '+e.message }).then(function() { $('btnTest').disabled=false })
})

// ══════════════════════════════════════════════════════════════
// メッセージ受信
// ══════════════════════════════════════════════════════════════
window.onmessage = function(event) {
  var msg = event.data.pluginMessage; if (!msg) return

  if (msg.type === 'settings-loaded') {
    if (msg.apiKey) $('apiKey').value = msg.apiKey
    if (msg.model) $('modelSelect').value = msg.model
    if (msg.apiKey) hide($('settings'))
    updateBottomBar()
  }

  // Selection
  if (msg.type === 'selection-changed') {
    selectedNodes = msg.nodes
    $('selDot').classList.add('on')
    var n = msg.nodes[0]
    $('selName').textContent = msg.isMulti ? msg.nodes.length + 'フレームを選択中' : n.name
    $('selMeta').textContent = n.width ? n.width + '×' + n.height : ''
    updateBottomBar()
  }
  if (msg.type === 'selection-cleared') {
    selectedNodes = []
    $('selDot').classList.remove('on')
    $('selName').textContent = 'フレームを選択してください'
    $('selMeta').textContent = ''
    updateBottomBar()
  }

  // Review result
  if (msg.type === 'review-applied') {
    hide($('status'))
    addLog('reviewLog', 'ok', '✓ To-Be生成完了 (' + msg.applied + '件適用)')
    currentReview = null; updateBottomBar()
    if (msg.undoCount > 0) show($('actUndo'))
  }
  if (msg.type === 'review-error') {
    hide($('status'))
    addLog('reviewLog', 'error', msg.error)
    currentReview = null; updateBottomBar()
  }

  // Generate
  if (msg.type === 'done') {
    hide($('status')); $('btnRun').disabled = false; currentSpec = null; updateBottomBar()
    addLog('genLog', 'ok', '✓ ' + (msg.summary || '生成完了'))
    if (msg.undoCount > 0) show($('actUndo'))
  }
  if (msg.type === 'error') {
    hide($('status')); $('btnRun').disabled = false; currentSpec = null; updateBottomBar()
    addLog('genLog', 'error', msg.error)
  }

  // Tokens
  if (msg.type === 'import-done') {
    hide($('status'))
    addLog('tokenLog', 'ok', '✓ ' + msg.collections + ' collections, ' + msg.variables + ' variables')
    if (msg.undoCount > 0) show($('actUndo'))
    parent.postMessage({ pluginMessage: { type: 'list-collections' } }, '*')
  }
  if (msg.type === 'import-error') {
    hide($('status'))
    addLog('tokenLog', 'error', msg.error)
  }

  // Manage
  if (msg.type === 'collections-list') { renderCollections(msg.collections) }
  if (msg.type === 'clear-done') {
    addLog('genLog', 'ok', '✓ ' + msg.count + '件削除')
    parent.postMessage({ pluginMessage: { type: 'list-collections' } }, '*')
  }

  // Undo
  if (msg.type === 'undo-done') {
    if (msg.undoCount > 0) show($('actUndo')); else hide($('actUndo'))
    if (currentTab === 'manage') parent.postMessage({ pluginMessage: { type: 'list-collections' } }, '*')
  }
}

// ══════════════════════════════════════════════════════════════
// システムプロンプト（Material Design 3準拠）
// ══════════════════════════════════════════════════════════════
var SYSTEM_PROMPT = 'あなたはMaterial Design 3ガイドラインに精通したシニアUIデザイナーです。Figma上で直接生成可能なJSON構造を出力してください。\n\n出力形式(JSONのみ。前置き・コードブロック不要):\n{"name":"名前","description":"概要","variables":[{"collection":"名前","variables":[{"name":"token/name","type":"COLOR|FLOAT","value":"#hex|数値"}]}],"components":[{"name":"Button","variants":[{"props":{"Style":"Primary","Size":"Medium"},"fill":"#hex","stroke":"#hex","textColor":"#hex","label":"テキスト","fontSize":14,"fontWeight":"Medium","paddingX":24,"paddingY":12,"cornerRadius":20}]}],"frames":[{"name":"画面名","type":"FRAME","width":390,"height":844,"fill":"#FFFFFF","layoutMode":"VERTICAL","padding":24,"itemSpacing":16,"counterAxisSizingMode":"FIXED","children":[...]}]}\n\nframesのchildren型:\nTEXT:{"type":"TEXT","text":"...","fontSize":14,"fontWeight":"Bold","color":"#hex","fillWidth":true}\nRECT:{"type":"RECT","width":数値,"height":数値,"fill":"#hex","cornerRadius":数値,"fillWidth":true}\nELLIPSE:{"type":"ELLIPSE","width":40,"height":40,"fill":"#hex"}\nFRAME:{"type":"FRAME","name":"名前","layoutMode":"VERTICAL|HORIZONTAL","padding":16,"paddingX":16,"paddingY":12,"itemSpacing":8,"fill":"#hex","cornerRadius":12,"fillWidth":true,"children":[...]}\n\nMaterial Design 3 トークン:\nカラー: Primary #2563EB, OnPrimary #FFF, PrimaryContainer #DBEAFE, Surface #FFF, SurfaceVariant #F1F5F9, OnSurface #0F172A, OnSurfaceVariant #475569, Outline #CBD5E1, Error #DC2626, Success #16A34A\nタイポグラフィ: Display 36-57 Bold, Headline 24-32 SemiBold, Title 16-22 SemiBold, Body 14-16 Regular, Label 12-14 Medium\nスペーシング(4dpグリッド): 4,8,12,16,20,24,32,40,48\n角丸: Small 8, Medium 12, Large 16, Full 20-28\nButton Filled: h40-48 paddingX24 paddingY12 radius20 fontSize14\nCard: padding16 radius12 fill#F8FAFC\n\n設計ルール:\n- 全コンテナにAuto Layout(layoutMode)必須。絶対座標禁止\n- fillWidth:trueで親幅いっぱい。テキスト・カードは基本fillWidth:true\n- FRAMEには意味ある名前を付ける\n- 深さ3-5のネスト(Screen>Section>Card>Row>TextGroup)\n- 本文#0F172A サブ#475569 キャプション#94A3B8 コントラストWCAG AA\n- 4dpグリッド厳守。奇数値禁止\n- インタラクション指示時:Before/Afterの2フレーム生成。追加要素はPrimaryContainerでハイライト\n- アイコンはELLIPSE/RECTで抽象表現。絵文字禁止\n- 1フレーム内children直置き10個以下(グループ化する)'

// ══════════════════════════════════════════════════════════════
// AI API呼び出し
// ══════════════════════════════════════════════════════════════
function callAI(prompt) {
  var model = $('modelSelect').value, apiKey = $('apiKey').value.trim()
  if (!apiKey) return Promise.reject(new Error('APIキーを設定してください'))
  var p
  if (isGemini(model)) {
    p = fetch('https://generativelanguage.googleapis.com/v1beta/models/'+model+':generateContent?key='+apiKey, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ system_instruction:{parts:[{text:SYSTEM_PROMPT}]}, contents:[{parts:[{text:prompt}]}], generationConfig:{response_mime_type:'application/json',temperature:0.7} })
    }).then(function(r) { if(!r.ok) return r.json().then(function(e){throw new Error((e.error&&e.error.message)||'Gemini error')}); return r.json() })
     .then(function(d) { return d.candidates[0].content.parts[0].text })
  } else {
    p = fetch('https://api.openai.com/v1/chat/completions', {
      method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
      body:JSON.stringify({ model:model, messages:[{role:'system',content:SYSTEM_PROMPT},{role:'user',content:prompt}], response_format:{type:'json_object'}, max_completion_tokens:8000 })
    }).then(function(r) { if(!r.ok) return r.json().then(function(e){throw new Error((e.error&&e.error.message)||'OpenAI error')}); return r.json() })
     .then(function(d) { return d.choices[0].message.content })
  }
  return p.then(function(c) { if(!c) throw new Error('空の応答'); try{return JSON.parse(c)}catch(e){ var m=c.match(/```(?:json)?\s*([\s\S]*?)\s*```/); if(m)return JSON.parse(m[1]); throw new Error('JSON解析失敗') } })
}

// ══════════════════════════════════════════════════════════════
// Review: ノード→テキスト変換
// ══════════════════════════════════════════════════════════════
function nodeToText(n, depth) {
  if (depth > 4) return ''
  var ind = ''; for (var x = 0; x < depth; x++) ind += '  '
  var s = ind + '[' + n.type + '] ' + n.name
  if (n.componentName) s += ' (Component: ' + n.componentName + ')'
  if (n.width) s += ' ' + n.width + 'x' + n.height + 'px'
  s += '\n'
  if (n.texts && n.texts.length) {
    for (var i = 0; i < Math.min(n.texts.length, 5); i++) s += ind + '  "' + n.texts[i] + '"\n'
  }
  if (n.children) { for (var i = 0; i < Math.min(n.children.length, 20); i++) s += nodeToText(n.children[i], depth + 1) }
  return s
}

var REVIEW_PROMPT = 'あなたはMaterial Design 3に精通したUI/UXシニアレビュアーです。\n以下のFigmaフレーム構造を分析し、As-Is(現状分析)とTo-Be(改善提案)を出力してください。\n\nさらに、改善を反映するための具体的な修正指示をmodificationsとして出力してください。\n修正はフレームをクローンした上で適用されるため、元のデザインは保持されます。\n\n出力形式(JSONのみ。前置き・コードブロック不要):\n{\n  "asIs": "現状分析(3-5文。構造的な問題点を明確に)",\n  "toBe": "改善方針(3-5文。具体的な変更の方向性)",\n  "score": 1-100,\n  "modifications": [\n    { "target": "ノード名(完全一致)", "action": "アクション名", "value": "新しい値", "reason": "変更理由(1文)" }\n  ]\n}\n\n修正アクション:\n- set_fill: 背景色変更 value:"#hex"\n- set_text: テキスト変更 value:"新テキスト"\n- set_font_size: フォントサイズ変更 value:数値\n- set_font_weight: ウェイト変更 value:"Regular|Medium|SemiBold|Bold"\n- set_corner_radius: 角丸変更 value:数値\n- set_padding: パディング変更 value:数値\n- set_item_spacing: 間隔変更 value:数値\n- set_opacity: 不透明度変更 value:0-1\n- set_stroke: ストローク変更 value:"#hex"\n- remove: ノード削除\n\nルール:\n- modifications最大8件。インパクト大の変更のみ\n- targetはフレーム内のノード名と完全一致\n- Material Design 3準拠(カラー、スペーシング4dpグリッド、WCAG AA)\n- 本文#0F172A サブ#475569 キャプション#94A3B8\n- Button radius 20, Card radius 12, padding 16\n- 構造・コンポーネント選定の改善を優先'

function doReviewImprove() {
  if (!selectedNodes.length) return
  hide($('reviewEmpty'))
  show($('status')); $('statusText').textContent = 'AIがデザインを分析中...'
  $('btnReview').disabled = true

  var text = ''
  for (var i = 0; i < selectedNodes.length; i++) {
    var n = selectedNodes[i]
    text += '## フレーム: ' + n.name + ' (' + n.width + 'x' + n.height + 'px)\n'
    text += nodeToText(n, 0) + '\n'
  }

  var model = $('modelSelect').value, apiKey = $('apiKey').value.trim()
  if (!apiKey) { hide($('status')); $('btnReview').disabled = false; addLog('reviewLog','error','APIキーを設定してください'); return }

  var p
  if (isGemini(model)) {
    p = fetch('https://generativelanguage.googleapis.com/v1beta/models/'+model+':generateContent?key='+apiKey, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ system_instruction:{parts:[{text:REVIEW_PROMPT}]}, contents:[{parts:[{text:text}]}], generationConfig:{response_mime_type:'application/json',temperature:0.3} })
    }).then(function(r) { if(!r.ok) return r.json().then(function(e){throw new Error((e.error&&e.error.message)||'Gemini error')}); return r.json() })
     .then(function(d) { return d.candidates[0].content.parts[0].text })
  } else {
    p = fetch('https://api.openai.com/v1/chat/completions', {
      method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
      body:JSON.stringify({ model:model, messages:[{role:'system',content:REVIEW_PROMPT},{role:'user',content:text}], response_format:{type:'json_object'}, max_completion_tokens:4000 })
    }).then(function(r) { if(!r.ok) return r.json().then(function(e){throw new Error((e.error&&e.error.message)||'OpenAI error')}); return r.json() })
     .then(function(d) { return d.choices[0].message.content })
  }

  p.then(function(c) {
    var result = JSON.parse(c)
    currentReview = result
    renderReviewPreview(result)
    hide($('status')); $('btnReview').disabled = false; updateBottomBar()
  }).catch(function(e) {
    hide($('status')); $('btnReview').disabled = false
    addLog('reviewLog', 'error', e.message)
  })
}

function renderReviewPreview(r) {
  var scoreClass = r.score >= 75 ? 'high' : r.score >= 50 ? 'mid' : 'low'
  var h = '<div class="review-score ' + scoreClass + '">' + r.score + '<span style="font-size:14px;color:var(--text-dim)"> / 100</span></div>'
  h += '<div class="review-card"><div class="review-label asis">AS-IS</div><div class="review-text">' + r.asIs + '</div></div>'
  h += '<div class="review-card"><div class="review-label tobe">TO-BE</div><div class="review-text">' + r.toBe + '</div></div>'

  if (r.modifications && r.modifications.length) {
    h += '<div class="section-title" style="margin-top:4px">修正内容 (' + r.modifications.length + '件)</div>'
    for (var i = 0; i < r.modifications.length; i++) {
      var m = r.modifications[i]
      h += '<div class="mod-item"><span class="mod-target">' + m.target + '</span> → ' + m.action
      if (m.value != null) h += ' = <strong>' + m.value + '</strong>'
      if (m.reason) h += '<div class="mod-reason">' + m.reason + '</div>'
      h += '</div>'
    }
  }

  $('reviewPreview').innerHTML = h
  show($('reviewPreview'))
}

function doReviewConfirm() {
  if (!currentReview || !currentReview.modifications) return
  show($('status')); $('statusText').textContent = 'To-Beフレームを生成中...'
  parent.postMessage({ pluginMessage: { type: 'apply-review', modifications: currentReview.modifications } }, '*')
  currentReview = null
  hide($('reviewPreview'))
  show($('reviewEmpty'))
  updateBottomBar()
}

function doReviewCancel() {
  currentReview = null
  hide($('reviewPreview'))
  show($('reviewEmpty'))
  updateBottomBar()
}

// ══════════════════════════════════════════════════════════════
// Generate: プレビュー描画
// ══════════════════════════════════════════════════════════════
function renderPreview(spec) {
  var h = '<div class="pv-header"><strong>' + (spec.name||'Design System') + '</strong></div>'
  if (spec.description) h += '<div class="pv-desc">' + spec.description + '</div>'
  if (spec.variables && spec.variables.length) {
    for (var i=0; i<spec.variables.length; i++) {
      var col=spec.variables[i]; h+='<div class="pv-section"><div class="pv-title">📦 '+col.collection+' ('+col.variables.length+')</div>'
      for (var j=0;j<Math.min(col.variables.length,8);j++) { var v=col.variables[j]; h+=v.type==='COLOR'?'<div class="pv-item"><span class="pv-color" style="background:'+v.value+'"></span>'+v.name+'</div>':'<div class="pv-item">'+v.name+': '+v.value+'</div>' }
      if (col.variables.length>8) h+='<div class="pv-item" style="color:var(--text-dim)">...他 '+(col.variables.length-8)+'件</div>'
      h+='</div>'
    }
  }
  if (spec.components && spec.components.length) {
    for (var i=0;i<spec.components.length;i++) {
      var comp=spec.components[i]; h+='<div class="pv-section"><div class="pv-title">🧩 '+comp.name+' ('+comp.variants.length+' variants)</div>'
      for (var j=0;j<Math.min(comp.variants.length,6);j++) { var v=comp.variants[j]; var ps=Object.keys(v.props).map(function(k){return k+'='+v.props[k]}).join(', '); var dot=(v.fill&&v.fill!=='transparent')?'<span class="pv-color" style="background:'+v.fill+'"></span>':''; h+='<div class="pv-variant">'+dot+ps+'</div>' }
      if (comp.variants.length>6) h+='<div class="pv-variant" style="color:var(--text-dim)">...他 '+(comp.variants.length-6)+'件</div>'
      h+='</div>'
    }
  }
  if (spec.frames && spec.frames.length) {
    for (var i=0;i<spec.frames.length;i++) { var fr=spec.frames[i]; var cc=(fr.children&&fr.children.length)||0; h+='<div class="pv-section"><div class="pv-title">📱 '+(fr.name||'Frame')+' ('+(fr.width||'?')+'×'+(fr.height||'?')+')</div><div class="pv-item">'+cc+' children, '+(fr.layoutMode||'absolute')+'</div></div>' }
  }
  $('genPreview').innerHTML = h
}

// ══════════════════════════════════════════════════════════════
// Generate: アクション
// ══════════════════════════════════════════════════════════════
function doGenerate() {
  var prompt = $('prompt').value.trim(); if (!prompt) return
  $('btnRun').disabled = true; show($('status')); $('statusText').textContent = 'AIが構造を生成中...'
  callAI(prompt).then(function(spec) {
    currentSpec = spec; renderPreview(spec); hide($('prompt')); show($('genPreview')); hide($('status')); updateBottomBar()
  }).catch(function(e) { hide($('status')); $('btnRun').disabled = false; addLog('genLog','error',e.message) })
}
function doConfirm() {
  if (!currentSpec) return
  show($('status')); $('statusText').textContent = 'Figmaに反映中...'
  parent.postMessage({ pluginMessage: { type: 'generate', spec: currentSpec } }, '*')
  currentSpec = null; show($('prompt')); hide($('genPreview')); updateBottomBar()
}
function doCancel() { currentSpec = null; show($('prompt')); hide($('genPreview')); updateBottomBar() }

// ══════════════════════════════════════════════════════════════
// Tokens: Import
// ══════════════════════════════════════════════════════════════
function doImportTokens() {
  var json = $('tokenJson').value.trim(); if (!json) return
  show($('status')); $('statusText').textContent = 'トークンをインポート中...'
  parent.postMessage({ pluginMessage: { type: 'import-tokens', json: json } }, '*')
}

// ══════════════════════════════════════════════════════════════
// Manage: コレクション一覧
// ══════════════════════════════════════════════════════════════
function renderCollections(list) {
  var el = $('collectionsList')
  if (!list.length) { el.innerHTML = '<div class="empty-state" style="padding:16px">コレクションなし</div>'; return }
  var h = ''
  for (var i=0;i<list.length;i++) {
    h += '<div class="coll-card"><span class="coll-name">'+list[i].name+'</span><span class="coll-meta">'+list[i].variableCount+' vars'+(list[i].modes>1?' / '+list[i].modes+' modes':'')+'</span></div>'
  }
  el.innerHTML = h
}

// ══════════════════════════════════════════════════════════════
// 共通: ログ
// ══════════════════════════════════════════════════════════════
function addLog(logId, type, message) {
  var log = $(logId); if (!log) return
  var now = new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',second:'2-digit'})
  var div = document.createElement('div')
  div.className = 'log-item' + (type ? ' ' + type : '')
  div.innerHTML = '<span style="font-size:10px;color:var(--text-dim);font-family:monospace">'+now+'</span> '+message
  log.insertBefore(div, log.firstChild)
  while (log.children.length > 5) log.removeChild(log.lastChild)
}

// ══════════════════════════════════════════════════════════════
// イベント
// ══════════════════════════════════════════════════════════════
$('btnReview').addEventListener('click', doReviewImprove)
$('btnReviewConfirm2').addEventListener('click', doReviewConfirm)
$('btnReviewCancel').addEventListener('click', doReviewCancel)
$('btnRun').addEventListener('click', doGenerate)
$('btnConfirm').addEventListener('click', doConfirm)
$('btnCancel').addEventListener('click', doCancel)
$('btnImport').addEventListener('click', doImportTokens)
$('btnUndo').addEventListener('click', function() { parent.postMessage({ pluginMessage: { type: 'undo' } }, '*') })
$('btnUndoAll').addEventListener('click', function() { parent.postMessage({ pluginMessage: { type: 'undo-all' } }, '*') })
$('btnRefresh').addEventListener('click', function() { parent.postMessage({ pluginMessage: { type: 'list-collections' } }, '*') })
$('btnClearAll').addEventListener('click', function() { if (confirm('全Variable Collectionsを削除しますか？')) parent.postMessage({ pluginMessage: { type: 'clear-all-collections' } }, '*') })

document.addEventListener('keydown', function(e) {
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
    e.preventDefault()
    if (currentTab === 'generate') { if (currentSpec) doConfirm(); else doGenerate(); }
    if (currentTab === 'tokens') doImportTokens()
  }
})

// 初期表示
updateBottomBar()
</script>
